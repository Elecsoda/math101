        // ============================================================
        // 关键词高亮：把题干中的关键短语标注颜色
        // ============================================================
        const KW_STYLE = {
            more:   'bg-blue-100 text-blue-700 border-blue-300',
            less:   'bg-rose-100 text-rose-700 border-rose-300',
            total:  'bg-green-100 text-green-700 border-green-300',
            morewh: 'bg-amber-100 text-amber-700 border-amber-300',
            times:  'bg-purple-100 text-purple-700 border-purple-300',
            num:    'bg-gray-100 text-gray-700 border-gray-300',
        };

        const HighlightStory = ({ story, keywords, active }) => {
            // 把关键词在 story 中切分高亮
            let parts = [{ t: story, kw: null }];
            keywords.forEach((k) => {
                const next = [];
                parts.forEach(p => {
                    if (p.kw) { next.push(p); return; }
                    const idx = p.t.indexOf(k.text);
                    if (idx === -1) { next.push(p); return; }
                    if (idx > 0) next.push({ t: p.t.slice(0, idx), kw: null });
                    next.push({ t: k.text, kw: k.type });
                    if (idx + k.text.length < p.t.length) next.push({ t: p.t.slice(idx + k.text.length), kw: null });
                });
                parts = next;
            });
            return (
                <p className="text-xl leading-relaxed text-gray-800">
                    {parts.map((p, i) => p.kw
                        ? <span key={i} className={"inline-block px-1.5 py-0.5 mx-0.5 rounded border font-semibold " + KW_STYLE[p.kw] + (active ? ' kw-pulse' : '')}>{p.t}</span>
                        : <span key={i}>{p.t}</span>
                    )}
                </p>
            );
        };

        // ============================================================
        // 条形图：一行 = 一个量，用方块或实心条表示
        // segments: [{ value, color, label, dashed }]
        // mode: 'block'（方块）| 'line'（线段图）
        // 所有方块尺寸由全局常量 CELL / UNIT 决定，跨题型保持一致
        // ============================================================
        const BarRow = ({ name, nameColor, segments, mode }) => {
            return (
                <div className="flex items-center gap-3 mb-3">
                    <div className={"w-16 text-right font-bold shrink-0 " + nameColor}>{name}</div>
                    <div className="relative flex items-center" style={{ minHeight: mode === 'line' ? 28 : CELL.h + 10 }}>
                        {segments.map((seg, si) => {
                            if (mode === 'line') {
                                const w = seg.value * UNIT;
                                return (
                                    <div key={si} className="relative grow-bar" style={{ width: w }}>
                                        <div className={"h-1.5 rounded " + seg.color + (seg.dashed ? ' opacity-50' : '')}></div>
                                        {/* 两端竖线 */}
                                        <div className={"absolute left-0 top-0 w-0.5 h-4 -mt-1 " + seg.color}></div>
                                        <div className={"absolute right-0 top-0 w-0.5 h-4 -mt-1 " + seg.color}></div>
                                        {seg.label && <div className="absolute -top-5 left-0 w-full text-center text-sm font-semibold text-gray-600">{seg.label}</div>}
                                    </div>
                                );
                            }
                            // 方块模式：把 value 拆成一个个统一大小的方块
                            return (
                                <div key={si} className="flex items-center grow-bar">
                                    {Array.from({ length: seg.value }).map((_, ci) => (
                                        seg.dashed ? <Cell key={ci} dashed /> : <ColorCell key={ci} color={seg.color} />
                                    ))}
                                    {seg.label && <span className="ml-1 mr-2 text-sm font-semibold text-gray-500 whitespace-nowrap">{seg.label}</span>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // 大括号（用于标注"一共""相差"等总量）；widthUnits 以"单位个数"给出
        const Brace = ({ widthUnits, label, color = 'text-gray-600', offsetUnits = 0 }) => (
            <div className="flex items-center gap-3 mb-1" style={{ height: 22 }}>
                <div className="w-16 shrink-0"></div>
                <div style={{ marginLeft: offsetUnits * UNIT }}>
                    <div className="relative" style={{ width: widthUnits * UNIT }}>
                        <div className="border-t-2 border-l-2 border-r-2 border-gray-400 rounded-t-md" style={{ height: 8 }}></div>
                        <div className={"text-center text-sm font-bold mt-0.5 " + color}>{label}</div>
                    </div>
                </div>
            </div>
        );

        // ============================================================
        // 基础题求解与画图数据
        // ============================================================
        function solveBasic(q) {
            switch (q.kind) {
                case 'compare-more': { // B 已知, A = B + gap
                    const B = q.base, A = B + q.gap;
                    return { A, B, answer: A, expr: `${B} + ${q.gap} = ${A}`, askName: q.nameA };
                }
                case 'compare-less': { // A 已知, B = A - gap
                    const A = q.base, B = A - q.gap;
                    return { A, B, answer: B, expr: `${A} - ${q.gap} = ${B}`, askName: q.nameB };
                }
                case 'total': {
                    const A = q.valA, B = q.valB;
                    return { A, B, answer: A + B, expr: `${A} + ${B} = ${A + B}`, askName: '一共' };
                }
                case 'difference': {
                    const A = q.valA, B = q.valB;
                    return { A, B, answer: A - B, expr: `${A} - ${B} = ${A - B}`, askName: '相差' };
                }
                case 'times': { // A = B × factor
                    const B = q.base, A = B * q.factor;
                    return { A, B, answer: A, expr: `${B} × ${q.factor} = ${A}`, askName: q.nameA };
                }
            }
        }

        // ============================================================
        // 主组件：基础版
        // ============================================================
        const BasicMode = ({ qi, setQi }) => {
            const [step, setStep] = useState(0); // 0读题 1画已知 2画关系/比较 3列式
            const [mode, setMode] = useState('block');
            const q = BASIC[qi];
            const sol = useMemo(() => solveBasic(q), [q]);

            // 题目切换时回到第一步
            useEffect(() => { setStep(0); }, [qi]);
            const next = () => setQi((qi + 1) % BASIC.length);
            const prev = () => setQi((qi - 1 + BASIC.length) % BASIC.length);

            // 根据题型与步骤，构造两行条形
            const bars = buildBasicBars(q, sol, step, mode);

            const stepNames = ['① 读题，找关键词', '② 画出已知的量', '③ 画出数量关系', '④ 列式计算'];

            return (
                <div className="fade-in">
                    {/* 题目导航 */}
                    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
                        <div className="flex gap-2">
                            <button onClick={prev} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">‹ 上一题</button>
                            <button onClick={next} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">下一题 ›</button>
                        </div>
                        <div className="flex gap-1 items-center">
                            <span className="text-sm text-gray-400 mr-1">画法</span>
                            <button onClick={() => setMode('block')} className={"px-3 py-1.5 rounded-lg text-sm smooth " + (mode==='block'?'bg-blue-500 text-white':'bg-gray-100 text-gray-500')}>方块</button>
                            <button onClick={() => setMode('line')} className={"px-3 py-1.5 rounded-lg text-sm smooth " + (mode==='line'?'bg-blue-500 text-white':'bg-gray-100 text-gray-500')}>线段</button>
                        </div>
                    </div>

                    {/* 题干 */}
                    <div className="bg-white rounded-xl shadow-sm p-5 mb-5 border border-gray-100">
                        <HighlightStory story={q.story} keywords={q.keywords} active={step >= 1} />
                    </div>

                    {/* 步骤条 */}
                    <div className="flex gap-2 mb-5 flex-wrap">
                        {stepNames.map((s, i) => (
                            <div key={i} className={"px-3 py-1.5 rounded-full text-sm font-semibold smooth " +
                                (step === i ? 'bg-blue-500 text-white' : step > i ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-400')}>{s}</div>
                        ))}
                    </div>

                    {/* 画图区 */}
                    <div className="bg-white rounded-xl shadow-sm p-6 mb-5 border border-gray-100 overflow-x-auto" style={{ minHeight: 180 }}>
                        {step === 0 && <p className="text-gray-400 text-center py-12">先读题，把关键词找出来，再点"下一步"开始画图 →</p>}
                        {step >= 1 && bars}
                    </div>

                    {/* 列式区 */}
                    {step >= 3 && (
                        <div className="bg-blue-50 rounded-xl p-5 mb-5 border border-blue-100 fade-in">
                            <p className="text-gray-500 mb-2 text-sm">看着图，把式子列出来：</p>
                            <p className="text-2xl font-bold font-mono text-blue-700">{sol.expr}</p>
                            <p className="mt-2 text-lg text-gray-700">答：{sol.askName}有 <span className="font-bold text-blue-600">{sol.answer}</span> {q.unit === '元' ? '元' : q.unit}。</p>
                        </div>
                    )}

                    {/* 步骤按钮 */}
                    <div className="flex gap-3">
                        {step > 0 && <button onClick={() => setStep(step - 1)} className="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-600 smooth">上一步</button>}
                        {step < 3 && <button onClick={() => setStep(step + 1)} className="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold smooth">下一步 →</button>}
                        {step === 3 && <button onClick={() => setStep(0)} className="px-6 py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold smooth">从头再看一遍</button>}
                    </div>
                </div>
            );
        };

        // 构造基础题两行条形（含分步显隐）
        function buildBasicBars(q, sol, step, mode) {
            const cA = COLORS.A, cB = COLORS.B;

            if (q.kind === 'compare-more') {
                // B 已知；A = B + gap，gap 段在 step>=2 出现
                const aSegs = [{ value: sol.B, color: cA.bar }];
                if (step >= 2) aSegs.push({ value: q.gap, color: cB.bar, dashed: true, label: `多 ${q.gap} ${q.unit}` });
                return (
                    <div>
                        <BarRow name={q.nameB} nameColor={cB.text} mode={mode}
                            segments={[{ value: sol.B, color: cB.bar, label: `${sol.B} ${q.unit}` }]} />
                        {step >= 2 && <BarRow name={q.nameA} nameColor={cA.text} mode={mode} segments={aSegs} />}
                        {step >= 1 && step < 2 && <p className="text-sm text-gray-400 mt-2">先画出已知的 {q.nameB}：{sol.B} {q.unit}。{q.nameA} 比它多，所以更长 →</p>}
                    </div>
                );
            }
            if (q.kind === 'compare-less') {
                // A 已知；B = A - gap
                const showGap = step >= 2;
                return (
                    <div>
                        <BarRow name={q.nameA} nameColor={cA.text} mode={mode}
                            segments={[{ value: sol.B, color: cA.bar }, showGap ? { value: q.gap, color: cA.bar, dashed: true, label: `少 ${q.gap} ${q.unit}` } : { value: q.gap, color: cA.bar, label: `${sol.A} ${q.unit}` }]} />
                        {step >= 2 && <BarRow name={q.nameB} nameColor={cB.text} mode={mode}
                            segments={[{ value: sol.B, color: cB.bar, label: `? ${q.unit}` }]} />}
                        {step >= 1 && step < 2 && <p className="text-sm text-gray-400 mt-2">先画出已知的 {q.nameA}：{sol.A} {q.unit}。{q.nameB} 比它少，所以更短 →</p>}
                    </div>
                );
            }
            if (q.kind === 'total') {
                return (
                    <div>
                        {step >= 2 && <Brace widthUnits={sol.A + sol.B} label={`一共 ? ${q.unit}`} />}
                        <BarRow name={q.nameA} nameColor={cA.text} mode={mode}
                            segments={[{ value: sol.A, color: cA.bar, label: `${sol.A} ${q.unit}` }]} />
                        <BarRow name={q.nameB} nameColor={cB.text} mode={mode}
                            segments={[{ value: sol.B, color: cB.bar, label: `${sol.B} ${q.unit}` }]} />
                        {step >= 2 && <p className="text-sm text-gray-400 mt-2">把两部分合起来，就是"一共"，用加法。</p>}
                    </div>
                );
            }
            if (q.kind === 'difference') {
                return (
                    <div>
                        <BarRow name={q.nameA} nameColor={cA.text} mode={mode}
                            segments={[{ value: sol.B, color: cA.bar }, { value: sol.A - sol.B, color: cA.bar, dashed: step >= 2, label: step >= 2 ? `多 ? ${q.unit}` : `${sol.A} ${q.unit}` }]} />
                        <BarRow name={q.nameB} nameColor={cB.text} mode={mode}
                            segments={[{ value: sol.B, color: cB.bar, label: `${sol.B} ${q.unit}` }]} />
                        {step >= 2 && <p className="text-sm text-gray-400 mt-2">对齐后，{q.nameA} 比 {q.nameB} 多出来的那一段，就是"相差"，用减法。</p>}
                    </div>
                );
            }
            if (q.kind === 'times') {
                // B 一份，A 是 factor 份
                return (
                    <div>
                        <BarRow name={q.nameB} nameColor={cB.text} mode={mode}
                            segments={[{ value: sol.B, color: cB.bar, label: `${sol.B} ${q.unit}（1 份）` }]} />
                        {step >= 2 && (
                            <div className="flex items-center gap-3 mb-3">
                                <div className={"w-16 text-right font-bold shrink-0 " + cA.text}>{q.nameA}</div>
                                <div className="flex items-center">
                                    {Array.from({ length: q.factor }).map((_, i) => (
                                        <div key={i} className="flex items-center">
                                            {mode === 'line'
                                                ? <div className={"h-1.5 rounded " + cA.bar} style={{ width: sol.B * UNIT }}></div>
                                                : Array.from({ length: sol.B }).map((_, ci) => <ColorCell key={ci} color={cA.bar} />)
                                            }
                                            {i < q.factor - 1 && <span className="mx-1 text-gray-300 font-bold">|</span>}
                                        </div>
                                    ))}
                                    <span className="ml-2 text-sm font-semibold text-purple-500">{q.factor} 份</span>
                                </div>
                            </div>
                        )}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-2">{q.nameA} 是 {q.nameB} 的 {q.factor} 倍，就是 {q.factor} 个这样的"1 份"，用乘法。</p>}
                    </div>
                );
            }
            return null;
        }

        // ============================================================
        // 复杂版：和差倍
        // ============================================================
        function solveAdvanced(q) {
            if (q.kind === 'sum-times') {
                // A + B = sum, A = B*factor  => B*(factor+1)=sum
                const B = q.sum / (q.factor + 1), A = B * q.factor;
                return { A, B, parts: q.factor + 1,
                    steps: [
                        `把小数（${q.nameB}）看作 1 份，大数（${q.nameA}）是 ${q.factor} 份。`,
                        `一共有 ${q.factor} + 1 = ${q.factor + 1} 份。`,
                        `每份（${q.nameB}）：${q.sum} ÷ ${q.factor + 1} = ${B}（${q.unit}）`,
                        `${q.nameA}：${B} × ${q.factor} = ${A}（${q.unit}）`,
                    ] };
            }
            if (q.kind === 'diff-times') {
                // A - B = diff, A = B*factor => B*(factor-1)=diff
                const B = q.diff / (q.factor - 1), A = B * q.factor;
                return { A, B, parts: q.factor,
                    steps: [
                        `把小数（${q.nameB}）看作 1 份，大数（${q.nameA}）是 ${q.factor} 份。`,
                        `多出来的 ${q.diff} ${q.unit}，正好是 ${q.factor} − 1 = ${q.factor - 1} 份。`,
                        `每份（${q.nameB}）：${q.diff} ÷ ${q.factor - 1} = ${B}（${q.unit}）`,
                        `${q.nameA}：${B} × ${q.factor} = ${A}（${q.unit}）`,
                    ] };
            }
            if (q.kind === 'sum-diff') {
                // A + B = sum, A - B = diff
                const A = (q.sum + q.diff) / 2, B = (q.sum - q.diff) / 2;
                return { A, B, parts: 2,
                    steps: [
                        `如果把多的 ${q.diff} ${q.unit}先去掉，两人就同样多了。`,
                        `这时一共是 ${q.sum} − ${q.diff} = ${q.sum - q.diff}（${q.unit}），是 2 个小数。`,
                        `${q.nameB}（小数）：(${q.sum} − ${q.diff}) ÷ 2 = ${B}（${q.unit}）`,
                        `${q.nameA}（大数）：${B} + ${q.diff} = ${A}（${q.unit}）`,
                    ] };
            }
        }

        const AdvancedMode = ({ qi, setQi }) => {
            const [step, setStep] = useState(0);
            const [mode, setMode] = useState('block');
            const q = ADVANCED[qi];
            const sol = useMemo(() => solveAdvanced(q), [q]);
            const unit = q.unit;

            useEffect(() => { setStep(0); }, [qi]);
            const next = () => setQi((qi + 1) % ADVANCED.length);
            const prev = () => setQi((qi - 1 + ADVANCED.length) % ADVANCED.length);

            // 与基础版统一的四步骤
            const stepNames = ['① 读题，找关键词', '② 画出已知的量', '③ 画出数量关系', '④ 列式计算'];

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
                        <div className="flex gap-2">
                            <button onClick={prev} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">‹ 上一题</button>
                            <button onClick={next} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">下一题 ›</button>
                        </div>
                        <div className="flex gap-1 items-center">
                            <span className="text-sm text-gray-400 mr-1">画法</span>
                            <button onClick={() => setMode('block')} className={"px-3 py-1.5 rounded-lg text-sm smooth " + (mode==='block'?'bg-purple-500 text-white':'bg-gray-100 text-gray-500')}>方块</button>
                            <button onClick={() => setMode('line')} className={"px-3 py-1.5 rounded-lg text-sm smooth " + (mode==='line'?'bg-purple-500 text-white':'bg-gray-100 text-gray-500')}>线段</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-5 mb-5 border border-gray-100">
                        <HighlightStory story={q.story} keywords={q.keywords} active={step >= 1} />
                    </div>

                    {/* 步骤条 */}
                    <div className="flex gap-2 mb-5 flex-wrap">
                        {stepNames.map((s, i) => (
                            <div key={i} className={"px-3 py-1.5 rounded-full text-sm font-semibold smooth " +
                                (step === i ? 'bg-purple-500 text-white' : step > i ? 'bg-purple-100 text-purple-600' : 'bg-gray-100 text-gray-400')}>{s}</div>
                        ))}
                    </div>

                    {/* 画图区：分份条形 */}
                    <div className="bg-white rounded-xl shadow-sm p-6 mb-5 border border-gray-100 overflow-x-auto" style={{ minHeight: 160 }}>
                        {step === 0 && <p className="text-gray-400 text-center py-12">先读题，把关键词找出来，再点"下一步"开始画图 →</p>}
                        {step >= 1 && buildAdvancedBars(q, sol, step, mode)}
                        {step === 1 && <p className="text-sm text-gray-400 mt-2">先把小数看作 1 份，照着画出大数有几份。下一步再标出它们的关系 →</p>}
                    </div>

                    {/* 列式计算（第④步一次性展开推理） */}
                    {step >= 3 && (
                        <div className="bg-purple-50 rounded-xl p-5 mb-5 border border-purple-100 fade-in">
                            <p className="text-gray-500 mb-2 text-sm">看着图，一步步算出来：</p>
                            {sol.steps.map((s, i) => (
                                <p key={i} className="font-mono text-lg mb-2 text-gray-700">
                                    <span className="inline-block w-6 text-purple-400">{i + 1}.</span>{s}
                                </p>
                            ))}
                            <p className="mt-3 text-lg text-gray-700">答：{q.nameA} <span className="font-bold text-purple-600">{sol.A}</span> {unit}，{q.nameB} <span className="font-bold text-purple-600">{sol.B}</span> {unit}。</p>
                        </div>
                    )}

                    <div className="flex gap-3">
                        {step > 0 && <button onClick={() => setStep(step - 1)} className="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-600 smooth">上一步</button>}
                        {step < 3 && <button onClick={() => setStep(step + 1)} className="px-6 py-2.5 bg-purple-500 hover:bg-purple-600 text-white rounded-lg font-semibold smooth">下一步 →</button>}
                        {step === 3 && <button onClick={() => setStep(0)} className="px-6 py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold smooth">从头再看一遍</button>}
                    </div>
                </div>
            );
        };

        // 复杂版分份条形图
        function buildAdvancedBars(q, sol, step, mode) {
            const cA = COLORS.A, cB = COLORS.B;
            const part = sol.B; // 一份的大小（单位个数）
            // 每份用统一大小的方块表示，份与份之间用竖线分隔
            const renderParts = (n, color, name, nameColor, tail) => (
                <div className="flex items-center gap-3 mb-3">
                    <div className={"w-16 text-right font-bold shrink-0 " + nameColor}>{name}</div>
                    <div className="flex items-center">
                        {Array.from({ length: n }).map((_, i) => (
                            <div key={i} className="flex items-center">
                                {mode === 'line'
                                    ? <div className={"h-2 rounded " + color} style={{ width: part * UNIT }}></div>
                                    : Array.from({ length: part }).map((_, ci) => <ColorCell key={ci} color={color} />)
                                }
                                {i < n - 1 && <span className="mx-1 text-gray-300 font-bold">|</span>}
                            </div>
                        ))}
                        {tail}
                    </div>
                </div>
            );

            // 步骤语义（与基础版统一）：
            //   step 0 读题（画图区由 AdvancedMode 显示提示语，不调用本函数）
            //   step 1 画出已知的量（分份，不加"份"标签 / 不画括号）
            //   step 2 画出数量关系（加"份"标签 + 大括号）
            //   step 3 列式计算（画面同 step 2）
            if (q.kind === 'sum-times') {
                const big = q.factor;
                return (
                    <div>
                        {renderParts(1, cB.bar, q.nameB, cB.text, step >= 2 ? <span className="ml-2 text-sm font-semibold text-rose-500">1 份</span> : null)}
                        {renderParts(big, cA.bar, q.nameA, cA.text, step >= 2 ? <span className="ml-2 text-sm font-semibold text-blue-500">{big} 份</span> : null)}
                        {step >= 2 && <Brace widthUnits={(q.factor + 1) * part} label={`一共 ${q.sum} ${q.unit} = ${q.factor + 1} 份`} color="text-green-600" />}
                    </div>
                );
            }
            if (q.kind === 'diff-times') {
                const big = q.factor;
                return (
                    <div>
                        {renderParts(1, cB.bar, q.nameB, cB.text, step >= 2 ? <span className="ml-2 text-sm font-semibold text-rose-500">1 份</span> : null)}
                        {renderParts(big, cA.bar, q.nameA, cA.text, step >= 2 ? <span className="ml-2 text-sm font-semibold text-blue-500">{big} 份</span> : null)}
                        {step >= 2 && <Brace widthUnits={(q.factor - 1) * part} offsetUnits={part} label={`多 ${q.diff} ${q.unit} = ${q.factor - 1} 份`} color="text-amber-600" />}
                    </div>
                );
            }
            if (q.kind === 'sum-diff') {
                // 大数 = 小数 + diff
                return (
                    <div>
                        <BarRow name={q.nameB} nameColor={cB.text} mode={mode}
                            segments={[{ value: sol.B, color: cB.bar, label: step >= 2 ? `小数` : '' }]} />
                        <BarRow name={q.nameA} nameColor={cA.text} mode={mode}
                            segments={[{ value: sol.B, color: cA.bar }, { value: q.diff, color: cA.bar, dashed: step >= 2, label: step >= 2 ? `多 ${q.diff} ${q.unit}` : '' }]} />
                        {step >= 2 && <Brace widthUnits={sol.A + sol.B} label={`两人一共 ${q.sum} ${q.unit}`} color="text-green-600" />}
                    </div>
                );
            }
            return null;
        }

        // ============================================================
        // 终极挑战：每题分步讲解 + 专属"分份/转移"示意图
        // ============================================================
        // 一行"分份条"：n 份，每份 part 个方块（line 模式用一整条）
        const PartBar = ({ name, nameColor, n, part, color, mode, tail }) => (
            <div className="flex items-center gap-3 mb-3">
                <div className={"w-16 text-right font-bold shrink-0 " + nameColor}>{name}</div>
                <div className="flex items-center">
                    {Array.from({ length: n }).map((_, i) => (
                        <div key={i} className="flex items-center">
                            {mode === 'line'
                                ? <div className={"h-2 rounded " + color} style={{ width: part * UNIT }}></div>
                                : Array.from({ length: part }).map((_, ci) => <ColorCell key={ci} color={color} />)}
                            {i < n - 1 && <span className="mx-1 text-gray-300 font-bold">|</span>}
                        </div>
                    ))}
                    {tail}
                </div>
            </div>
        );

        // 每道终极题的"最后状态"示意图（以倍数关系画分份；part 取较易看的小份数）
        function buildUltimateBars(q, step, mode) {
            const cA = COLORS.A, cB = COLORS.B;
            const small = 4; // 统一用 4 个方块代表"1 份"，保证画面整齐
            const tag = (text, color) => <span className={"ml-2 text-sm font-semibold " + color}>{text}</span>;

            if (q.id === 'chalk') {
                // 9 箱白粉笔 + 3 个"贵 30 元"，凑成同样的"每箱白粉笔"
                return (
                    <div>
                        <PartBar name="白粉笔" nameColor={cA.text} n={6} part={small} color={cA.bar} mode={mode}
                            tail={tag('6 箱', cA.text)} />
                        <div className="flex items-center gap-3 mb-3">
                            <div className={"w-16 text-right font-bold shrink-0 " + cB.text}>彩色</div>
                            <div className="flex items-center">
                                {Array.from({ length: 3 }).map((_, i) => (
                                    <div key={i} className="flex items-center">
                                        {mode === 'line'
                                            ? <div className={"h-2 rounded " + cB.bar} style={{ width: small * UNIT }}></div>
                                            : Array.from({ length: small }).map((_, ci) => <ColorCell key={ci} color={cB.bar} />)}
                                        {step >= 2 && <span className="ml-0.5 mr-0.5"><Cell dashed /></span>}
                                        {i < 2 && <span className="mx-1 text-gray-300 font-bold">|</span>}
                                    </div>
                                ))}
                                {tag('3 箱', cB.text)}
                            </div>
                        </div>
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">虚线格 = 彩色比白色每箱贵的 30 元。把 3 个虚线去掉（−90 元），9 箱就都是白粉笔了。</p>}
                    </div>
                );
            }
            if (q.id === 'pieces' || q.id === 'shelf' || q.id === 'money') {
                // 倍数关系图：小数 1 份、大数 3 份；差/和用括号标注
                const map = {
                    pieces: { sName: '第一堆', bName: '第二堆', brace: '一共 156 个 = 4 份', braceColor: 'text-green-600', kind: 'sum' },
                    shelf:  { sName: '乙(现)', bName: '甲(现)', brace: '相差 30 本 = 2 份', braceColor: 'text-amber-600', kind: 'diff' },
                    money:  { sName: '小虎(现)', bName: '小通(现)', brace: '相差 300 元 = 2 份', braceColor: 'text-amber-600', kind: 'diff' },
                };
                const m = map[q.id];
                return (
                    <div>
                        <PartBar name={m.sName} nameColor={cB.text} n={1} part={small} color={cB.bar} mode={mode}
                            tail={step >= 2 ? tag('1 份', 'text-rose-500') : null} />
                        <PartBar name={m.bName} nameColor={cA.text} n={3} part={small} color={cA.bar} mode={mode}
                            tail={step >= 2 ? tag('3 份', 'text-blue-500') : null} />
                        {step >= 2 && (m.kind === 'sum'
                            ? <Brace widthUnits={4 * small} label={m.brace} color={m.braceColor} />
                            : <Brace widthUnits={2 * small} offsetUnits={small} label={m.brace} color={m.braceColor} />)}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">{q.id === 'pieces'
                            ? '搬完后两堆总数没变，正好分成 4 份，第一堆 1 份、第二堆 3 份。'
                            : '变化后大数是小数的 3 倍，两者相差正好是 3 − 1 = 2 份。'}</p>}
                    </div>
                );
            }
            if (q.id === 'class') {
                // 以乙为基准：乙 / 甲=乙+4 / 丙=乙+8
                const baseN = small;
                const row = (name, color, nameColor, extra, extraLabel) => (
                    <BarRow name={name} nameColor={nameColor} mode={mode}
                        segments={extra > 0
                            ? [{ value: baseN, color }, { value: extra, color, dashed: step >= 2, label: step >= 2 ? extraLabel : '' }]
                            : [{ value: baseN, color, label: step >= 2 ? '乙(基准)' : '' }]} />
                );
                return (
                    <div>
                        {row('乙班', cB.bar, cB.text, 0)}
                        {row('甲班', cA.bar, cA.text, 1, '多 4 人')}
                        {row('丙班', COLORS.diff.bar, COLORS.diff.text, 2, '多 8 人')}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">把乙班看作 1 段：甲班比乙多 4 人，丙班比乙多 8 人。三段合起来 = 162 人。</p>}
                    </div>
                );
            }
            if (q.id === 'subtract') {
                // 被减数 = 减数 + 差；减数 = 3 份、差 = 1 份
                return (
                    <div>
                        <BarRow name="差" nameColor={cB.text} mode={mode}
                            segments={[{ value: small, color: cB.bar, label: step >= 2 ? '1 份' : '' }]} />
                        <PartBar name="减数" nameColor={cA.text} n={3} part={small} color={cA.bar} mode={mode}
                            tail={step >= 2 ? tag('3 份', 'text-blue-500') : null} />
                        <BarRow name="被减数" nameColor={COLORS.diff.text} mode={mode}
                            segments={[{ value: 3 * small, color: COLORS.diff.bar }, { value: small, color: COLORS.diff.bar, label: step >= 2 ? '= 减数 + 差' : '' }]} />
                        {step >= 2 && <Brace widthUnits={4 * small} label="减数 + 差 = 被减数 = 60" color="text-green-600" />}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">被减数 = 减数 + 差，所以三数之和 = 2 个被减数 = 120。减数(3 份) + 差(1 份) = 4 份。</p>}
                    </div>
                );
            }
            return null;
        }

        // 年龄问题的专属示意图（核心：年龄差不变）
        function buildAgeBars(q, step, mode) {
            const cA = COLORS.A, cB = COLORS.B;
            const small = 4;
            const tag = (text, color) => <span className={"ml-2 text-sm font-semibold " + color}>{text}</span>;

            if (q.id === 'mother') {
                // 6 年前：母 5 份、子 1 份，和 = 6 份
                return (
                    <div>
                        <p className="text-sm text-gray-500 mb-3 font-semibold">↩ 倒回到 6 年前来看：</p>
                        <PartBar name="儿子" nameColor={cB.text} n={1} part={small} color={cB.bar} mode={mode}
                            tail={step >= 2 ? tag('1 份', 'text-rose-500') : null} />
                        <PartBar name="母亲" nameColor={cA.text} n={5} part={small} color={cA.bar} mode={mode}
                            tail={step >= 2 ? tag('5 份', 'text-blue-500') : null} />
                        {step >= 2 && <Brace widthUnits={6 * small} label="6 年前年龄和 54 岁 = 6 份" color="text-green-600" />}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">先把 76 岁倒回今年(−10)、再倒回 6 年前(−12)得 54 岁，那时母是子的 5 倍，和 = 6 份。</p>}
                    </div>
                );
            }
            if (q.id === 'wangli') {
                // 王燕比李龙大 6 岁（差不变）：和差问题
                return (
                    <div>
                        <BarRow name="李龙" nameColor={cB.text} mode={mode}
                            segments={[{ value: small, color: cB.bar, label: step >= 2 ? '小' : '' }]} />
                        <BarRow name="王燕" nameColor={cA.text} mode={mode}
                            segments={[{ value: small, color: cA.bar }, { value: 1, color: cA.bar, dashed: step >= 2, label: step >= 2 ? '大 6 岁' : '' }]} />
                        {step >= 2 && <Brace widthUnits={2 * small + 1} label="今年两人年龄和 40 岁" color="text-green-600" />}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">年龄差永远是 6 岁；把题里的年龄都换回今年，和 = 40 岁。这就是和差问题。</p>}
                    </div>
                );
            }
            if (q.id === 'brothers') {
                // 哥 = 3 份、弟 = 2 份，差 = 1 份；和 = 5 份
                return (
                    <div>
                        <PartBar name="弟弟" nameColor={cB.text} n={2} part={small} color={cB.bar} mode={mode}
                            tail={step >= 2 ? tag('2 份', 'text-rose-500') : null} />
                        <PartBar name="哥哥" nameColor={cA.text} n={3} part={small} color={cA.bar} mode={mode}
                            tail={step >= 2 ? tag('3 份', 'text-blue-500') : null} />
                        {step >= 2 && <Brace widthUnits={5 * small} label="年龄和 30 岁 = 5 份" color="text-green-600" />}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">年龄差 = 弟弟的一半，把一份差当 1 段：弟弟 = 2 份、哥哥 = 3 份，合起来 5 份 = 30 岁。</p>}
                    </div>
                );
            }
            return null;
        }

        // 归一问题示意图：突出"先求一份"
        function buildNormBars(q, step, mode) {
            const cA = COLORS.A, cB = COLORS.B;
            const data = {
                flag:   { whole: '3 个同学 · 2 小时 → 120 面', one: '1 人 · 1 小时 → 20 面', want: '10 人 · 2.5 小时 → 500 面' },
                save:   { whole: '每月 66 元 × 12 月 → 792 元', one: '总价 792 元（不变）', want: '792 ÷ 99 = 8 个月，少 4 个月' },
                banana: { whole: '6 只 · 8 天 → 24 个', one: '1 只 · 1 天 → 0.5 个', want: '9 只 · 10 天 → 45 个' },
                walk:   { whole: '72 米/分 × 12 分 → 864 米', one: '总路程 864 米（不变）', want: '864 ÷ 96 = 9 分钟' },
            }[q.id];
            const line = (label, text, color) => (
                <div className="flex items-center gap-3 mb-3">
                    <div className={"w-20 text-right font-bold shrink-0 text-sm " + color}>{label}</div>
                    <div className={"px-3 py-2 rounded-lg text-base font-mono " + (color === 'text-gray-400' ? 'bg-gray-50 text-gray-500' : 'bg-white border')}>{text}</div>
                </div>
            );
            return (
                <div>
                    {line('已知', data.whole, cA.text)}
                    {step >= 2 && line('归一·一份', data.one, 'text-amber-600')}
                    {step >= 3 && line('求', data.want, cB.text)}
                    {step >= 2 && <p className="text-sm text-gray-400 mt-1">归一问题的关键：先算出"一份"（每人每小时 / 总价 / 每只每天 / 总路程），再用它去求要的答案。</p>}
                </div>
            );
        }

        // 间隔问题示意图：植树两头都装 / 方阵外圈 / 爬楼梯段数
        function buildGapBars(q, step, mode) {
            const cA = COLORS.A;
            if (q.id === 'lamp' || q.id === 'ringflag') {
                // 用一排点表示"间隔点"，强调点数 = 段数(±1)
                const dots = 7;
                return (
                    <div>
                        <div className="flex items-center gap-2 mb-3 flex-wrap">
                            {Array.from({ length: dots }).map((_, i) => (
                                <div key={i} className="flex items-center">
                                    <div className={"w-4 h-4 rounded-full " + cA.bar}></div>
                                    {i < dots - 1 && <div className="w-8 h-0.5 bg-gray-300 mx-1"></div>}
                                </div>
                            ))}
                        </div>
                        {step >= 2 && <p className="text-sm text-gray-600">{q.id === 'lamp'
                            ? '一条路两头都装：点数 = 段数 + 1。能"共用"的位置在 6 与 8 的公倍数（24 米）处。'
                            : '环形一圈：点数 = 段数。没动的彩旗把 400 米平均分成 5 段，每段 80 米。'}</p>}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">{q.id === 'lamp'
                            ? '2400 ÷ 24 = 100 段，两头都装 → 100 + 1 = 101 个位置。'
                            : '80 米既是 16 的倍数、又要被新间隔整除，且彩旗更多 → 新间隔 10 米。'}</p>}
                    </div>
                );
            }
            if (q.id === 'square') {
                // 6x6 方阵：外圈红(男)、内部蓝(女)
                const N = 6;
                return (
                    <div>
                        <div className="inline-block">
                            {Array.from({ length: N }).map((_, r) => (
                                <div key={r} className="flex">
                                    {Array.from({ length: N }).map((_, c) => {
                                        const edge = r === 0 || r === N - 1 || c === 0 || c === N - 1;
                                        return <div key={c} className={"rounded-sm border border-white/60 " + (edge ? COLORS.B.bar : COLORS.A.bar)}
                                            style={{ width: 22, height: 22, margin: 2 }}></div>;
                                    })}
                                </div>
                            ))}
                        </div>
                        {step >= 2 && <p className="text-sm text-gray-600 mt-2">
                            <span className="inline-block w-3 h-3 rounded-sm align-middle mr-1" style={{ background: '#f43f5e' }}></span>外圈男生 = 6×4 − 4 = 20 人
                            <span className="inline-block w-3 h-3 rounded-sm align-middle mr-1 ml-3" style={{ background: '#3b82f6' }}></span>里面女生 = 4×4 = 16 人</p>}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">这是一个方阵；4 个方阵：男 20×4 = 80 人，女 16×4 = 64 人。</p>}
                    </div>
                );
            }
            if (q.id === 'stairs') {
                // 楼层数 vs 段数
                const floors = (n, color, name) => (
                    <div className="flex items-center gap-3 mb-3">
                        <div className={"w-12 text-right font-bold shrink-0 " + color}>{name}</div>
                        <div className="flex items-end">
                            {Array.from({ length: n }).map((_, i) => (
                                <div key={i} className={"border border-white/60 " + (color.includes('blue') ? COLORS.A.bar : COLORS.B.bar)}
                                    style={{ width: 14, height: 12 + i * 6 }}></div>
                            ))}
                            <span className="ml-2 text-sm text-gray-500">爬了 {n - 1} 段</span>
                        </div>
                    </div>
                );
                return (
                    <div>
                        {floors(4, COLORS.A.text, '甲')}
                        {floors(3, COLORS.B.text, '乙')}
                        {step >= 2 && <p className="text-sm text-gray-600 mt-1">到几层 → 爬"层数 − 1"段。甲 3 段、乙 2 段，速度比 3 : 2。</p>}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">甲到 16 层爬 15 段，乙爬 15 ÷ 3 × 2 = 10 段 → 第 11 层。</p>}
                    </div>
                );
            }
            return null;
        }

        // 移多补少示意图：两条对比，差缩小 / 平均数
        function buildMoveBars(q, step, mode) {
            const cA = COLORS.A, cB = COLORS.B;
            if (q.id === 'candy' || q.id === 'bag') {
                const big = q.id === 'candy' ? 10 : 8;   // 用方块比例示意（非真实数量）
                const small = q.id === 'candy' ? 4 : 4;
                const diffUnits = big - small;
                return (
                    <div>
                        <BarRow name={q.id === 'candy' ? '哥哥' : '第一袋'} nameColor={cA.text} mode={mode}
                            segments={[{ value: small, color: cA.bar }, { value: diffUnits, color: cA.bar, dashed: step >= 2, label: step >= 2 ? (q.id === 'candy' ? '多 24 块' : '多 16 块') : '' }]} />
                        <BarRow name={q.id === 'candy' ? '弟弟' : '第二袋'} nameColor={cB.text} mode={mode}
                            segments={[{ value: small, color: cB.bar }]} />
                        {step >= 2 && <p className="text-sm text-gray-600 mt-1">想让两条一样长，要把多出来的那段（虚线）平分给两边。</p>}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">每移 4 块，差就缩小 4 + 4 = 8 块。{q.id === 'candy' ? '24 ÷ 8 = 3 次。' : '16 ÷ 8 = 2 次。'}</p>}
                    </div>
                );
            }
            if (q.id === 'average') {
                return (
                    <div>
                        <div className="flex items-center gap-3 mb-3">
                            <div className={"w-16 text-right font-bold shrink-0 " + cB.text}>这次</div>
                            <div className={"px-3 py-2 rounded-lg font-mono " + cB.light + " " + cB.text}>100 分</div>
                            {step >= 2 && <span className="text-sm text-amber-600 font-semibold">比新平均 86 高出 14 分 →</span>}
                        </div>
                        {step >= 2 && (
                            <div className="flex items-center gap-3 mb-3">
                                <div className={"w-16 text-right font-bold shrink-0 " + cA.text}>前几次</div>
                                <div className={"px-3 py-2 rounded-lg font-mono " + cA.light + " " + cA.text}>每次 84 分</div>
                                <span className="text-sm text-gray-500">每次要补 86 − 84 = 2 分</span>
                            </div>
                        )}
                        {step >= 2 && <p className="text-sm text-gray-400 mt-1">把多出的 14 分匀给前面：14 ÷ 2 = 7 次，再加上这一次 → 第 8 次。</p>}
                    </div>
                );
            }
            return null;
        }

        // 主题配色（用完整类名，避免 Tailwind CDN 拼接类名扫描不到）
        const THEME = {
            rose: { on: 'bg-rose-500 text-white', soft: 'bg-rose-100 text-rose-600', panel: 'bg-rose-50 border-rose-100',
                    btn: 'bg-rose-500 hover:bg-rose-600', num: 'text-rose-400', ans: 'text-rose-600' },
            teal: { on: 'bg-teal-500 text-white', soft: 'bg-teal-100 text-teal-600', panel: 'bg-teal-50 border-teal-100',
                    btn: 'bg-teal-500 hover:bg-teal-600', num: 'text-teal-400', ans: 'text-teal-600' },
            indigo: { on: 'bg-indigo-500 text-white', soft: 'bg-indigo-100 text-indigo-600', panel: 'bg-indigo-50 border-indigo-100',
                    btn: 'bg-indigo-500 hover:bg-indigo-600', num: 'text-indigo-400', ans: 'text-indigo-600' },
            emerald: { on: 'bg-emerald-500 text-white', soft: 'bg-emerald-100 text-emerald-600', panel: 'bg-emerald-50 border-emerald-100',
                    btn: 'bg-emerald-500 hover:bg-emerald-600', num: 'text-emerald-400', ans: 'text-emerald-600' },
            orange: { on: 'bg-orange-500 text-white', soft: 'bg-orange-100 text-orange-600', panel: 'bg-orange-50 border-orange-100',
                    btn: 'bg-orange-500 hover:bg-orange-600', num: 'text-orange-400', ans: 'text-orange-600' },
        };

        // 通用"读题—画图—列式"演示组件（终极挑战 / 年龄问题共用）
        // theme: THEME 里的键名（'rose' / 'teal'）；buildBars: 专属画图函数
        const StoryMode = ({ data, qi, setQi, theme, buildBars }) => {
            const [step, setStep] = useState(0);
            const [mode, setMode] = useState('block');
            const q = data[qi];
            const t = THEME[theme];

            useEffect(() => { setStep(0); }, [qi, data]);
            const next = () => setQi((qi + 1) % data.length);
            const prev = () => setQi((qi - 1 + data.length) % data.length);

            const stepNames = ['① 读题，找关键词', '② 画出已知的量', '③ 画出数量关系', '④ 列式计算'];

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
                        <div className="flex gap-2">
                            <button onClick={prev} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">‹ 上一题</button>
                            <button onClick={next} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">下一题 ›</button>
                        </div>
                        <div className="flex gap-1 items-center">
                            <span className="text-sm text-gray-400 mr-1">画法</span>
                            <button onClick={() => setMode('block')} className={"px-3 py-1.5 rounded-lg text-sm smooth " + (mode==='block'?t.on:'bg-gray-100 text-gray-500')}>方块</button>
                            <button onClick={() => setMode('line')} className={"px-3 py-1.5 rounded-lg text-sm smooth " + (mode==='line'?t.on:'bg-gray-100 text-gray-500')}>线段</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-5 mb-5 border border-gray-100">
                        <HighlightStory story={q.story} keywords={q.keywords} active={step >= 1} />
                    </div>

                    <div className="flex gap-2 mb-5 flex-wrap">
                        {stepNames.map((s, i) => (
                            <div key={i} className={"px-3 py-1.5 rounded-full text-sm font-semibold smooth " +
                                (step === i ? t.on : step > i ? t.soft : 'bg-gray-100 text-gray-400')}>{s}</div>
                        ))}
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-6 mb-5 border border-gray-100 overflow-x-auto" style={{ minHeight: 160 }}>
                        {step === 0 && <p className="text-gray-400 text-center py-12">先读题，把关键词找出来，再点"下一步"开始画图 →</p>}
                        {step >= 1 && buildBars(q, step, mode)}
                        {step === 1 && <p className="text-sm text-gray-400 mt-2">先照着题意把各个量画出来。下一步再标出它们之间的关系 →</p>}
                    </div>

                    {step >= 3 && (
                        <div className={"rounded-xl p-5 mb-5 border fade-in " + t.panel}>
                            <p className="text-gray-500 mb-2 text-sm">一步一步把它解出来：</p>
                            {q.steps.map((s, i) => (
                                <p key={i} className="text-lg mb-2 text-gray-700">
                                    <span className={"inline-block w-6 font-mono " + t.num}>{i + 1}.</span>{s}
                                </p>
                            ))}
                            <p className="mt-3 text-lg text-gray-700">答：<span className={"font-bold " + t.ans}>{q.answer}</span></p>
                        </div>
                    )}

                    <div className="flex gap-3">
                        {step > 0 && <button onClick={() => setStep(step - 1)} className="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-600 smooth">上一步</button>}
                        {step < 3 && <button onClick={() => setStep(step + 1)} className={"px-6 py-2.5 text-white rounded-lg font-semibold smooth " + t.btn}>下一步 →</button>}
                        {step === 3 && <button onClick={() => setStep(0)} className="px-6 py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold smooth">从头再看一遍</button>}
                    </div>
                </div>
            );
        };

        // ============================================================
        // 互动练习模式：给题，学生选关系类型 + 填式子 + 判分
        // ============================================================
        const PRACTICE = [
            { story: '小红有 6 个气球，小明比小红多 4 个。小明有几个？', ops: ['+','−','×'], correctOp: '+', a: 6, b: 4, answer: 10, hint: '"多"是求大数，用加法。' },
            { story: '篮子里有 12 个苹果，吃掉了 5 个，还剩几个？', ops: ['+','−','×'], correctOp: '−', a: 12, b: 5, answer: 7, hint: '"吃掉/还剩"是去掉一部分，用减法。' },
            { story: '一盘有 4 个包子，3 盘一共几个？', ops: ['+','−','×'], correctOp: '×', a: 4, b: 3, answer: 12, hint: '"几盘，每盘几个"是几个几，用乘法。' },
            { story: '哥哥 8 岁，弟弟 5 岁，哥哥比弟弟大几岁？', ops: ['+','−','×'], correctOp: '−', a: 8, b: 5, answer: 3, hint: '"大几岁/相差"是求差，用减法。' },
            { story: '一个文具盒 7 元，买 2 个要多少钱？', ops: ['+','−','×'], correctOp: '×', a: 7, b: 2, answer: 14, hint: '"每个几元，买几个"是几个几，用乘法。' },
        ];

        const PracticeMode = () => {
            const [pi, setPi] = useState(0);
            const [op, setOp] = useState(null);
            const [input, setInput] = useState('');
            const [checked, setChecked] = useState(false);
            const p = PRACTICE[pi];

            const opOk = op === p.correctOp;
            const ansOk = Number(input) === p.answer;
            const allOk = checked && opOk && ansOk;

            const reset = () => { setOp(null); setInput(''); setChecked(false); };
            const nextQ = () => { setPi((pi + 1) % PRACTICE.length); reset(); };

            return (
                <div className="fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <span className="text-sm text-gray-400">第 {pi + 1} / {PRACTICE.length} 题</span>
                        <button onClick={nextQ} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 smooth">换一题 ›</button>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-6 mb-5 border border-gray-100">
                        <p className="text-xl text-gray-800 mb-5">{p.story}</p>

                        <p className="text-sm text-gray-400 mb-2">① 想一想，这道题用什么运算？</p>
                        <div className="flex gap-3 mb-6">
                            {p.ops.map(o => (
                                <button key={o} onClick={() => { setOp(o); setChecked(false); }}
                                    className={"w-14 h-14 rounded-xl text-2xl font-bold smooth border-2 " +
                                        (op === o ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300')}>{o}</button>
                            ))}
                        </div>

                        <p className="text-sm text-gray-400 mb-2">② 把式子填完整：</p>
                        <div className="flex items-center gap-2 text-2xl font-mono flex-wrap">
                            <span className="px-3 py-2 bg-gray-100 rounded">{p.a}</span>
                            <span className="font-bold text-gray-500 w-8 text-center">{op || '?'}</span>
                            <span className="px-3 py-2 bg-gray-100 rounded">{p.b}</span>
                            <span className="font-bold">=</span>
                            <input type="number" value={input} onChange={e => { setInput(e.target.value); setChecked(false); }}
                                className="w-24 text-center border-2 border-blue-300 rounded p-2" placeholder="?" />
                        </div>
                    </div>

                    <div className="flex gap-3 items-center">
                        <button onClick={() => setChecked(true)} disabled={!op || input === ''}
                            className="px-6 py-2.5 bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white rounded-lg font-semibold smooth">判分</button>
                        {allOk && <button onClick={nextQ} className="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold smooth">下一题 →</button>}
                    </div>

                    {checked && (
                        <div className={"mt-5 rounded-xl p-5 border fade-in " + (allOk ? 'bg-green-50 border-green-200' : 'bg-amber-50 border-amber-200')}>
                            {allOk
                                ? <p className="text-green-700 text-lg font-bold">✓ 完全正确！{p.a} {op} {p.b} = {p.answer}</p>
                                : <div className="text-amber-700">
                                    {!opOk && <p className="mb-1">运算符号再想想哦。{p.hint}</p>}
                                    {opOk && !ansOk && <p className="mb-1">运算选对了！算一算 {p.a} {p.correctOp} {p.b} 等于几？</p>}
                                  </div>}
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // 顶层：模块标签页（基础 / 和差倍 / 年龄 / 归一 / 间隔 / 移多补少 / 练习）
        // ============================================================
        // 各模块的配色（完整类名，避免 Tailwind CDN 拼接扫描不到）
        const MOD_STYLE = {
            blue:    { tab: 'bg-blue-500 text-white',    dot: 'bg-blue-400',    head: 'text-blue-500',    on: 'bg-blue-500 text-white font-semibold' },
            purple:  { tab: 'bg-purple-500 text-white',  dot: 'bg-purple-400',  head: 'text-purple-500',  on: 'bg-purple-500 text-white font-semibold' },
            teal:    { tab: 'bg-teal-500 text-white',    dot: 'bg-teal-400',    head: 'text-teal-500',    on: 'bg-teal-500 text-white font-semibold' },
            indigo:  { tab: 'bg-indigo-500 text-white',  dot: 'bg-indigo-400',  head: 'text-indigo-500',  on: 'bg-indigo-500 text-white font-semibold' },
            emerald: { tab: 'bg-emerald-500 text-white', dot: 'bg-emerald-400', head: 'text-emerald-500', on: 'bg-emerald-500 text-white font-semibold' },
            orange:  { tab: 'bg-orange-500 text-white',  dot: 'bg-orange-400',  head: 'text-orange-500',  on: 'bg-orange-500 text-white font-semibold' },
            green:   { tab: 'bg-green-500 text-white',   dot: 'bg-green-400',   head: 'text-green-500',   on: 'bg-green-500 text-white font-semibold' },
        };

        // 左侧题目列表项
        const SideItem = ({ active, color, children, onClick }) => (
            <button onClick={onClick}
                className={"w-full text-left px-3 py-2 rounded-lg text-sm smooth mb-1 flex items-center gap-2 " +
                    (active ? MOD_STYLE[color].on : 'text-gray-600 hover:bg-gray-100')}>
                <span className={"w-1.5 h-1.5 rounded-full shrink-0 " + (active ? 'bg-white' : MOD_STYLE[color].dot)}></span>
                {children}
            </button>
        );

        // 模块配置：id / 标签 / 配色 / 包含的题目分组（每组指定数据与渲染方式）
        const MODULES = [
            { id: 'basic',   label: '基础问题',   color: 'blue',
              groups: [ { title: '基础版 · 单步', data: BASIC, render: 'basic' } ] },
            { id: 'sumdiff', label: '和差倍问题', color: 'purple',
              groups: [ { title: '基础 · 和倍/差倍/和差', data: ADVANCED, render: 'advanced' },
                        { title: '终极挑战', data: ULTIMATE, render: 'story', theme: 'rose', bars: 'ultimate' } ] },
            { id: 'age',     label: '年龄问题',   color: 'teal',
              groups: [ { title: '年龄问题', data: AGE, render: 'story', theme: 'teal', bars: 'age' } ] },
            { id: 'norm',    label: '归一问题',   color: 'indigo',
              groups: [ { title: '归一问题', data: NORM, render: 'story', theme: 'indigo', bars: 'norm' } ] },
            { id: 'gap',     label: '间隔问题',   color: 'emerald',
              groups: [ { title: '植树 / 排队 / 方阵 / 爬楼', data: GAP, render: 'story', theme: 'emerald', bars: 'gap' } ] },
            { id: 'move',    label: '移多补少',   color: 'orange',
              groups: [ { title: '移多补少 / 平均数', data: MOVE, render: 'story', theme: 'orange', bars: 'move' } ] },
            { id: 'practice',label: '我来试试',   color: 'green',
              groups: [ { title: '选运算 · 填式判分', render: 'practice' } ] },
        ];

        // 画图函数 / 模式组件 的查表
        const BARS = { ultimate: buildUltimateBars, age: buildAgeBars, norm: buildNormBars, gap: buildGapBars, move: buildMoveBars };

        const App = () => {
            const [modId, setModId] = useState('basic');
            // 每个数据组各自记住当前选中的题号：用 "moduleId/groupIndex" 作 key
            const [sel, setSel] = useState({});
            // 每个模块当前"激活"的分组（多分组模块如和差倍，主区只显示激活的那组）
            const [activeGroup, setActiveGroup] = useState({});
            const mod = MODULES.find(m => m.id === modId);
            const getSel = (key) => sel[key] || 0;
            const setSelFor = (key) => (i) => setSel(s => ({ ...s, [key]: typeof i === 'function' ? i(s[key] || 0) : i }));
            const curGroup = activeGroup[modId] || 0;

            return (
                <div className="max-w-5xl mx-auto px-4 py-8">
                    <header className="text-center mb-5">
                        <h1 className="text-3xl font-bold text-gray-800">读题 · 画图 · 列式</h1>
                        <p className="text-gray-500 mt-2">把文字、图和式子对应起来，分类突破各种应用题</p>
                    </header>

                    {/* 顶部模块标签 */}
                    <div className="flex flex-wrap gap-2 justify-center mb-6">
                        {MODULES.map(m => (
                            <button key={m.id} onClick={() => setModId(m.id)}
                                className={"px-4 py-2 rounded-full text-sm font-semibold smooth border " +
                                    (modId === m.id ? MOD_STYLE[m.color].tab + ' border-transparent shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300')}>
                                {m.label}
                            </button>
                        ))}
                    </div>

                    <div className="flex flex-col md:flex-row gap-6 items-start">
                        {/* 左侧：当前模块的题目列表 */}
                        {mod.id !== 'practice' && (
                            <aside className="w-full md:w-56 shrink-0 bg-white rounded-xl shadow-sm border border-gray-100 p-3 md:sticky md:top-6">
                                {mod.groups.map((g, gi) => {
                                    const key = mod.id + '/' + gi;
                                    return (
                                        <div key={gi}>
                                            <div className={"px-2 pb-2 text-xs font-bold tracking-wide " + (gi > 0 ? 'pt-3 ' : 'pt-1 ') + MOD_STYLE[mod.color].head}>{g.title}</div>
                                            {g.data.map((q, i) => (
                                                <SideItem key={i} color={mod.color} active={curGroup === gi && getSel(key) === i}
                                                    onClick={() => { setActiveGroup(s => ({ ...s, [mod.id]: gi })); setSelFor(key)(i); }}>
                                                    {q.label}
                                                </SideItem>
                                            ))}
                                        </div>
                                    );
                                })}
                            </aside>
                        )}

                        {/* 右侧：主演示区（只显示当前激活的分组） */}
                        <main className="flex-1 min-w-0 w-full">
                            {(() => {
                                const gi = Math.min(curGroup, mod.groups.length - 1);
                                const g = mod.groups[gi];
                                const key = mod.id + '/' + gi;
                                const qi = getSel(key), setQi = setSelFor(key);
                                if (g.render === 'practice') return <PracticeMode />;
                                if (g.render === 'basic')    return <BasicMode qi={qi} setQi={setQi} />;
                                if (g.render === 'advanced') return <AdvancedMode qi={qi} setQi={setQi} />;
                                if (g.render === 'story')    return <StoryMode data={g.data} qi={qi} setQi={setQi} theme={g.theme} buildBars={BARS[g.bars]} />;
                                return null;
                            })()}
                        </main>
                    </div>

                    <footer className="text-center text-gray-400 text-sm mt-10">
                        Math101 · 数量关系可视化 · 小学应用题分类突破
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
