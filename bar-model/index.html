<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读题·画图·列式 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.45s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .smooth { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        /* 方块出现动画 */
        .cell-pop { animation: pop 0.35s ease; }
        @keyframes pop { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
        /* 关键词高亮的脉冲 */
        .kw-pulse { animation: kwpulse 1.2s ease-in-out infinite; }
        @keyframes kwpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.0); } 50% { box-shadow: 0 0 0 4px rgba(251,191,36,0.35); } }
        .grow-bar { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ============================================================
        // 题库：每道题描述一种"数量关系语句"
        // kind: compare-more 比多 / compare-less 比少 / total 一共 /
        //       difference 相差 / times 几倍 /
        //       sum-times 和倍 / diff-times 差倍 / sum-diff 和差
        // ============================================================
        const COLORS = {
            A: { bar: 'bg-blue-500', light: 'bg-blue-100', text: 'text-blue-600', border: 'border-blue-400', ring: 'ring-blue-300' },
            B: { bar: 'bg-rose-500', light: 'bg-rose-100', text: 'text-rose-600', border: 'border-rose-400', ring: 'ring-rose-300' },
            diff: { bar: 'bg-amber-400', light: 'bg-amber-100', text: 'text-amber-600', border: 'border-amber-400', ring: 'ring-amber-300' },
        };

        // 统一的方块尺寸：所有题型、所有模式共用，保证大小一致
        const CELL = { w: 30, h: 30, gap: 3 };        // 方块边长与间距（px）
        const UNIT = CELL.w + CELL.gap;               // 每个单位占的宽度（含间距），线段图也用它换算长度

        // 一个标准方块（实心 / 虚线两种）
        const Cell = ({ dashed }) => (
            <div className={"cell-pop rounded-sm shrink-0 " +
                (dashed ? 'border-2 border-dashed border-amber-400 bg-amber-100 ' : 'border border-white/60 ')}
                style={{ width: CELL.w, height: CELL.h, marginRight: CELL.gap }}></div>
        );
        // 带颜色的实心方块（颜色类名由调用方给）
        const ColorCell = ({ color }) => (
            <div className={"cell-pop rounded-sm shrink-0 border border-white/60 " + color}
                style={{ width: CELL.w, height: CELL.h, marginRight: CELL.gap }}></div>
        );

        // 基础版题库（单步：加 / 减 / 乘）
        const BASIC = [
            {
                label: '比多（求大数）①', kind: 'compare-more', unit: '个',
                nameA: '小明', nameB: '小红', item: '贴纸',
                story: '小红有 5 个贴纸，小明比小红多 3 个。小明有几个？',
                keywords: [ {text:'比小红多', type:'more'}, {text:'3 个', type:'num'} ],
                base: 5, gap: 3, ask: 'A',  // 已知 B=5、多 gap，求 A
            },
            {
                label: '比多（求大数）②', kind: 'compare-more', unit: '颗',
                nameA: '弟弟', nameB: '姐姐', item: '草莓',
                story: '姐姐摘了 4 颗草莓，弟弟比姐姐多摘 5 颗。弟弟摘了几颗？',
                keywords: [ {text:'比姐姐多摘', type:'more'}, {text:'5 颗', type:'num'} ],
                base: 4, gap: 5, ask: 'A',
            },
            {
                label: '比少（求小数）①', kind: 'compare-less', unit: '本',
                nameA: '小明', nameB: '小红', item: '故事书',
                story: '小明有 8 本书，小红比小明少 2 本。小红有几本？',
                keywords: [ {text:'比小明少', type:'less'}, {text:'2 本', type:'num'} ],
                base: 8, gap: 2, ask: 'B', // 已知 A=8、少 gap，求 B
            },
            {
                label: '比少（求小数）②', kind: 'compare-less', unit: '辆',
                nameA: '红色车', nameB: '蓝色车', item: '玩具车',
                story: '红色车有 7 辆，蓝色车比红色车少 3 辆。蓝色车有几辆？',
                keywords: [ {text:'比红色车少', type:'less'}, {text:'3 辆', type:'num'} ],
                base: 7, gap: 3, ask: 'B',
            },
            {
                label: '一共（求总数）①', kind: 'total', unit: '只',
                nameA: '白兔', nameB: '黑兔', item: '兔子',
                story: '草地上有白兔 6 只，黑兔 4 只。一共有几只兔子？',
                keywords: [ {text:'一共', type:'total'} ],
                valA: 6, valB: 4, ask: 'total',
            },
            {
                label: '一共（求总数）②', kind: 'total', unit: '朵',
                nameA: '红花', nameB: '黄花', item: '花',
                story: '花瓶里插了红花 5 朵，黄花 7 朵。一共插了几朵花？',
                keywords: [ {text:'一共', type:'total'} ],
                valA: 5, valB: 7, ask: 'total',
            },
            {
                label: '相差（多几）①', kind: 'difference', unit: '颗',
                nameA: '哥哥', nameB: '弟弟', item: '糖',
                story: '哥哥有 9 颗糖，弟弟有 6 颗糖。哥哥比弟弟多几颗？',
                keywords: [ {text:'多几颗', type:'morewh'} ],
                valA: 9, valB: 6, ask: 'diff',
            },
            {
                label: '相差（多几）②', kind: 'difference', unit: '本',
                nameA: '小红', nameB: '小芳', item: '本子',
                story: '小红有 12 本本子，小芳有 8 本。小红比小芳多几本？',
                keywords: [ {text:'多几本', type:'morewh'} ],
                valA: 12, valB: 8, ask: 'diff',
            },
            {
                label: '几倍（求倍数）①', kind: 'times', unit: '朵',
                nameA: '小华', nameB: '小丽', item: '花',
                story: '小丽折了 4 朵花，小华折的是小丽的 3 倍。小华折了几朵？',
                keywords: [ {text:'小丽的 3 倍', type:'times'} ],
                base: 4, factor: 3, ask: 'A', // A = B × factor
            },
            {
                label: '几倍（求倍数）②', kind: 'times', unit: '个',
                nameA: '鸭子', nameB: '鹅', item: '只',
                story: '池塘里有鹅 3 只，鸭子的只数是鹅的 4 倍。鸭子有几只？',
                keywords: [ {text:'鹅的 4 倍', type:'times'} ],
                base: 3, factor: 4, ask: 'A',
            },
        ];

        // 复杂版题库（两步：和差倍）
        const ADVANCED = [
            {
                label: '和倍问题①', kind: 'sum-times', unit: '本',
                nameA: '故事书', nameB: '科技书', item: '书',
                story: '书架上故事书和科技书一共 24 本，故事书的数量是科技书的 3 倍。两种书各有几本？',
                keywords: [ {text:'一共 24 本', type:'total'}, {text:'是科技书的 3 倍', type:'times'} ],
                sum: 24, factor: 3, // 大(A)=小(B)×factor，A+B=sum
            },
            {
                label: '和倍问题②', kind: 'sum-times', unit: '个',
                nameA: '苹果', nameB: '梨', item: '水果',
                story: '果盘里苹果和梨一共 20 个，苹果的个数是梨的 4 倍。两种水果各有几个？',
                keywords: [ {text:'一共 20 个', type:'total'}, {text:'是梨的 4 倍', type:'times'} ],
                sum: 20, factor: 4,
            },
            {
                label: '差倍问题①', kind: 'diff-times', unit: '元',
                nameA: '哥哥', nameB: '弟弟', item: '钱',
                story: '哥哥的钱比弟弟多 20 元，哥哥的钱是弟弟的 3 倍。两人各有多少钱？',
                keywords: [ {text:'多 20 元', type:'more'}, {text:'弟弟的 3 倍', type:'times'} ],
                diff: 20, factor: 3, // A=B×factor，A-B=diff
            },
            {
                label: '差倍问题②', kind: 'diff-times', unit: '只',
                nameA: '大鱼', nameB: '小鱼', item: '鱼',
                story: '鱼缸里大鱼比小鱼多 12 只，大鱼的只数是小鱼的 4 倍。两种鱼各有几只？',
                keywords: [ {text:'多 12 只', type:'more'}, {text:'是小鱼的 4 倍', type:'times'} ],
                diff: 12, factor: 4,
            },
            {
                label: '和差问题①', kind: 'sum-diff', unit: '个',
                nameA: '小明', nameB: '小红', item: '积木',
                story: '小明和小红一共有 18 个积木，小明比小红多 4 个。两人各有几个？',
                keywords: [ {text:'一共有 18 个', type:'total'}, {text:'多 4 个', type:'more'} ],
                sum: 18, diff: 4, // A+B=sum，A-B=diff
            },
            {
                label: '和差问题②', kind: 'sum-diff', unit: '张',
                nameA: '小刚', nameB: '小强', item: '邮票',
                story: '小刚和小强一共有 20 张邮票，小刚比小强多 6 张。两人各有几张？',
                keywords: [ {text:'一共有 20 张', type:'total'}, {text:'多 6 张', type:'more'} ],
                sum: 20, diff: 6,
            },
        ];

        // ============================================================
        // 终极挑战题库（每题自带：关键词高亮 / 分步解法 / 专属画图）
        // kind 统一为 'ultimate'，用 id 区分画图样式
        // ============================================================
        const ULTIMATE = [
            {
                id: 'chalk', label: '终极①·粉笔总价', unit: '元',
                story: '学校买了 6 箱白粉笔和 3 箱彩色粉笔，共用去 630 元。已知每箱彩色粉笔比每箱白粉笔贵 30 元。每箱彩色粉笔和每箱白粉笔各多少元？',
                keywords: [ {text:'6 箱白粉笔', type:'num'}, {text:'3 箱彩色粉笔', type:'num'}, {text:'共用去 630 元', type:'total'}, {text:'贵 30 元', type:'more'} ],
                steps: [
                    '把 3 箱彩色粉笔都换成白粉笔，价钱要各减 30 元，一共减少 3 × 30 = 90（元）。',
                    '这时 9 箱全是白粉笔，总价变成 630 − 90 = 540（元）。',
                    '每箱白粉笔：540 ÷ 9 = 60（元）。',
                    '每箱彩色粉笔：60 + 30 = 90（元）。',
                ],
                answer: '每箱白粉笔 60 元，每箱彩色粉笔 90 元。',
            },
            {
                id: 'shelf', label: '终极②·书架转移', unit: '本',
                story: '有两个书架，甲书架比乙书架多 40 本书。如果从甲书架拿 5 本放入乙书架，此时甲书架的书是乙书架的 3 倍。原来甲、乙两个书架各有多少本书？',
                keywords: [ {text:'多 40 本', type:'more'}, {text:'拿 5 本放入乙', type:'less'}, {text:'是乙书架的 3 倍', type:'times'} ],
                steps: [
                    '甲拿 5 本给乙后，甲少了 5、乙多了 5，两者相差变成 40 − 5 − 5 = 30（本）。',
                    '这时甲是乙的 3 倍，相差的 30 本正好是 3 − 1 = 2 份。',
                    '现在的乙：30 ÷ 2 = 15（本）；现在的甲：15 × 3 = 45（本）。',
                    '原来的乙：15 − 5 = 10（本）；原来的甲：45 + 5 = 50（本）。',
                ],
                answer: '原来甲书架 50 本，乙书架 10 本。',
            },
            {
                id: 'money', label: '终极③·你给我给', unit: '元',
                story: '小通和小虎各有一笔钱。如果小通拿 80 元给小虎，两人的钱就同样多；如果小虎给小通 70 元，小通的钱就是小虎的 3 倍。请问他们原来各有多少钱？',
                keywords: [ {text:'拿 80 元给小虎', type:'less'}, {text:'同样多', type:'total'}, {text:'给小通 70 元', type:'more'}, {text:'是小虎的 3 倍', type:'times'} ],
                steps: [
                    '小通给小虎 80 元后两人一样多，说明原来小通比小虎多 80 + 80 = 160（元）。',
                    '小虎给小通 70 元后，小通比小虎多了 160 + 70 + 70 = 300（元）。',
                    '这时小通是小虎的 3 倍，多出的 300 元正好是 3 − 1 = 2 份。',
                    '此时小虎：300 ÷ 2 = 150（元），小通：150 × 3 = 450（元）。',
                    '原来小虎：150 + 70 = 220（元）；原来小通：450 − 70 = 380（元）。',
                ],
                answer: '原来小通 380 元，小虎 220 元。',
            },
            {
                id: 'class', label: '终极④·三班调人', unit: '人',
                story: '三年级有甲、乙、丙三个班，一共 162 人。如果从甲班转 2 人到乙班，则甲、乙两班人数相同；如果再从丙班转 3 人到乙班，则乙、丙两班人数相同。甲班原来有多少人？',
                keywords: [ {text:'一共 162 人', type:'total'}, {text:'转 2 人到乙班', type:'less'}, {text:'甲、乙两班人数相同', type:'morewh'}, {text:'转 3 人到乙班', type:'less'}, {text:'乙、丙两班人数相同', type:'morewh'} ],
                steps: [
                    '甲转 2 人给乙后两班相等，说明甲比乙多 2 + 2 = 4（人）。',
                    '再从丙转 3 人给乙后乙、丙相等。把乙看作基准：甲 = 乙 + 4，丙 = 乙 + 8（人）。',
                    '三班合起来：乙 + 4 + 乙 + 乙 + 8 = 162，即 3 个乙 + 12 = 162。',
                    '乙班：(162 − 12) ÷ 3 = 50（人）。',
                    '甲班：50 + 4 = 54（人）。',
                ],
                answer: '甲班原来有 54 人。（乙班 50 人，丙班 58 人）',
            },
            {
                id: 'subtract', label: '终极⑤·减法三数', unit: '',
                story: '一个减法算式，被减数、减数与差的和等于 120，减数是差的 3 倍，那么差是多少？',
                keywords: [ {text:'被减数、减数与差的和等于 120', type:'total'}, {text:'减数是差的 3 倍', type:'times'} ],
                steps: [
                    '减法里：被减数 = 减数 + 差，所以被减数刚好等于"减数 + 差"。',
                    '三个数相加 = (减数 + 差) + 减数 + 差 = 2 个被减数 = 120，被减数 = 60。',
                    '减数 + 差 = 60，又知减数是差的 3 倍，于是差 + 3 个差 = 4 份 = 60。',
                    '差：60 ÷ 4 = 15。（减数 = 45，被减数 = 60）',
                ],
                answer: '差是 15。',
            },
            {
                id: 'pieces', label: '终极⑥·棋子搬家', unit: '个',
                story: '有两堆棋子，第一堆有 87 个，第二堆有 69 个。从第一堆拿多少个棋子到第二堆，就能使第二堆棋子数是第一堆的 3 倍？',
                keywords: [ {text:'第一堆有 87 个', type:'num'}, {text:'第二堆有 69 个', type:'num'}, {text:'第二堆棋子数是第一堆的 3 倍', type:'times'} ],
                steps: [
                    '搬来搬去，两堆的总数不变：87 + 69 = 156（个）。',
                    '搬完后第二堆是第一堆的 3 倍，总数正好是 1 + 3 = 4 份。',
                    '搬完后第一堆：156 ÷ 4 = 39（个）；第二堆：39 × 3 = 117（个）。',
                    '要从第一堆拿走：87 − 39 = 48（个）。',
                ],
                answer: '从第一堆拿 48 个到第二堆。',
            },
        ];

        // ============================================================
        // 年龄问题题库（同样：关键词高亮 / 分步解法 / 专属画图）
        // 关键：两人年龄差永远不变！这是解年龄题的"法宝"。
        // ============================================================
        const AGE = [
            {
                id: 'mother', label: '年龄①·母子年龄', unit: '岁',
                story: '6 年前，母亲的年龄是儿子的 5 倍。5 年后，母子年龄和是 76 岁。母亲今年多少岁？',
                keywords: [ {text:'6 年前', type:'less'}, {text:'是儿子的 5 倍', type:'times'}, {text:'5 年后', type:'more'}, {text:'年龄和是 76 岁', type:'total'} ],
                steps: [
                    '把时间倒回到 6 年前来想：那时母亲是儿子的 5 倍。',
                    '5 年后两人年龄和是 76 岁，每人都长了 5 岁，倒回到今年要各减 5 岁：今年和 = 76 − 5 − 5 = 66（岁）。',
                    '再倒回 6 年前，每人各减 6 岁：那时的年龄和 = 66 − 6 − 6 = 54（岁）。',
                    '6 年前母是子的 5 倍，和正好是 5 + 1 = 6 份：儿子(6 年前) = 54 ÷ 6 = 9（岁）。',
                    '母亲(6 年前) = 9 × 5 = 45（岁）；母亲今年 = 45 + 6 = 51（岁）。',
                ],
                answer: '母亲今年 51 岁。',
            },
            {
                id: 'wangli', label: '年龄②·错时年龄', unit: '岁',
                story: '王燕 3 年前的年龄等于李龙 3 年后的年龄。王燕 4 年前和李龙 5 年后的年龄和是 41 岁。王燕和李龙今年各多少岁？',
                keywords: [ {text:'王燕 3 年前', type:'less'}, {text:'等于李龙 3 年后', type:'morewh'}, {text:'王燕 4 年前', type:'less'}, {text:'李龙 5 年后', type:'more'}, {text:'和是 41 岁', type:'total'} ],
                steps: [
                    '王燕 3 年前 = 李龙 3 年后，说明王燕比李龙大 3 + 3 = 6（岁）。这个差永远不变。',
                    '把"王燕 4 年前"和"李龙 5 年后"都换回今年：41 = (王燕 − 4) + (李龙 + 5) = 王燕 + 李龙 + 1。',
                    '所以王燕 + 李龙(今年) = 41 − 1 = 40（岁）。',
                    '已知王燕比李龙大 6 岁：李龙 = (40 − 6) ÷ 2 = 17（岁）。',
                    '王燕 = 17 + 6 = 23（岁）。',
                ],
                answer: '王燕今年 23 岁，李龙今年 17 岁。',
            },
            {
                id: 'brothers', label: '年龄③·哥弟年龄', unit: '岁',
                story: '兄弟俩今年的年龄和是 30 岁。当哥哥像弟弟现在这样大时，弟弟的年龄恰好是哥哥年龄的一半。哥哥今年多少岁？',
                keywords: [ {text:'年龄和是 30 岁', type:'total'}, {text:'当哥哥像弟弟现在这样大时', type:'less'}, {text:'是哥哥年龄的一半', type:'times'} ],
                steps: [
                    '"当哥哥像弟弟现在这样大时"，就是把时间倒回 (哥 − 弟) 年。那时哥哥 = 弟弟现在的年龄。',
                    '年龄差不变。那时弟弟是哥哥的一半，也就是弟弟(那时) = 弟弟现在 ÷ 2，少掉的正好是一个年龄差。',
                    '所以"年龄差"= 弟弟现在年龄的一半，即弟弟现在 = 2 个年龄差。',
                    '于是哥哥 = 弟弟 + 差 = 3 个差，弟弟 = 2 个差，两人和 = 5 个差 = 30，差 = 6（岁）。',
                    '哥哥今年 = 3 × 6 = 18（岁）。（弟弟 12 岁）',
                ],
                answer: '哥哥今年 18 岁。',
            },
        ];

        // ============================================================
        // 归一问题题库（先求"一份/单位量"，再按需要倍数）
        // ============================================================
        const NORM = [
            {
                id: 'flag', label: '归一①·制作彩旗', unit: '人',
                story: '3 个同学 2 小时可以制作 120 面彩旗。如果要在 2.5 小时内制作 500 面彩旗，需要安排多少个同学？',

        // ============================================================
        // 间隔问题题库（植树 / 排队 / 方阵 / 爬楼梯）

        const GAP = [

                steps: [

                    '所以 80 米既是旧间隔 16 的倍数（80 ÷ 16 = 5），又是新间隔的倍数。',
                    '新间隔要比 16 小、又要能整除 80 和 400，且让彩旗变多——10 米正合适（400 ÷ 10 = 40 杆，比原来 25 杆多）。',

                    '里面的女生 = 36 − 20 = 16（女）。也可看作里面是 4 × 4 的方阵：4 × 4 = 16。',
                    '4 个方阵：男生 20 × 4 = 80（人），女生 16 × 4 = 64（人）。',

        // ============================================================
        // 移多补少 / 平均数题库（把"多的"匀给"少的"）
        // ============================================================
        const MOVE = [
            {
                id: 'candy', label: '移多补少①·分糖果', unit: '次',
                story: '妈妈分给哥哥 40 块糖果，分给弟弟 16 块。哥哥每次给弟弟 4 块，多少次后两人的糖果同样多？',
                keywords: [ {text:'哥哥 40 块', type:'num'}, {text:'弟弟 16 块', type:'num'}, {text:'每次给弟弟 4 块', type:'less'}, {text:'同样多', type:'morewh'} ],
                steps: [
                    '一开始相差：40 − 16 = 24（块）。',
                    '哥哥每给出 4 块，自己少 4、弟弟多 4，差就缩小 4 + 4 = 8（块）。',
                    '要把 24 块的差全部抹平：24 ÷ 8 = 3（次）。',
                    '验证：3 次后哥哥 40 − 12 = 28，弟弟 16 + 12 = 28，一样多。',

                answer: '3 次后两人的糖果同样多。',
            },
            {
                id: 'bag', label: '移多补少②·两袋糖', unit: '次',
                story: '有两袋糖，第一袋比第二袋多 16 块。每次从第一袋拿 4 块放入第二袋，需要拿多少次才能使两袋一样多？',
                keywords: [ {text:'多 16 块', type:'more'}, {text:'拿 4 块放入第二袋', type:'less'}, {text:'一样多', type:'morewh'} ],
                steps: [
                    '两袋相差 16 块。',
                    '每拿 4 块过去，第一袋少 4、第二袋多 4，差缩小 4 + 4 = 8（块）。',
                    '抹平 16 块的差：16 ÷ 8 = 2（次）。',
                ],
                answer: '需要拿 2 次。',
            },
            {
                id: 'average', label: '移多补少③·平均成绩', unit: '次',
                story: '明明前几次自测的平均成绩是 84 分，这次只有达到 100 分，才能把平均成绩提高到 86 分。这是他第几次自测？',
                keywords: [ {text:'平均成绩是 84 分', type:'num'}, {text:'这次只有达到 100 分', type:'num'}, {text:'提高到 86 分', type:'total'} ],
                steps: [
                    '这次考 100 分，比新平均 86 分高出 100 − 86 = 14（分），这 14 分要"补"给前面几次。',
                    '前面每一次都从 84 提到 86，每次需要补 86 − 84 = 2（分）。',
                    '前面的次数：14 ÷ 2 = 7（次）。',
                    '算上这一次：7 + 1 = 8（次）。',

                answer: '这是他第 8 次自测。',
