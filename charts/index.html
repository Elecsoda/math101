<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计表与统计图的认识 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.45s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .smooth { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-grow { transition: height 0.6s cubic-bezier(0.34, 1.2, 0.64, 1), y 0.6s cubic-bezier(0.34, 1.2, 0.64, 1); }
        .draw { transition: stroke-dashoffset 1s ease; }
        .nosel { user-select: none; -webkit-user-select: none; touch-action: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useRef, useCallback, useEffect } = React;

        const sum = (a) => a.reduce((s, x) => s + x, 0);
        const PALETTE = ['#60a5fa', '#34d399', '#fbbf24', '#f472b6', '#a78bfa', '#fb923c', '#22d3ee', '#f87171'];

        const SectionCard = ({ children, className = '' }) =>
            <div className={"bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6 " + className}>{children}</div>;

        // 一份贯穿全工具的示例数据：某班同学最喜欢的运动
        const SAMPLE = {
            title: '三(2)班同学最喜欢的运动',
            cats: ['跳绳', '篮球', '足球', '游泳', '跑步'],
            values: [12, 9, 6, 8, 5],
            unit: '人',
        };

        // ============================================================
        // 通用统计表
        // ============================================================
        const StatTable = ({ cats, values, unit = '', highlight = -1, head = '项目', valHead = '数量' }) => (
            <div className="overflow-x-auto">
                <table className="mx-auto border-collapse text-center">
                    <thead>
                        <tr>
                            <th className="border border-slate-300 bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-600">{head}</th>
                            {cats.map((c, i) => (
                                <th key={i} className={"border border-slate-300 px-4 py-2 text-sm font-semibold smooth " +
                                    (i === highlight ? "bg-blue-500 text-white" : "bg-slate-50 text-slate-600")}>{c}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td className="border border-slate-300 bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-600">{valHead}{unit ? '/' + unit : ''}</td>
                            {values.map((v, i) => (
                                <td key={i} className={"border border-slate-300 px-4 py-2 font-bold smooth " +
                                    (i === highlight ? "bg-blue-100 text-blue-700" : "text-slate-700")}>{v}</td>
                            ))}
                        </tr>
                    </tbody>
                </table>
            </div>
        );

        // ============================================================
        // 通用条形统计图（可竖可横，可点击高亮）
        // ============================================================
        const BarChart = ({ cats, values, unit = '人', onPick, picked = -1, horizontal = false, height = 280 }) => {
            const maxV = Math.max(1, ...values);
            const niceMax = Math.ceil(maxV / 2) * 2;
            const ticks = []; for (let i = 0; i <= niceMax; i += 2) ticks.push(i);

            if (horizontal) {
                const W = 460, padL = 70, padR = 50, padT = 10, padB = 10;
                const rowH = 40, gap = 12;
                const H = padT + padB + cats.length * (rowH + gap);
                const innerW = W - padL - padR;
                const xOf = (v) => padL + (v / niceMax) * innerW;
                return (
                    <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                        {ticks.map((t, i) => (
                            <g key={i}>
                                <line x1={xOf(t)} y1={padT} x2={xOf(t)} y2={H - padB} stroke="#eef2f7" />
                                <text x={xOf(t)} y={H - padB + 0} fontSize="10" fill="#cbd5e1" textAnchor="middle"></text>
                            </g>
                        ))}
                        {cats.map((c, i) => {
                            const y = padT + i * (rowH + gap);
                            const w = (values[i] / niceMax) * innerW;
                            const on = i === picked;
                            return (
                                <g key={i} onClick={() => onPick && onPick(i)} style={{ cursor: onPick ? 'pointer' : 'default' }}>
                                    <text x={padL - 8} y={y + rowH / 2 + 4} textAnchor="end" fontSize="13" fill="#4b5563">{c}</text>
                                    <rect x={padL} y={y} width={Math.max(2, w)} height={rowH} rx="5"
                                        className="bar-grow" fill={on ? '#2563eb' : PALETTE[i % PALETTE.length]} opacity={on ? 1 : 0.9} />
                                    <text x={padL + w + 8} y={y + rowH / 2 + 5} fontSize="13" fontWeight="700" fill="#374151">{values[i]}</text>
                                </g>
                            );
                        })}
                    </svg>
                );
            }

            const W = Math.max(360, cats.length * 76 + 60), H = height;
            const padB = 44, padT = 28, padL = 38, padR = 14;
            const innerH = H - padB - padT, innerW = W - padL - padR;
            const gap = innerW / cats.length, bw = gap * 0.56;
            const yOf = (v) => padT + innerH - (v / niceMax) * innerH;
            return (
                <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ maxHeight: H }}>
                    {ticks.map((t, i) => (
                        <g key={i}>
                            <line x1={padL} y1={yOf(t)} x2={W - padR} y2={yOf(t)} stroke="#eef2f7" />
                            <text x={padL - 6} y={yOf(t) + 4} textAnchor="end" fontSize="11" fill="#9ca3af">{t}</text>
                        </g>
                    ))}
                    {cats.map((c, i) => {
                        const x = padL + gap * i + (gap - bw) / 2;
                        const on = i === picked;
                        return (
                            <g key={i} onClick={() => onPick && onPick(i)} style={{ cursor: onPick ? 'pointer' : 'default' }}>
                                <rect className="bar-grow" x={x} y={yOf(values[i])} width={bw} height={Math.max(0, padT + innerH - yOf(values[i]))}
                                    rx="5" fill={on ? '#2563eb' : PALETTE[i % PALETTE.length]} opacity={on ? 1 : 0.9} />
                                <text x={x + bw / 2} y={yOf(values[i]) - 6} textAnchor="middle" fontSize="13" fontWeight="700" fill="#374151">{values[i]}</text>
                                <text x={x + bw / 2} y={H - padB + 18} textAnchor="middle" fontSize="12" fill="#4b5563">{c}</text>
                            </g>
                        );
                    })}
                    <text x={padL - 28} y={padT - 12} fontSize="11" fill="#9ca3af">{unit}</text>
                </svg>
            );
        };

        // ============================================================
        // 模块一：统计表
        // ============================================================
        const TableTab = () => {
            const [hi, setHi] = useState(-1);
            const total = sum(SAMPLE.values);
            const maxV = Math.max(...SAMPLE.values);
            const maxCat = SAMPLE.cats[SAMPLE.values.indexOf(maxV)];
            return (
                <div className="space-y-5 fade-in">
                    <SectionCard>
                        <h2 className="text-lg font-bold text-slate-800 mb-1">认识统计表</h2>
                        <p className="text-slate-600 text-sm leading-relaxed">
                            统计表用<b className="text-blue-600">表格</b>把数据整理得清清楚楚。每个项目对应一个数量，
                            一眼就能<b>查到具体的数</b>。一张完整的统计表要有<b>标题</b>、<b>项目</b>和对应的<b>数据</b>。
                        </p>
                    </SectionCard>

                    <SectionCard>
                        <h3 className="text-center font-bold text-slate-700 mb-4">{SAMPLE.title}</h3>
                        <StatTable cats={SAMPLE.cats} values={SAMPLE.values} unit={SAMPLE.unit} highlight={hi} head="运动" valHead="人数" />
                        <p className="text-center text-xs text-slate-400 mt-3">点下面的按钮，在表里找一找 👇</p>
                        <div className="flex flex-wrap gap-2 justify-center mt-3">
                            {SAMPLE.cats.map((c, i) => (
                                <button key={i} onClick={() => setHi(i)}
                                    className={"px-3 py-1.5 rounded-lg text-sm font-semibold smooth " +
                                        (hi === i ? "bg-blue-500 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200")}>
                                    {c}
                                </button>
                            ))}
                        </div>
                        {hi >= 0 && (
                            <div className="mt-4 text-center bg-blue-50 text-blue-800 rounded-xl py-3 text-sm fade-in">
                                喜欢<b>{SAMPLE.cats[hi]}</b>的有 <b className="text-base">{SAMPLE.values[hi]}</b> 人
                            </div>
                        )}
                    </SectionCard>

                    <SectionCard className="bg-blue-50 border-blue-100">
                        <h3 className="font-bold text-blue-800 mb-1">从表里能读到什么？</h3>
                        <ul className="text-sm text-blue-800 space-y-1 list-disc pl-5">
                            <li>总人数 = 把每个数加起来 = {SAMPLE.values.join('+')} = <b>{total}</b> 人</li>
                            <li>人数最多的是 <b>{maxCat}</b>（{maxV} 人）</li>
                            <li>统计表的优点：<b>数据精确，方便查具体的数</b>。</li>
                        </ul>
                    </SectionCard>
                </div>
            );
        };

        // ============================================================
        // 模块二：条形统计图
        // ============================================================
        const BarTab = () => {
            const [pick, setPick] = useState(-1);
            const [horizontal, setHorizontal] = useState(false);
            const maxV = Math.max(...SAMPLE.values);
            return (
                <div className="space-y-5 fade-in">
                    <SectionCard>
                        <h2 className="text-lg font-bold text-slate-800 mb-1">认识条形统计图</h2>
                        <p className="text-slate-600 text-sm leading-relaxed">
                            条形统计图用<b className="text-emerald-600">直条的长短</b>表示数量。
                            直条<b>越长，数量越多</b>，所以哪个多、哪个少，<b>一眼就能比出来</b>。
                        </p>
                    </SectionCard>

                    <SectionCard>
                        <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
                            <h3 className="font-bold text-slate-700">{SAMPLE.title}</h3>
                            <button onClick={() => setHorizontal(h => !h)}
                                className="px-3 py-1.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700 hover:bg-emerald-200 smooth">
                                {horizontal ? '↕ 看竖条形图' : '↔ 看横条形图'}
                            </button>
                        </div>
                        <BarChart cats={SAMPLE.cats} values={SAMPLE.values} unit={SAMPLE.unit}
                            onPick={setPick} picked={pick} horizontal={horizontal} />
                        <p className="text-center text-xs text-slate-400 mt-1">点一下直条试试 · 直条越高表示人数越多</p>
                        {pick >= 0 && (
                            <div className="mt-3 text-center bg-emerald-50 text-emerald-800 rounded-xl py-3 text-sm fade-in">
                                <b>{SAMPLE.cats[pick]}</b> 的直条对应 <b className="text-base">{SAMPLE.values[pick]}</b> {SAMPLE.unit}
                            </div>
                        )}
                    </SectionCard>

                    <SectionCard className="bg-emerald-50 border-emerald-100">
                        <h3 className="font-bold text-emerald-800 mb-1">怎么看条形统计图？</h3>
                        <ul className="text-sm text-emerald-800 space-y-1 list-disc pl-5">
                            <li>先看<b>纵轴的刻度</b>（每格代表几），再看直条<b>顶端</b>对到哪。</li>
                            <li>最高的直条数量最多，这里是 <b>{SAMPLE.cats[SAMPLE.values.indexOf(maxV)]}</b>。</li>
                            <li>条形图的优点：<b>直观，便于比较多少</b>。</li>
                        </ul>
                    </SectionCard>
                </div>
            );
        };

        // ============================================================
        // 模块三：折线统计图（用"气温随时间变化"更贴切）
        // ============================================================
        const LINE = {
            title: '一天每隔3小时的气温变化',
            cats: ['6时', '9时', '12时', '15时', '18时', '21时'],
            values: [16, 22, 30, 33, 27, 20],
            unit: '℃',
        };
        const LineChart = ({ cats, values, unit, picked = -1, onPick }) => {
            const W = 480, H = 280, padL = 42, padR = 20, padT = 24, padB = 36;
            const maxV = Math.ceil(Math.max(...values) / 5) * 5;
            const minV = 0;
            const innerW = W - padL - padR, innerH = H - padT - padB;
            const xOf = (i) => padL + (cats.length === 1 ? 0 : innerW * i / (cats.length - 1));
            const yOf = (v) => padT + innerH - ((v - minV) / (maxV - minV)) * innerH;
            const ticks = []; for (let t = 0; t <= maxV; t += 5) ticks.push(t);
            const pts = values.map((v, i) => `${xOf(i)},${yOf(v)}`).join(' ');
            const pathLen = 1400;
            return (
                <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
                    {ticks.map((t, i) => (
                        <g key={i}>
                            <line x1={padL} y1={yOf(t)} x2={W - padR} y2={yOf(t)} stroke="#eef2f7" />
                            <text x={padL - 6} y={yOf(t) + 4} textAnchor="end" fontSize="10" fill="#9ca3af">{t}</text>
                        </g>
                    ))}
                    {cats.map((c, i) => (
                        <text key={i} x={xOf(i)} y={H - padB + 18} textAnchor="middle" fontSize="11" fill="#4b5563">{c}</text>
                    ))}
                    <polyline points={pts} fill="none" stroke="#f59e0b" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round"
                        className="draw" style={{ strokeDasharray: pathLen, strokeDashoffset: 0 }} />
                    {values.map((v, i) => {
                        const on = i === picked;
                        return (
                            <g key={i} onClick={() => onPick && onPick(i)} style={{ cursor: onPick ? 'pointer' : 'default' }}>
                                <circle cx={xOf(i)} cy={yOf(v)} r={on ? 8 : 5} fill={on ? '#ea580c' : '#f59e0b'} stroke="#fff" strokeWidth="2" className="smooth" />
                                <text x={xOf(i)} y={yOf(v) - 12} textAnchor="middle" fontSize="12" fontWeight="700" fill="#b45309">{v}{unit}</text>
                            </g>
                        );
                    })}
                </svg>
            );
        };
        const LineTab = () => {
            const [pick, setPick] = useState(-1);
            const vals = LINE.values;
            // 找上升/下降最快的一段
            let maxRise = -Infinity, riseAt = 0, maxDrop = Infinity, dropAt = 0;
            for (let i = 1; i < vals.length; i++) {
                const d = vals[i] - vals[i - 1];
                if (d > maxRise) { maxRise = d; riseAt = i; }
                if (d < maxDrop) { maxDrop = d; dropAt = i; }
            }
            return (
                <div className="space-y-5 fade-in">
                    <SectionCard>
                        <h2 className="text-lg font-bold text-slate-800 mb-1">认识折线统计图</h2>
                        <p className="text-slate-600 text-sm leading-relaxed">
                            折线统计图不仅能看出<b className="text-amber-600">数量的多少</b>，更能看出数量
                            <b>随时间怎样变化</b>——线<b>往上走是增加</b>，<b>往下走是减少</b>，越陡变化越快。
                        </p>
                    </SectionCard>

                    <SectionCard>
                        <h3 className="text-center font-bold text-slate-700 mb-2">{LINE.title}</h3>
                        <LineChart cats={LINE.cats} values={LINE.values} unit={LINE.unit} picked={pick} onPick={setPick} />
                        <p className="text-center text-xs text-slate-400 mt-1">点一下圆点看具体数值 · 注意线的"上坡"和"下坡"</p>
                        {pick >= 0 && (
                            <div className="mt-3 text-center bg-amber-50 text-amber-800 rounded-xl py-3 text-sm fade-in">
                                <b>{LINE.cats[pick]}</b> 时气温是 <b className="text-base">{LINE.values[pick]}{LINE.unit}</b>
                                {pick > 0 && <>，比上一时刻{LINE.values[pick] >= LINE.values[pick - 1]
                                    ? <>升高了 {LINE.values[pick] - LINE.values[pick - 1]}{LINE.unit} ↑</>
                                    : <>降低了 {LINE.values[pick - 1] - LINE.values[pick]}{LINE.unit} ↓</>}</>}
                            </div>
                        )}
                    </SectionCard>

                    <SectionCard className="bg-amber-50 border-amber-100">
                        <h3 className="font-bold text-amber-800 mb-1">从折线图能读到什么？</h3>
                        <ul className="text-sm text-amber-800 space-y-1 list-disc pl-5">
                            <li>气温最高在 <b>{LINE.cats[vals.indexOf(Math.max(...vals))]}</b>（{Math.max(...vals)}{LINE.unit}）。</li>
                            <li>上升最快的是 <b>{LINE.cats[riseAt - 1]}→{LINE.cats[riseAt]}</b>（升 {maxRise}{LINE.unit}），那段线最"陡"。</li>
                            <li>折线图的优点：<b>能清楚地看出变化趋势</b>。</li>
                        </ul>
                    </SectionCard>
                </div>
            );
        };

        // ============================================================
        // 模块四：扇形统计图（看占整体的几分之几 / 百分比）
        // ============================================================
        const PIE = {
            title: '图书角各类图书的占比',
            cats: ['故事书', '科普书', '漫画书', '其他'],
            values: [20, 12, 6, 2],   // 共 40
            unit: '本',
        };
        const PieChart = ({ cats, values, picked = -1, onPick }) => {
            const total = sum(values);
            const R = 100, cx = 130, cy = 130;
            let acc = -90; // 从正上方开始
            const arcs = values.map((v, i) => {
                const ang = v / total * 360;
                const a0 = acc * Math.PI / 180, a1 = (acc + ang) * Math.PI / 180;
                const big = ang > 180 ? 1 : 0;
                const on = i === picked;
                const rr = on ? R + 8 : R;
                const x0 = cx + rr * Math.cos(a0), y0 = cy + rr * Math.sin(a0);
                const x1 = cx + rr * Math.cos(a1), y1 = cy + rr * Math.sin(a1);
                const mid = (acc + ang / 2) * Math.PI / 180;
                const lx = cx + (rr * 0.62) * Math.cos(mid), ly = cy + (rr * 0.62) * Math.sin(mid);
                const path = `M ${cx} ${cy} L ${x0} ${y0} A ${rr} ${rr} 0 ${big} 1 ${x1} ${y1} Z`;
                acc += ang;
                return { path, fill: PALETTE[i % PALETTE.length], pct: Math.round(v / total * 100), lx, ly, on, i };
            });
            return (
                <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                    <svg viewBox="0 0 260 260" className="w-56 h-56">
                        {arcs.map(a => (
                            <g key={a.i} onClick={() => onPick && onPick(a.i)} style={{ cursor: onPick ? 'pointer' : 'default' }} className="smooth">
                                <path d={a.path} fill={a.fill} stroke="#fff" strokeWidth="2" opacity={a.on || picked < 0 ? 1 : 0.55} />
                                {a.pct >= 8 && <text x={a.lx} y={a.ly} textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff">{a.pct}%</text>}
                            </g>
                        ))}
                    </svg>
                    <div className="space-y-1.5">
                        {cats.map((c, i) => (
                            <button key={i} onClick={() => onPick && onPick(i)}
                                className={"flex items-center gap-2 px-3 py-1.5 rounded-lg w-full text-left smooth " +
                                    (i === picked ? "bg-slate-100" : "hover:bg-slate-50")}>
                                <span className="w-4 h-4 rounded" style={{ background: PALETTE[i % PALETTE.length] }}></span>
                                <span className="text-sm text-slate-700">{c}</span>
                                <span className="text-sm font-bold text-slate-500 ml-auto">{Math.round(values[i] / total * 100)}%</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };
        const PieTab = () => {
            const [pick, setPick] = useState(-1);
            const total = sum(PIE.values);
            return (
                <div className="space-y-5 fade-in">
                    <SectionCard>
                        <h2 className="text-lg font-bold text-slate-800 mb-1">认识扇形统计图</h2>
                        <p className="text-slate-600 text-sm leading-relaxed">
                            扇形统计图用<b className="text-rose-600">一个圆</b>表示总体，每个扇形表示一部分。
                            <b>扇形越大，占的比例越大</b>。它专门用来看<b>各部分占整体的几分之几（百分比）</b>。
                        </p>
                    </SectionCard>

                    <SectionCard>
                        <h3 className="text-center font-bold text-slate-700 mb-3">{PIE.title}（共 {total} {PIE.unit}）</h3>
                        <PieChart cats={PIE.cats} values={PIE.values} picked={pick} onPick={setPick} />
                        {pick >= 0 && (
                            <div className="mt-4 text-center bg-rose-50 text-rose-800 rounded-xl py-3 text-sm fade-in">
                                <b>{PIE.cats[pick]}</b> 占 <b className="text-base">{Math.round(PIE.values[pick] / total * 100)}%</b>，
                                也就是 {PIE.values[pick]} ÷ {total} = {PIE.values[pick]} 本
                            </div>
                        )}
                        <p className="text-center text-xs text-slate-400 mt-2">点扇形或图例看占比 · 所有扇形合起来正好是一整个圆（100%）</p>
                    </SectionCard>

                    <SectionCard className="bg-rose-50 border-rose-100">
                        <h3 className="font-bold text-rose-800 mb-1">扇形图什么时候用？</h3>
                        <ul className="text-sm text-rose-800 space-y-1 list-disc pl-5">
                            <li>要看<b>谁占的比例大、谁小</b>，用扇形图最合适。</li>
                            <li>所有部分加起来一定是 <b>100%</b>（一整个圆）。</li>
                            <li>扇形图<b>不直接告诉你具体数量</b>，它强调的是"<b>占比</b>"。</li>
                        </ul>
                    </SectionCard>
                </div>
            );
        };

        // ============================================================
        // 模块五：选对图 + 读图练习
        // ============================================================
        const PICK_QS = [
            { q: '要比较 5 种水果各卖了多少箱，哪种图最直观？', opts: ['条形统计图', '折线统计图', '扇形统计图'], a: 0,
              why: '比较多少、谁多谁少，条形图的直条最一目了然。' },
            { q: '要看小树苗一周内每天的高度变化趋势，用哪种图？', opts: ['条形统计图', '折线统计图', '扇形统计图'], a: 1,
              why: '看"随时间怎样变化"的趋势，折线图最合适。' },
            { q: '要看一个班里男生、女生各占全班的几分之几，用哪种图？', opts: ['条形统计图', '折线统计图', '扇形统计图'], a: 2,
              why: '看各部分占整体的比例，用扇形图。' },
            { q: '要查"三班正好有多少人"这个精确的数，用哪种最方便？', opts: ['统计表', '折线统计图', '扇形统计图'], a: 0,
              why: '要查精确的具体数据，统计表最直接。' },
        ];
        const ChooseTab = () => {
            const [idx, setIdx] = useState(0);
            const [chosen, setChosen] = useState(null);
            const [score, setScore] = useState({ ok: 0, total: 0 });
            const cur = PICK_QS[idx];
            const choose = (i) => {
                if (chosen !== null) return;
                setChosen(i);
                setScore(s => ({ ok: s.ok + (i === cur.a ? 1 : 0), total: s.total + 1 }));
            };
            const next = () => { setIdx((idx + 1) % PICK_QS.length); setChosen(null); };
            return (
                <div className="space-y-5 fade-in">
                    <SectionCard>
                        <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                            <h2 className="text-lg font-bold text-slate-800">选对统计图</h2>
                            <span className="text-sm text-slate-500">得分 <b className="text-blue-600">{score.ok}</b> / {score.total}</span>
                        </div>
                        <p className="text-slate-700 text-sm mb-4 leading-relaxed">第 {idx + 1} 题：{cur.q}</p>
                        <div className="space-y-2">
                            {cur.opts.map((o, i) => {
                                let cls = "bg-slate-50 hover:bg-slate-100 text-slate-700 border-slate-200";
                                if (chosen !== null) {
                                    if (i === cur.a) cls = "bg-emerald-50 text-emerald-700 border-emerald-300";
                                    else if (i === chosen) cls = "bg-rose-50 text-rose-700 border-rose-300";
                                    else cls = "bg-slate-50 text-slate-400 border-slate-200";
                                }
                                return (
                                    <button key={i} onClick={() => choose(i)} disabled={chosen !== null}
                                        className={"w-full text-left px-4 py-3 rounded-xl border-2 font-medium smooth " + cls}>
                                        {o}
                                        {chosen !== null && i === cur.a && ' ✓'}
                                        {chosen !== null && i === chosen && i !== cur.a && ' ✗'}
                                    </button>
                                );
                            })}
                        </div>
                        {chosen !== null && (
                            <div className="mt-4 fade-in">
                                <div className={"rounded-xl px-4 py-3 text-sm " +
                                    (chosen === cur.a ? "bg-emerald-50 text-emerald-700" : "bg-amber-50 text-amber-800")}>
                                    {chosen === cur.a ? '✓ 选对啦！' : '想一想：'} {cur.why}
                                </div>
                                <button onClick={next} className="mt-3 w-full py-2.5 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-semibold smooth">下一题 →</button>
                            </div>
                        )}
                    </SectionCard>

                    <SectionCard className="bg-slate-50">
                        <h3 className="font-bold text-slate-700 mb-2">一句话选图</h3>
                        <ul className="text-sm text-slate-600 space-y-1.5 list-disc pl-5">
                            <li>查<b>精确的数</b> → <b className="text-blue-600">统计表</b></li>
                            <li>比<b>多少</b> → <b className="text-emerald-600">条形图</b></li>
                            <li>看<b>变化趋势</b> → <b className="text-amber-600">折线图</b></li>
                            <li>看<b>各部分占比</b> → <b className="text-rose-600">扇形图</b></li>
                        </ul>
                    </SectionCard>
                </div>
            );
        };

        // ============================================================
        // 应用外壳
        // ============================================================
        const App = () => {
            const [tab, setTab] = useState('table');
            const tabs = [
                ['table', '统计表', 'blue'],
                ['bar', '条形图', 'emerald'],
                ['line', '折线图', 'amber'],
                ['pie', '扇形图', 'rose'],
                ['choose', '选图练习', 'violet'],
            ];
            const colorMap = { blue: 'bg-blue-500', emerald: 'bg-emerald-500', amber: 'bg-amber-500', rose: 'bg-rose-500', violet: 'bg-violet-500' };
            return (
                <div className="min-h-screen py-8 px-4">
                    <header className="relative max-w-3xl mx-auto text-center mb-7 px-12">
                        <a href="/" aria-label="返回主页" title="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-600">
                            <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </a>
                        <h1 className="text-3xl font-bold text-slate-800">统计表与统计图</h1>
                        <p className="text-slate-500 mt-1">认识统计表、条形图、折线图、扇形图，学会读图选图</p>
                    </header>

                    <div className="flex justify-center gap-2 sm:gap-3 mb-7 flex-wrap">
                        {tabs.map(([key, label, color]) => (
                            <button key={key} onClick={() => setTab(key)}
                                className={"px-4 sm:px-5 py-2 rounded-full font-semibold text-sm smooth " +
                                    (tab === key ? colorMap[color] + " text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                                {label}
                            </button>
                        ))}
                    </div>

                    <div className="max-w-3xl mx-auto">
                        {tab === 'table' && <TableTab />}
                        {tab === 'bar' && <BarTab />}
                        {tab === 'line' && <LineTab />}
                        {tab === 'pie' && <PieTab />}
                        {tab === 'choose' && <ChooseTab />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
