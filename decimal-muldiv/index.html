<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小数乘除法·小数点移位 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .smooth-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .col-grid { font-variant-numeric: tabular-nums; }
        .dot { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .arc { animation: arcHop 0.6s ease; }
        @keyframes arcHop { 0%{transform:translateY(0)} 50%{transform:translateY(-14px)} 100%{transform:translateY(0)} }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo } = React;

        const decimals = (s) => { const t = String(s); return t.includes('.') ? t.split('.')[1].length : 0; };
        const stripDot = (s) => String(s).replace('.', '');
        // 去掉多余的 0，但保留至少一位整数
        const tidy = (n) => {
            let s = Number(n).toString();
            return s;
        };

        // 渲染一个数字，把小数点画成可移动的红点，其余数字排成等宽格
        // shiftFrom: 原始小数点后位数; shiftTo: 目标小数点后位数（可用于动画）
        const DotNumber = ({ digits, dotPos, highlightNewZeros = 0, animating = false }) => {
            // digits: 纯数字字符串（不含点）; dotPos: 小数点在从右数第几位（0=整数）
            const arr = digits.split('');
            // 小数点插入位置：整数部分长度
            const intLen = arr.length - dotPos;
            return (
                <div className="inline-flex items-end font-mono text-3xl">
                    {arr.map((ch, i) => {
                        const showDotAfter = (i + 1) === intLen && dotPos > 0;
                        const isNewZero = highlightNewZeros > 0 && i >= arr.length - highlightNewZeros;
                        return (
                            <React.Fragment key={i}>
                                <span className={"inline-block w-5 text-center " + (isNewZero ? "text-emerald-500" : "text-gray-800")}>{ch}</span>
                                {showDotAfter && <span className={"inline-block w-3 text-center text-rose-500 font-bold " + (animating ? "arc" : "")}>.</span>}
                            </React.Fragment>
                        );
                    })}
                    {dotPos === 0 && <span className="inline-block w-3" />}
                </div>
            );
        };

        // 移位示意：从 A 数移到 B 数，标注移动方向和位数
        const ShiftArrow = ({ places, dir, label }) => (
            <div className="flex flex-col items-center text-indigo-600 my-1">
                <div className="text-sm font-semibold">{label}</div>
                <div className="text-2xl">{dir === 'right' ? '➡ 小数点右移 ' : '⬅ 小数点左移 '}{places} 位</div>
            </div>
        );

        // ============ 小数乘法 ============
        const DecimalMul = () => {
            const [aStr, setAStr] = useState('1.2');
            const [bStr, setBStr] = useState('0.3');
            const [step, setStep] = useState(0); // 0 原题 1 变整数 2 整数相乘 3 移回小数点 4 完成

            const a = parseFloat(aStr) || 0, b = parseFloat(bStr) || 0;
            const da = decimals(aStr), db = decimals(bStr);
            const totalDec = da + db;

            const aInt = Math.round(a * Math.pow(10, da));
            const bInt = Math.round(b * Math.pow(10, db));
            const intProduct = aInt * bInt;
            const result = intProduct / Math.pow(10, totalDec);
            const resultStr = Number(result.toFixed(totalDec)).toFixed(totalDec).replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');

            // 整数乘积转成字符串，用于展示移位
            const prodDigits = String(intProduct);
            // 移回后小数点位置 = totalDec；若位数不够需前面补 0
            const padded = prodDigits.length <= totalDec ? '0'.repeat(totalDec - prodDigits.length + 1) + prodDigits : prodDigits;

            const randomize = () => {
                const mk = (dmax) => {
                    const dec = 1 + Math.floor(Math.random() * dmax);
                    const raw = 1 + Math.floor(Math.random() * (dec === 1 ? 90 : 900));
                    return (raw / Math.pow(10, dec)).toFixed(dec);
                };
                setAStr(mk(1)); setBStr(mk(2)); setStep(0);
            };

            const labels = [
                '① 原题：两个小数直接相乘不好算',
                `② 变整数：${aStr} 扩大到 ${aInt}（×${Math.pow(10,da)}），${bStr} 扩大到 ${bInt}（×${Math.pow(10,db)}）`,
                `③ 整数相乘：${aInt} × ${bInt} = ${intProduct}`,
                `④ 移回来：一共扩大了 ${totalDec} 倍的 10，积要缩小回去，小数点向左移 ${totalDec} 位`,
                `⑤ 完成：${aStr} × ${bStr} = ${resultStr}`,
            ];

            return (
                <div className="fade-in flex flex-col items-center">
                    <Controls aStr={aStr} bStr={bStr} op="×" setA={setAStr} setB={setBStr} setStep={setStep} randomize={randomize} />

                    <div className="bg-white rounded-xl shadow p-6 mb-6 w-full max-w-xl flex flex-col items-center gap-4 col-grid">
                        {/* 原题 */}
                        <div className="text-3xl font-mono text-gray-800">
                            {aStr} <span className="text-gray-400">×</span> {bStr}
                        </div>

                        {step >= 1 && (
                            <div className="w-full flex flex-col items-center gap-2 fade-in">
                                <div className="text-sm text-indigo-500 font-semibold">先把小数点右移，各自变成整数</div>
                                <div className="flex items-center gap-4 text-3xl font-mono">
                                    <div className="flex flex-col items-center">
                                        <span className="text-indigo-700 font-bold">{aInt}</span>
                                        <span className="text-xs text-gray-400">右移{da}位</span>
                                    </div>
                                    <span className="text-gray-400">×</span>
                                    <div className="flex flex-col items-center">
                                        <span className="text-indigo-700 font-bold">{bInt}</span>
                                        <span className="text-xs text-gray-400">右移{db}位</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step >= 2 && (
                            <div className="text-3xl font-mono fade-in">
                                = <span className="text-blue-700 font-bold">{intProduct}</span>
                                <span className="text-sm text-gray-400 ml-2">（整数乘法）</span>
                            </div>
                        )}

                        {step >= 3 && (
                            <div className="w-full flex flex-col items-center gap-2 fade-in border-t border-gray-100 pt-4">
                                <ShiftArrow places={totalDec} dir="left" label={`一共右移了 ${da}+${db}=${totalDec} 位，现在移回去`} />
                                <div className="bg-rose-50 rounded-lg px-6 py-3">
                                    <DotNumber digits={padded} dotPos={totalDec} animating />
                                </div>
                            </div>
                        )}

                        {step >= 4 && (
                            <div className="text-3xl font-mono font-bold text-rose-600 fade-in">
                                {aStr} × {bStr} = {resultStr}
                            </div>
                        )}
                    </div>

                    <KeyIdea text="乘法口诀：先不管小数点，把两个因数当整数相乘；再看两个因数一共有几位小数，积就从右往左点出几位小数。" />

                    <StepBar step={step} maxStep={4} labels={labels} color="blue"
                        onReset={() => setStep(0)} onNext={() => setStep(s => Math.min(4, s + 1))} />
                </div>
            );
        };

        // ============ 小数除法 ============
        const DecimalDiv = () => {
            const [aStr, setAStr] = useState('3.6'); // 被除数
            const [bStr, setBStr] = useState('0.4'); // 除数
            const [step, setStep] = useState(0); // 0 原题 1 除数变整数 2 被除数同步移 3 整数相除 4 完成

            const a = parseFloat(aStr) || 0, b = parseFloat(bStr) || 0;
            const db = decimals(bStr); // 除数小数位数 = 需要右移的位数
            const shift = db;
            // 两个数同时右移 shift 位
            const newA = a * Math.pow(10, shift);
            const newB = b * Math.pow(10, shift);
            const newAStr = Number(newA.toFixed(6)).toString();
            const newBStr = Number(newB.toFixed(6)).toString(); // 应为整数
            const quotient = b !== 0 ? a / b : 0;
            const quotientStr = Number(quotient.toFixed(6)).toString();
            const valid = b !== 0;

            const randomize = () => {
                // 造一个能整除或结果简单的题
                const q = 1 + Math.floor(Math.random() * 12);
                const bDec = 1 + Math.floor(Math.random() * 2);
                const bRaw = 1 + Math.floor(Math.random() * (bDec === 1 ? 8 : 30));
                const bVal = bRaw / Math.pow(10, bDec);
                const aVal = +(q * bVal).toFixed(6);
                setAStr(aVal.toString()); setBStr(bVal.toString()); setStep(0);
            };

            const labels = [
                '① 原题：除数是小数，不方便试商',
                `② 关键：把除数 ${bStr} 的小数点右移 ${shift} 位，变成整数 ${newBStr}`,
                `③ 同步：被除数也要右移同样的 ${shift} 位，${aStr} → ${newAStr}（商不变）`,
                `④ 整数相除：${newAStr} ÷ ${newBStr} = ${quotientStr}`,
                `⑤ 完成：${aStr} ÷ ${bStr} = ${quotientStr}`,
            ];

            return (
                <div className="fade-in flex flex-col items-center">
                    <Controls aStr={aStr} bStr={bStr} op="÷" setA={setAStr} setB={setBStr} setStep={setStep} randomize={randomize} />

                    {!valid && (
                        <div className="mb-4 px-4 py-2 bg-amber-50 border border-amber-200 rounded-lg text-amber-700 text-sm shake">
                            除数不能为 0，换一题试试。
                        </div>
                    )}

                    <div className="bg-white rounded-xl shadow p-6 mb-6 w-full max-w-xl flex flex-col items-center gap-4 col-grid">
                        <div className="text-3xl font-mono text-gray-800">
                            {aStr} <span className="text-gray-400">÷</span> {bStr}
                        </div>

                        {step >= 1 && (
                            <div className="w-full flex flex-col items-center gap-1 fade-in">
                                <ShiftArrow places={shift} dir="right" label={`除数 ${bStr} 要变成整数`} />
                                <div className="text-2xl font-mono">
                                    除数：{bStr} <span className="text-indigo-600">→</span> <span className="text-indigo-700 font-bold">{newBStr}</span>
                                </div>
                            </div>
                        )}

                        {step >= 2 && (
                            <div className="w-full flex flex-col items-center gap-1 fade-in border-t border-gray-100 pt-3">
                                <div className="text-sm text-emerald-600 font-semibold">被除数、除数同时右移相同位数，商不变（除法的性质）</div>
                                <div className="text-2xl font-mono">
                                    被除数：{aStr} <span className="text-emerald-600">→</span> <span className="text-emerald-700 font-bold">{newAStr}</span>
                                </div>
                            </div>
                        )}

                        {step >= 3 && (
                            <div className="text-3xl font-mono fade-in border-t border-gray-100 pt-3">
                                {newAStr} <span className="text-gray-400">÷</span> {newBStr} =
                                <span className="text-blue-700 font-bold ml-2">{quotientStr}</span>
                            </div>
                        )}

                        {step >= 4 && (
                            <div className="text-3xl font-mono font-bold text-rose-600 fade-in">
                                {aStr} ÷ {bStr} = {quotientStr}
                            </div>
                        )}
                    </div>

                    <KeyIdea text="除法口诀：只看除数！把除数的小数点移几位变成整数，被除数就跟着往同方向移几位；两个数同时扩大相同倍数，商不变，最后按整数除法算。" />

                    <StepBar step={step} maxStep={4} labels={labels} color="emerald"
                        onReset={() => setStep(0)} onNext={() => setStep(s => Math.min(4, s + 1))} disabled={!valid} />
                </div>
            );
        };

        // ===== 共用组件 =====
        const Controls = ({ aStr, bStr, op, setA, setB, setStep, randomize }) => (
            <div className="bg-white rounded-xl shadow p-5 mb-6 flex flex-wrap gap-4 items-center justify-center">
                <input type="text" inputMode="decimal" value={aStr}
                    onChange={e => { setA(e.target.value.replace(/[^\d.]/g, '')); setStep(0); }}
                    className="w-24 text-center text-lg border-2 border-blue-300 rounded p-1.5 font-mono" />
                <span className="text-2xl font-bold text-gray-400">{op}</span>
                <input type="text" inputMode="decimal" value={bStr}
                    onChange={e => { setB(e.target.value.replace(/[^\d.]/g, '')); setStep(0); }}
                    className="w-24 text-center text-lg border-2 border-green-300 rounded p-1.5 font-mono" />
                <button onClick={randomize} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-700 smooth-transition">换一题</button>
            </div>
        );

        const KeyIdea = ({ text }) => (
            <div className="max-w-xl w-full bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-6 text-sm text-indigo-800 leading-relaxed">
                💡 {text}
            </div>
        );

        const StepBar = ({ step, maxStep, labels, color, onReset, onNext, disabled }) => {
            const btn = color === 'emerald' ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-blue-500 hover:bg-blue-600';
            return (
                <div className="flex flex-col items-center gap-3">
                    <div className="text-gray-700 font-semibold min-h-[3rem] text-center px-4 max-w-lg flex items-center">{labels[step]}</div>
                    <div className="flex gap-3">
                        <button onClick={onReset} disabled={step === 0}
                            className="px-5 py-2.5 rounded-lg font-semibold smooth-transition bg-gray-100 hover:bg-gray-200 disabled:opacity-40 text-gray-700">重置</button>
                        <button onClick={onNext} disabled={step === maxStep || disabled}
                            className={"px-6 py-2.5 rounded-lg font-semibold smooth-transition text-white disabled:opacity-40 " + btn}>
                            {step === maxStep ? '已完成' : '下一步'}
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('mul');
            return (
                <div className="min-h-screen py-8 px-4">
                    <header className="relative max-w-4xl mx-auto text-center mb-8 px-12">
                        <a href="/" aria-label="返回主页" title="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-600">
                            <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </a>
                        <h1 className="text-3xl font-bold text-slate-800">小数乘除法 · 小数点移位</h1>
                        <p className="text-slate-500 mt-1">先把小数变成整数，算完再把小数点移回来——看清每一步小数点是怎么移动的</p>
                    </header>

                    <div className="flex justify-center gap-3 mb-8">
                        <button onClick={() => setTab('mul')}
                            className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " + (tab === 'mul' ? "bg-blue-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                            小数乘法
                        </button>
                        <button onClick={() => setTab('div')}
                            className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " + (tab === 'div' ? "bg-emerald-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                            小数除法
                        </button>
                    </div>

                    <div className="max-w-3xl mx-auto">
                        {tab === 'mul' ? <DecimalMul /> : <DecimalDiv />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <div class="site-copyright" style="box-sizing: border-box; width: 100%; padding: 24px 16px; text-align: center; color: #94a3b8; font: 13px/1.6 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">©孙维刚教育研究院 小宇老师 版权所有</div>
</body>
</html>
