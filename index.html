<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math101 - 小学数学工具集</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --accent-color: #673ab7;
            --hover-color: #357abd;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin: 0 0 10px 0;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1100px;
            padding: 20px;
        }

        .tool-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border-top: 5px solid var(--primary-color);
            display: flex;
            flex-direction: column;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.12);
        }

        /* 为新工具设置不同的顶部颜色以示区分 */
        .tool-card.math-op {
            border-top-color: var(--accent-color);
        }

        .tool-card h2 {
            margin: 10px 0;
            font-size: 1.4rem;
            color: #2c3e50;
        }

        .tool-card p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .url-tag {
            font-family: 'Courier New', Courier, monospace;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #777;
            align-self: flex-start;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            background: #e3f2fd;
            color: #1976d2;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        .math-op .status-badge {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .update-tag {
            background: #ffecb3;
            color: #ffa000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: #999;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Math101 实验室</h1>
        <p class="subtitle">互动式小学数学教学辅助平台</p>
    </header>

    <div class="container">
        <a href="/decimal-1" class="tool-card">
            <div class="url-tag">/decimal-1</div>
            <h2>小数显示工具</h2>
            <p>通过动态数轴和面积模型，帮助学生理解百分位、十分位等抽象概念。</p>
            <span class="status-badge">进入工具</span>
        </a>

        <a href="/decimal-2" class="tool-card">
            <div class="url-tag">/decimal-2</div>
            <h2>小数计算工具</h2>
            <p>自动生成计算竖式，重点演示对齐小数点及进位补零的逻辑过程。</p>
            <span class="status-badge">进入工具</span>
        </a>

        <a href="/multiply_and_div-1" class="tool-card math-op">
            <div class="url-tag">/multiply_and_div-1</div>
            <h2>乘除法直观演示 <span class="update-tag">NEW</span></h2>
            <p>通过点阵图、面积模型演示乘法分配律；通过分物过程演示除法的余数意义。</p>
            <span class="status-badge">进入工具</span>
        </a>
    </div>

    <footer>
        math101.yumath.com &copy; 2026 | 持续更新中
    </footer>

</body>
</html>
