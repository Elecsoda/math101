{id:'concentration',label:'浓度问题',intro:'浓度=溶质质量÷溶液质量，混合时分别守住溶质和总量。',problems:[p('配制盐水','把20克盐加入180克水中，盐水的浓度是多少？',['加入','浓度'],['盐水总量=盐+水','浓度=盐÷盐水总量'],'20 ÷ (20 + 180) = 10%',['盐水总量为200克。','20÷200=10%。'],'盐水浓度是10%。',[{label:'盐',parts:1,tone:'warm',note:'20克'},{label:'水',parts:9,note:'180克'}])]},
{id:'interest',label:'利息与税务',intro:'先辨认本金或计税金额，再乘对应利率或税率。',problems:[p('定期利息','存入5000元，年利率2%，存3年，利息是多少元？',['年利率','3年','利息'],['年利息=本金×年利率','总利息=年利息×年数'],'5000 × 2% × 3 = 300',['一年利息5000×2%=100元。','3年利息100×3=300元。'],'利息是300元。')]},

]};
