<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凑十法 / 借十法 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .smooth-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        /* 计数珠在格子里的过渡动画 */
        .bead { transition: background-color 0.4s ease, transform 0.4s ease, opacity 0.4s ease; }
        .bead-pop { animation: pop 0.4s ease; }
        @keyframes pop { 0% { transform: scale(0.4); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo } = React;

        // 十格阵：两行五列，传入已填数量、本步高亮的格子索引、颜色
        const TenFrame = ({ filled, color, highlightIndices = [], emptyHighlight = [] }) => {
            const cells = [];
            for (let i = 0; i < 10; i++) {
                const isFilled = i < filled;
                const isHi = highlightIndices.includes(i);
                const isEmptyHi = emptyHighlight.includes(i);
                cells.push(
                    <div key={i}
                        className={"w-12 h-12 border-2 rounded-md flex items-center justify-center " +
                            (isEmptyHi ? "border-dashed border-amber-400 bg-amber-50 " : "border-gray-300 bg-white ")}>
                        {isFilled && (
                            <div className={"bead w-8 h-8 rounded-full shadow-inner " +
                                (isHi ? "ring-4 ring-amber-300 " : "") +
                                (color === 'blue' ? "bg-blue-500" : color === 'green' ? "bg-green-500" : "bg-rose-500")}>
                            </div>
                        )}
                    </div>
                );
            }
            return (
                <div className="grid grid-rows-2 grid-flow-col gap-1.5 p-2 bg-gray-50 rounded-lg border border-gray-200" style={{ gridTemplateRows: 'repeat(2, minmax(0, 1fr))' }}>
                    {cells}
                </div>
            );
        };

        // ===== 凑十法（进位加法） =====
        const AddMakeTen = () => {
            // a + b，a 在 1~9，b 在 1~9，且 a+b > 10 才需要凑十
            const [a, setA] = useState(8);
            const [b, setB] = useState(5);
            const [step, setStep] = useState(0); // 0 初始 1 拆分 2 凑十 3 结果

            const need = 10 - a;              // 需要从 b 借几个凑成 10
            const rest = b - need;            // b 剩下的
            const total = a + b;
            const needsCarry = total > 10;

            const reset = () => setStep(0);
            const randomize = () => {
                let na, nb;
                do { na = 4 + Math.floor(Math.random() * 5); nb = 4 + Math.floor(Math.random() * 5); }
                while (na + nb <= 10);
                setA(na); setB(nb); setStep(0);
            };

            // 第二个十格阵（b）在凑十后剩余的数量
            const bFilled = step >= 2 ? Math.max(rest, 0) : b;
            // 第一个十格阵（a）在凑十后变满 10
            const aFilled = step >= 2 ? 10 : a;
            const aHi = step === 1 || step === 2 ? Array.from({ length: a }, (_, i) => i) : [];
            const aEmptyHi = step >= 1 && step < 2 ? Array.from({ length: need }, (_, i) => a + i) : [];

            return (
                <div className="fade-in flex flex-col items-center">
                    <div className="bg-white rounded-xl shadow p-5 mb-6 flex flex-wrap gap-5 items-center justify-center">
                        <div className="flex items-center gap-2">
                            <label className="font-semibold text-gray-700">第一个数</label>
                            <input type="number" min="1" max="9" value={a}
                                onChange={e => { setA(Math.max(1, Math.min(9, +e.target.value || 1))); setStep(0); }}
                                className="w-16 text-center text-lg border-2 border-blue-300 rounded p-1.5" />
                        </div>
                        <span className="text-2xl font-bold text-gray-400">+</span>
                        <div className="flex items-center gap-2">
                            <label className="font-semibold text-gray-700">第二个数</label>
                            <input type="number" min="1" max="9" value={b}
                                onChange={e => { setB(Math.max(1, Math.min(9, +e.target.value || 1))); setStep(0); }}
                                className="w-16 text-center text-lg border-2 border-green-300 rounded p-1.5" />
                        </div>
                        <button onClick={randomize} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-700 smooth-transition">换一题</button>
                    </div>

                    {!needsCarry && (
                        <div className="mb-4 px-4 py-2 bg-amber-50 border border-amber-200 rounded-lg text-amber-700 text-sm">
                            提示：{a} + {b} = {total}，没有超过 10，不需要凑十。试试让两数之和大于 10。
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row gap-8 items-center mb-6">
                        <div className="flex flex-col items-center">
                            <TenFrame filled={aFilled} color="blue" highlightIndices={aHi} emptyHighlight={aEmptyHi} />
                            <div className="mt-2 text-lg font-bold text-blue-600">{aFilled}</div>
                        </div>
                        <span className="text-3xl font-bold text-gray-400">+</span>
                        <div className="flex flex-col items-center">
                            <TenFrame filled={bFilled} color="green" />
                            <div className="mt-2 text-lg font-bold text-green-600">{bFilled}</div>
                        </div>
                    </div>

                    {/* 步骤讲解 */}
                    <div className="w-full max-w-2xl bg-gray-50 rounded-xl p-5 font-mono text-lg border border-gray-200 min-h-[120px]">
                        <p className="font-bold text-gray-800 mb-2">{a} + {b} = ?</p>
                        {needsCarry && step >= 1 && (
                            <p className="smooth-transition text-gray-700">
                                把 <span className="text-green-600 font-bold">{b}</span> 拆成
                                <span className="text-amber-600 font-bold"> {need}</span> 和
                                <span className="text-green-600 font-bold"> {rest}</span>
                                <span className="text-sm text-gray-400 ml-2">（先凑够 10 还差 {need}）</span>
                            </p>
                        )}
                        {needsCarry && step >= 2 && (
                            <p className="smooth-transition text-gray-700">
                                {a} + <span className="text-amber-600 font-bold">{need}</span> =
                                <span className="text-blue-700 font-bold"> 10</span>
                                <span className="text-sm text-gray-400 ml-2">（凑成一个 10）</span>
                            </p>
                        )}
                        {needsCarry && step >= 3 && (
                            <p className="smooth-transition font-bold text-2xl text-rose-600 mt-1">
                                10 + {rest} = {total}
                            </p>
                        )}
                    </div>

                    {needsCarry && (
                        <div className="flex gap-3 mt-5">
                            <button onClick={reset} disabled={step === 0}
                                className="px-5 py-2.5 rounded-lg font-semibold smooth-transition bg-gray-100 hover:bg-gray-200 disabled:opacity-40 text-gray-700">重置</button>
                            <button onClick={() => setStep(s => Math.min(3, s + 1))} disabled={step === 3}
                                className="px-6 py-2.5 rounded-lg font-semibold smooth-transition bg-blue-500 hover:bg-blue-600 text-white disabled:opacity-40">
                                {step === 0 ? '开始拆分' : step === 1 ? '凑十' : step === 2 ? '得出结果' : '完成'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // ===== 借十法（退位减法） =====
        const SubBorrowTen = () => {
            // (10+x) - b，被减数十几，减数个位 b 比 x 大，需要借十
            const [a, setA] = useState(13);
            const [b, setB] = useState(5);
            const [step, setStep] = useState(0); // 0 初始 1 借十 2 减 3 合

            const ones = a - 10;             // 被减数个位
            const total = a - b;
            const needsBorrow = ones < b && a >= 10 && a <= 18;

            const tenLeft = 10 - b;          // 破十法：从 10 里减去整个减数
            const result = tenLeft + ones;   // 再把剩下的个位加回来

            const randomize = () => {
                let na, nb;
                do {
                    na = 11 + Math.floor(Math.random() * 8); // 11~18
                    nb = 2 + Math.floor(Math.random() * 7);  // 2~8
                } while (!((na - 10) < nb));
                setA(na); setB(nb); setStep(0);
            };

            // 十格阵1 表示"10"，破十后从 10 里拿走整个减数 b 个
            const tenFrameFilled = step >= 2 ? tenLeft : 10;
            const tenRemoveHi = step === 1 ? Array.from({ length: b }, (_, i) => 10 - b + i) : [];
            // 十格阵2 表示个位 ones（不变）
            return (
                <div className="fade-in flex flex-col items-center">
                    <div className="bg-white rounded-xl shadow p-5 mb-6 flex flex-wrap gap-5 items-center justify-center">
                        <div className="flex items-center gap-2">
                            <label className="font-semibold text-gray-700">被减数</label>
                            <input type="number" min="11" max="18" value={a}
                                onChange={e => { setA(Math.max(11, Math.min(18, +e.target.value || 11))); setStep(0); }}
                                className="w-16 text-center text-lg border-2 border-rose-300 rounded p-1.5" />
                        </div>
                        <span className="text-2xl font-bold text-gray-400">−</span>
                        <div className="flex items-center gap-2">
                            <label className="font-semibold text-gray-700">减数</label>
                            <input type="number" min="2" max="9" value={b}
                                onChange={e => { setB(Math.max(1, Math.min(9, +e.target.value || 1))); setStep(0); }}
                                className="w-16 text-center text-lg border-2 border-blue-300 rounded p-1.5" />
                        </div>
                        <button onClick={randomize} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-700 smooth-transition">换一题</button>
                    </div>

                    {!needsBorrow && (
                        <div className="mb-4 px-4 py-2 bg-amber-50 border border-amber-200 rounded-lg text-amber-700 text-sm">
                            提示：当个位不够减（{ones} 小于 {b}）时才需要借十。试试让减数个位更大一些。
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row gap-8 items-center mb-6">
                        <div className="flex flex-col items-center">
                            <div className="text-sm text-gray-500 mb-1">十（满十格）</div>
                            <TenFrame filled={tenFrameFilled} color="rose" highlightIndices={tenRemoveHi} />
                            <div className="mt-2 text-lg font-bold text-rose-600">{tenFrameFilled}</div>
                        </div>
                        <span className="text-3xl font-bold text-gray-400">+</span>
                        <div className="flex flex-col items-center">
                            <div className="text-sm text-gray-500 mb-1">个位</div>
                            <TenFrame filled={ones} color="blue" />
                            <div className="mt-2 text-lg font-bold text-blue-600">{ones}</div>
                        </div>
                    </div>

                    <div className="w-full max-w-2xl bg-gray-50 rounded-xl p-5 font-mono text-lg border border-gray-200 min-h-[120px]">
                        <p className="font-bold text-gray-800 mb-2">{a} − {b} = ?</p>
                        {needsBorrow && step >= 1 && (
                            <p className="smooth-transition text-gray-700">
                                个位 <span className="text-blue-600 font-bold">{ones}</span> 不够减
                                <span className="text-gray-500"> {b}</span>，先从
                                <span className="text-rose-600 font-bold"> 10</span> 里减
                                <span className="text-amber-600 font-bold"> {b}</span>
                            </p>
                        )}
                        {needsBorrow && step >= 2 && (
                            <p className="smooth-transition text-gray-700">
                                10 − <span className="text-amber-600 font-bold">{b}</span> =
                                <span className="text-rose-700 font-bold"> {tenLeft}</span>
                                <span className="text-sm text-gray-400 ml-2">（把十位拆成 10，先减去整个 {b}）</span>
                            </p>
                        )}
                        {needsBorrow && step >= 3 && (
                            <p className="smooth-transition font-bold text-2xl text-rose-600 mt-1">
                                {tenLeft} + {ones} = {total}
                            </p>
                        )}
                    </div>

                    {needsBorrow && (
                        <div className="flex gap-3 mt-5">
                            <button onClick={() => setStep(0)} disabled={step === 0}
                                className="px-5 py-2.5 rounded-lg font-semibold smooth-transition bg-gray-100 hover:bg-gray-200 disabled:opacity-40 text-gray-700">重置</button>
                            <button onClick={() => setStep(s => Math.min(3, s + 1))} disabled={step === 3}
                                className="px-6 py-2.5 rounded-lg font-semibold smooth-transition bg-rose-500 hover:bg-rose-600 text-white disabled:opacity-40">
                                {step === 0 ? '开始借十' : step === 1 ? '从十里减' : step === 2 ? '合并结果' : '完成'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('add');
            return (
                <div className="min-h-screen py-8 px-4">
                    <header className="relative max-w-4xl mx-auto text-center mb-8 px-12">
                        <a href="/" aria-label="返回主页" title="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-600">
                            <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </a>
                        <h1 className="text-3xl font-bold text-slate-800">凑十法 / 借十法</h1>
                        <p className="text-slate-500 mt-1">用十格阵和计数珠，把进位与退位"看得见"</p>
                    </header>

                    <div className="flex justify-center gap-3 mb-8">
                        <button onClick={() => setTab('add')}
                            className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " + (tab === 'add' ? "bg-blue-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                            凑十法（进位加）
                        </button>
                        <button onClick={() => setTab('sub')}
                            className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " + (tab === 'sub' ? "bg-rose-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                            借十法（退位减）
                        </button>
                    </div>

                    <div className="max-w-3xl mx-auto">
                        {tab === 'add' ? <AddMakeTen /> : <SubBorrowTen />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
