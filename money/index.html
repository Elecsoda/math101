<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识人民币 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .smooth-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .pop { animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(0.6); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* ===== 人民币仿真示意图（纯 CSS） ===== */
        .note {
            position: relative; overflow: hidden;
            border-radius: 8px; border: 1px solid rgba(0,0,0,.15);
            box-shadow: 0 1px 3px rgba(0,0,0,.18);
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 6px, transparent 6px 12px),
                repeating-linear-gradient(-45deg, rgba(0,0,0,.04) 0 4px, transparent 4px 10px);
        }
        .note::before { /* 花纹边框 */
            content: ''; position: absolute; inset: 4px;
            border: 1.5px solid currentColor; border-radius: 5px; opacity: .35;
            pointer-events: none;
        }
        .note-portrait { /* 毛主席头像剪影示意 */
            width: 26px; height: 34px; border-radius: 40% 40% 45% 45% / 55% 55% 45% 45%;
            background: radial-gradient(circle at 50% 32%, currentColor 0 42%, transparent 44%),
                        linear-gradient(currentColor, currentColor);
            opacity: .28;
        }
        .coin {
            position: relative; border-radius: 50%;
            border: 2px solid currentColor;
            box-shadow: 0 1px 2px rgba(0,0,0,.25), inset 0 0 0 3px rgba(255,255,255,.4);
            background-image: repeating-conic-gradient(from 0deg, rgba(0,0,0,.10) 0 6deg, transparent 6deg 12deg);
        }
        .guilloche { /* 角落细密底纹 */
            background-image: radial-gradient(circle, currentColor 1px, transparent 1.4px);
            background-size: 5px 5px; opacity: .22;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo } = React;

        // 所有面额以"分"为单位存储，避免小数误差。1元=100分，1角=10分
        // num: 票面大数字；cap: 大写金额；bg/ink: 仿真主色（接近真钞色系）
        const DENOMS = [
            { fen: 10000, label: '100元', num: '100', cap: '壹佰圆', kind: 'note', ink: '#b91c1c', bg: 'linear-gradient(135deg,#fde2e2,#fca5a5)' },
            { fen: 5000,  label: '50元',  num: '50',  cap: '伍拾圆', kind: 'note', ink: '#15803d', bg: 'linear-gradient(135deg,#dcfce7,#86efac)' },
            { fen: 2000,  label: '20元',  num: '20',  cap: '贰拾圆', kind: 'note', ink: '#b45309', bg: 'linear-gradient(135deg,#fef3c7,#fcd34d)' },
            { fen: 1000,  label: '10元',  num: '10',  cap: '拾圆',   kind: 'note', ink: '#1d4ed8', bg: 'linear-gradient(135deg,#dbeafe,#93c5fd)' },
            { fen: 500,   label: '5元',   num: '5',   cap: '伍圆',   kind: 'note', ink: '#6d28d9', bg: 'linear-gradient(135deg,#ede9fe,#c4b5fd)' },
            { fen: 100,   label: '1元',   num: '1',   cap: '壹圆',   kind: 'note', ink: '#0f766e', bg: 'linear-gradient(135deg,#ccfbf1,#5eead4)' },
            { fen: 50,    label: '5角',   num: '5',   cap: '伍角',   kind: 'coin', ink: '#a16207', bg: 'radial-gradient(circle at 35% 30%,#fef9c3,#fde047 60%,#ca8a04)' },
            { fen: 10,    label: '1角',   num: '1',   cap: '壹角',   kind: 'coin', ink: '#475569', bg: 'radial-gradient(circle at 35% 30%,#f1f5f9,#cbd5e1 60%,#94a3b8)' },
        ];

        // 把"分"格式化为"X元Y角"或"X.XX元"
        const fmtYuan = (fen) => {
            const yuan = fen / 100;
            return Number.isInteger(yuan) ? `${yuan}元` : `${yuan.toFixed(2)}元`;
        };
        const fmtCny = (fen) => {
            const y = Math.floor(fen / 100);
            const j = Math.floor((fen % 100) / 10);
            const f = fen % 10;
            let parts = [];
            if (y) parts.push(`${y}元`);
            if (j) parts.push(`${j}角`);
            if (f) parts.push(`${f}分`);
            return parts.length ? parts.join('') : '0元';
        };

        // 钞票/硬币仿真示意图。note 为长方形纸币，coin 为圆形硬币。
        const Bill = ({ d, onClick, count, small }) => {
            const isCoin = d.kind === 'coin';
            // 纸币与硬币的尺寸（small 用于"钱包里/已付"区，略小）
            const noteSize = small ? { width: 96, height: 46 } : { width: 132, height: 64 };
            const coinSize = small ? { width: 50, height: 50 } : { width: 64, height: 64 };
            const size = isCoin ? coinSize : noteSize;

            const face = isCoin ? (
                <div className="coin flex flex-col items-center justify-center"
                     style={{ ...size, background: d.bg, color: d.ink }}>
                    <span className="font-extrabold leading-none" style={{ fontSize: small ? 18 : 22 }}>{d.num}</span>
                    <span className="leading-none" style={{ fontSize: small ? 8 : 9 }}>{d.label.replace(/\d+/, '')}</span>
                </div>
            ) : (
                <div className="note flex items-stretch" style={{ ...size, background: d.bg, color: d.ink }}>
                    {/* 左侧：头像 + 行名 */}
                    <div className="flex flex-col justify-between items-start" style={{ padding: small ? 4 : 6 }}>
                        <div className="guilloche rounded" style={{ width: small ? 16 : 20, height: small ? 12 : 16 }}></div>
                        <div className="note-portrait" style={{ width: small ? 18 : 26, height: small ? 24 : 34 }}></div>
                    </div>
                    {/* 中间：大写金额 + 行名 */}
                    <div className="flex-1 flex flex-col items-center justify-center" style={{ gap: small ? 1 : 2 }}>
                        <span className="font-semibold tracking-wider" style={{ fontSize: small ? 7 : 9, opacity: .85 }}>中国人民银行</span>
                        <span className="font-bold" style={{ fontSize: small ? 11 : 15 }}>{d.cap}</span>
                    </div>
                    {/* 右侧：大数字 */}
                    <div className="flex flex-col items-end justify-between" style={{ padding: small ? 4 : 6 }}>
                        <span className="font-extrabold leading-none" style={{ fontSize: small ? 18 : 26 }}>{d.num}</span>
                        <span className="font-semibold" style={{ fontSize: small ? 8 : 10, opacity: .8 }}>{isCoin ? '' : '圆'}</span>
                    </div>
                </div>
            );

            return (
                <button onClick={onClick} title={d.label}
                    className={"relative smooth-transition select-none " +
                        (onClick ? 'hover:scale-105 active:scale-95 cursor-pointer ' : 'cursor-default ')}
                    style={{ background: 'transparent', border: 'none', padding: 0 }}>
                    {face}
                    {count > 0 && (
                        <span className="absolute -top-2 -right-2 bg-rose-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center pop z-10">
                            {count}
                        </span>
                    )}
                </button>
            );
        };

        // ===== 模块一：认面额 + 自由组合（钱包总额） =====
        const Wallet = () => {
            const [counts, setCounts] = useState({}); // key=fen, value=张数
            const add = (fen) => setCounts(c => ({ ...c, [fen]: (c[fen] || 0) + 1 }));
            const sub = (fen) => setCounts(c => {
                const n = (c[fen] || 0) - 1;
                const nc = { ...c }; if (n <= 0) delete nc[fen]; else nc[fen] = n; return nc;
            });
            const clear = () => setCounts({});
            const total = useMemo(() => DENOMS.reduce((s, d) => s + d.fen * (counts[d.fen] || 0), 0), [counts]);

            return (
                <div className="fade-in flex flex-col items-center">
                    <p className="text-gray-500 mb-4">点击面额放进钱包，看看一共有多少钱。</p>
                    <div className="bg-white rounded-2xl shadow p-5 w-full max-w-2xl">
                        <div className="text-sm text-gray-400 mb-3 font-semibold">人民币面额（点击添加）</div>
                        <div className="flex flex-wrap gap-3 justify-center">
                            {DENOMS.map(d => (
                                <Bill key={d.fen} d={d} count={counts[d.fen] || 0} onClick={() => add(d.fen)} />
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow p-5 w-full max-w-2xl mt-5">
                        <div className="flex justify-between items-center mb-3">
                            <span className="text-sm text-gray-400 font-semibold">钱包里（点击减少）</span>
                            <button onClick={clear} className="text-sm text-rose-500 hover:underline">清空</button>
                        </div>
                        {total === 0
                            ? <div className="text-gray-300 text-center py-6">钱包还是空的~</div>
                            : <div className="flex flex-wrap gap-3 justify-center">
                                {DENOMS.filter(d => counts[d.fen]).map(d => (
                                    <Bill key={d.fen} d={d} count={counts[d.fen]} small onClick={() => sub(d.fen)} />
                                ))}
                              </div>}
                    </div>

                    <div className="mt-6 px-8 py-4 bg-rose-50 border-2 border-rose-200 rounded-2xl text-center">
                        <div className="text-sm text-gray-500">合计</div>
                        <div className="text-4xl font-bold text-rose-600">{fmtYuan(total)}</div>
                        <div className="text-gray-500 mt-1">{fmtCny(total)}</div>
                    </div>
                </div>
            );
        };

        // ===== 模块二：付款（凑出指定金额） =====
        const Pay = () => {
            const genPrice = () => {
                // 生成 0.5~99.5 元、整角的价格，单位分
                const yuan = 1 + Math.floor(Math.random() * 50);
                const jiao = Math.random() < 0.5 ? 0 : 5; // 0角 或 5角
                return yuan * 100 + jiao * 10;
            };
            const [price, setPrice] = useState(genPrice);
            const [counts, setCounts] = useState({});

            const paid = useMemo(() => DENOMS.reduce((s, d) => s + d.fen * (counts[d.fen] || 0), 0), [counts]);
            const add = (fen) => setCounts(c => ({ ...c, [fen]: (c[fen] || 0) + 1 }));
            const reset = () => setCounts({});
            const next = () => { setPrice(genPrice()); setCounts({}); };

            const exact = paid === price;
            const over = paid > price;

            return (
                <div className="fade-in flex flex-col items-center">
                    <div className="text-center mb-5">
                        <div className="text-gray-500">请正好付清这件商品的价钱：</div>
                        <div className="text-4xl font-bold text-blue-600 mt-1">{fmtYuan(price)}</div>
                        <div className="text-gray-400">{fmtCny(price)}</div>
                    </div>

                    <div className="bg-white rounded-2xl shadow p-5 w-full max-w-2xl">
                        <div className="text-sm text-gray-400 mb-3 font-semibold">点击面额来付款</div>
                        <div className="flex flex-wrap gap-3 justify-center">
                            {DENOMS.map(d => (
                                <Bill key={d.fen} d={d} count={counts[d.fen] || 0} onClick={() => add(d.fen)} />
                            ))}
                        </div>
                    </div>

                    <div className="mt-5 w-full max-w-2xl">
                        <div className="flex justify-between text-gray-600 px-1">
                            <span>已付：<span className="font-bold text-gray-800">{fmtYuan(paid)}</span></span>
                            <span>还差：<span className={"font-bold " + (price - paid > 0 ? 'text-rose-500' : 'text-gray-400')}>
                                {fmtYuan(Math.max(0, price - paid))}</span></span>
                        </div>
                        <div className="h-3 bg-gray-200 rounded-full mt-2 overflow-hidden">
                            <div className={"h-full smooth-transition " + (over ? 'bg-amber-400' : 'bg-blue-500')}
                                style={{ width: Math.min(100, paid / price * 100) + '%' }}></div>
                        </div>
                    </div>

                    <div className="h-10 mt-4 text-lg font-bold">
                        {exact && <span className="text-green-600">✓ 正好付清，太棒了！</span>}
                        {over && <span className="text-amber-600">付多了 {fmtYuan(paid - price)}，可以让收银员找零，或试试少付一点。</span>}
                    </div>

                    <div className="flex gap-3 mt-1">
                        <button onClick={reset} className="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold text-gray-700 smooth-transition">重置</button>
                        <button onClick={next} className="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold smooth-transition">换一件商品</button>
                    </div>
                </div>
            );
        };

        // ===== 模块三：找零（付的钱 - 价钱） =====
        const Change = () => {
            const gen = () => {
                const yuan = 1 + Math.floor(Math.random() * 30);
                const jiao = Math.random() < 0.5 ? 0 : 5;
                const price = yuan * 100 + jiao * 10;
                // 选一张"够付"的整钞
                const candidates = [500, 1000, 2000, 5000, 10000].filter(n => n >= price);
                const pay = candidates[Math.floor(Math.random() * candidates.length)];
                return { price, pay };
            };
            const [{ price, pay }, setQ] = useState(gen);
            const [answer, setAnswer] = useState('');
            const [checked, setChecked] = useState(false);

            const change = pay - price; // 应找零（分）
            const userFen = Math.round(parseFloat(answer.replace('元', '')) * 100);
            const correct = checked && userFen === change;

            const check = () => { if (answer.trim() !== '') setChecked(true); };
            const next = () => { setQ(gen()); setAnswer(''); setChecked(false); };

            // 把找零用"贪心法"拆成具体钱币，演示给孩子看
            const breakdown = useMemo(() => {
                let rest = change; const out = [];
                for (const d of DENOMS) {
                    const n = Math.floor(rest / d.fen);
                    if (n > 0) { out.push({ d, n }); rest -= n * d.fen; }
                }
                return out;
            }, [change]);

            return (
                <div className="fade-in flex flex-col items-center">
                    <div className="bg-white rounded-2xl shadow p-6 w-full max-w-md text-center">
                        <div className="flex justify-around items-center">
                            <div>
                                <div className="text-sm text-gray-400">商品价钱</div>
                                <div className="text-2xl font-bold text-gray-800">{fmtYuan(price)}</div>
                            </div>
                            <span className="text-2xl text-gray-300">|</span>
                            <div>
                                <div className="text-sm text-gray-400">付出</div>
                                <div className="text-2xl font-bold text-blue-600">{fmtYuan(pay)}</div>
                            </div>
                        </div>
                        <div className="mt-5 text-gray-600">应该找回多少钱？</div>
                        <div className="flex items-center justify-center gap-2 mt-3">
                            <input type="number" step="0.5" value={answer} disabled={checked}
                                onChange={e => setAnswer(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && check()}
                                placeholder="?" className="w-28 text-center text-xl border-2 border-rose-300 rounded-lg p-2 disabled:bg-gray-50" />
                            <span className="text-xl font-bold text-gray-600">元</span>
                        </div>
                    </div>

                    <div className="h-12 mt-4 text-lg font-bold text-center">
                        {checked && (correct
                            ? <span className="text-green-600">✓ 正确！找回 {fmtYuan(change)}</span>
                            : <span className="text-rose-600">再想想：{fmtYuan(pay)} − {fmtYuan(price)} = {fmtYuan(change)}</span>)}
                    </div>

                    {checked && (
                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mt-1 max-w-md w-full fade-in">
                            <div className="text-sm text-gray-500 mb-2 text-center">收银员可以这样找零：</div>
                            <div className="flex flex-wrap gap-3 justify-center items-center">
                                {breakdown.length === 0
                                    ? <span className="text-gray-400">不用找零</span>
                                    : breakdown.map(({ d, n }) => (
                                        <div key={d.fen} className="flex items-center gap-1">
                                            <Bill d={d} small />
                                            <span className="text-sm font-bold text-gray-600">×{n}</span>
                                        </div>
                                      ))}
                            </div>
                        </div>
                    )}

                    <div className="flex gap-3 mt-5">
                        <button onClick={check} disabled={checked}
                            className="px-6 py-2.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg font-semibold smooth-transition disabled:opacity-40">检查</button>
                        <button onClick={next}
                            className="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-semibold smooth-transition">下一题</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('wallet');
            const tabs = [
                ['wallet', '认面额·钱包', 'rose'],
                ['pay', '付款', 'blue'],
                ['change', '找零', 'green'],
            ];
            const colorMap = { rose: 'bg-rose-500', blue: 'bg-blue-500', green: 'bg-green-500' };
            return (
                <div className="min-h-screen py-8 px-4">
                    <header className="relative max-w-4xl mx-auto text-center mb-8 px-12">
                        <a href="/" aria-label="返回主页" title="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-600">
                            <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </a>
                        <h1 className="text-3xl font-bold text-slate-800">认识人民币</h1>
                        <p className="text-slate-500 mt-1">认面额、付款、找零，建立元角分与计算的联系</p>
                    </header>

                    <div className="flex justify-center gap-3 mb-8 flex-wrap">
                        {tabs.map(([key, label, color]) => (
                            <button key={key} onClick={() => setTab(key)}
                                className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " +
                                    (tab === key ? colorMap[color] + " text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                                {label}
                            </button>
                        ))}
                    </div>

                    <div className="max-w-4xl mx-auto">
                        {tab === 'wallet' && <Wallet />}
                        {tab === 'pay' && <Pay />}
                        {tab === 'change' && <Change />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <div class="site-copyright" style="box-sizing: border-box; width: 100%; padding: 24px 16px; text-align: center; color: #94a3b8; font: 13px/1.6 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">©孙维刚教育研究院 小宇老师 版权所有</div>
</body>
</html>
