<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可能性实验室 | Math101</title>
    <script src="../vendor/react.production.min.js"></script>
    <script src="../vendor/react-dom.production.min.js"></script>
    <script src="../vendor/babel.min.js"></script>
    <script src="../vendor/tailwind.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
        button, select, input { font: inherit; }
        .fade-in { animation: fadeIn .35s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
        .smooth { transition: all .2s ease; }
        .bar-grow { transition: height .45s cubic-bezier(.22,.61,.36,1), width .45s cubic-bezier(.22,.61,.36,1); }
        .pop { animation: pop .4s ease both; }
        @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 60% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
        /* 硬币翻转 */
        .coin3d { transform-style: preserve-3d; transition: transform .7s cubic-bezier(.3,.7,.4,1); }
        .coin-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .coin-back { transform: rotateY(180deg); }
        /* 骰子滚动抖动 */
        .shake { animation: shake .5s ease; }
        @keyframes shake { 0%,100% { transform: rotate(0); } 20% { transform: rotate(-14deg) translateY(-6px); } 40% { transform: rotate(12deg); } 60% { transform: rotate(-8deg) translateY(-3px); } 80% { transform: rotate(6deg); } }
        /* 转盘旋转 */
        .wheel-spin { transition: transform 2.4s cubic-bezier(.17,.67,.2,1); }
        .spin-btn { animation: none; }
        /* 3D 骰子立方体 */
        .dice-stage { perspective: 640px; }
        .cube { position: relative; transform-style: preserve-3d; transition: transform 1.15s cubic-bezier(.28,.5,.3,1); }
        .cube.tumbling { transition: transform 1.15s cubic-bezier(.5,.05,.25,1); }
        .cube-face { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4px; padding: 12px; box-sizing: border-box; border-radius: 14px; background: linear-gradient(145deg, #ffffff, #eef1f6); border: 2px solid #d7dce5; box-shadow: inset 0 0 8px rgba(0,0,0,.06); }
        .pip { align-self: center; justify-self: center; width: 62%; height: 62%; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #4b5563, #1f2937); box-shadow: inset 0 -2px 3px rgba(0,0,0,.4); }
        /* 落体下坠 + 弹跳 */
        .dice-drop { animation: diceDrop 1.15s cubic-bezier(.3,.6,.4,1) both; }
        @keyframes diceDrop { 0% { transform: translateY(-120px) scale(.7); opacity: .5; } 55% { transform: translateY(10px) scale(1.04); opacity: 1; } 72% { transform: translateY(-14px) scale(.98); } 86% { transform: translateY(4px) scale(1.01); } 100% { transform: translateY(0) scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useMemo, useState, useRef, useEffect } = React;

        const pct1 = v => Math.round(v * 1000) / 10;          // 小数→百分数，保留一位
        const gcd = (a, b) => b ? gcd(b, a % b) : a;
        const randInt = n => Math.floor(Math.random() * n);
        // 按权重数组随机抽一个下标
        const weightedPick = weights => {
            const total = weights.reduce((s, w) => s + w, 0);
            let r = Math.random() * total;
            for (let i = 0; i < weights.length; i++) {
                r -= weights[i];
                if (r < 0) return i;
            }
            return weights.length - 1;
        };

        // 把概率写成最简分数字符串，如 1/2、3/8
        const probFraction = (num, den) => {
            if (num === 0) return '0';
            const g = gcd(num, den) || 1;
            const n = num / g, d = den / g;
            return d === 1 ? `${n}` : `${n}/${d}`;
        };

        /* ============ 通用：结果频次统计表 + 条形图 ============ */
        // outcomes: [{ key, label, color, theoryNum, theoryDen }]
        // counts:   { key: number }
        const StatsPanel = ({ outcomes, counts, total }) => {
            const maxCount = Math.max(1, ...outcomes.map(o => counts[o.key] || 0));
            return (
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-lg font-bold text-slate-800 m-0">数据统计</h3>
                        <span className="text-sm text-slate-500">共 <b className="text-slate-800">{total}</b> 次</span>
                    </div>

                    {/* 频率条形图 */}
                    <div className="flex items-end justify-around gap-2 h-44 border-b-2 border-slate-200 mb-3 px-1">
                        {outcomes.map(o => {
                            const c = counts[o.key] || 0;
                            const h = total ? (c / maxCount) * 100 : 0;
                            const freq = total ? c / total : 0;
                            return (
                                <div key={o.key} className="flex-1 flex flex-col items-center justify-end h-full">
                                    <div className="text-xs font-bold text-slate-600 mb-1">{total ? `${pct1(freq)}%` : ''}</div>
                                    <div className="w-full max-w-[46px] rounded-t-md bar-grow" style={{ height: `${h}%`, minHeight: c ? 4 : 0, background: o.color }} title={`${o.label}：${c} 次`}></div>
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex justify-around gap-2 mb-4">
                        {outcomes.map(o => (
                            <div key={o.key} className="flex-1 text-center">
                                <span className="inline-block w-3 h-3 rounded-sm mr-1 align-middle" style={{ background: o.color }}></span>
                                <span className="text-xs text-slate-500 align-middle">{o.label}</span>
                            </div>
                        ))}
                    </div>

                    {/* 明细表：次数 / 实验频率 / 理论概率 */}
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-center border-collapse">
                            <thead>
                                <tr className="text-slate-500 border-b border-slate-200">
                                    <th className="py-2 font-semibold text-left pl-1">结果</th>
                                    <th className="py-2 font-semibold">次数</th>
                                    <th className="py-2 font-semibold">实验频率</th>
                                    <th className="py-2 font-semibold">理论概率</th>
                                </tr>
                            </thead>
                            <tbody>
                                {outcomes.map(o => {
                                    const c = counts[o.key] || 0;
                                    const freq = total ? c / total : 0;
                                    const theory = o.theoryDen ? o.theoryNum / o.theoryDen : null;
                                    return (
                                        <tr key={o.key} className="border-b border-slate-100">
                                            <td className="py-2 text-left pl-1">
                                                <span className="inline-block w-2.5 h-2.5 rounded-sm mr-1.5 align-middle" style={{ background: o.color }}></span>
                                                <span className="align-middle">{o.label}</span>
                                            </td>
                                            <td className="py-2 font-bold text-slate-700">{c}</td>
                                            <td className="py-2 text-slate-600">{total ? `${pct1(freq)}%` : '—'}</td>
                                            <td className="py-2 text-indigo-600">
                                                {theory === null ? '—' : <span>{probFraction(o.theoryNum, o.theoryDen)}<span className="text-slate-400"> ≈ {pct1(theory)}%</span></span>}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {total > 0 && outcomes.some(o => o.theoryDen) && (
                        <p className="text-xs text-slate-500 mt-3 mb-0 leading-relaxed">
                            💡 试验次数越多，<b>实验频率</b>通常越接近<b>理论概率</b>。多点几次“加做很多次”看看变化吧！
                        </p>
                    )}
                </div>
            );
        };

        /* ============ 通用：最近结果记录条 ============ */
        const HistoryStrip = ({ log, render }) => (
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
                <div className="text-sm text-slate-500 mb-2">试验记录（最近在最前）</div>
                {log.length === 0
                    ? <div className="text-slate-400 text-sm py-3 text-center">还没有记录，试着做一次吧～</div>
                    : <div className="flex flex-wrap gap-1.5">
                        {log.slice(-60).reverse().map((item, i) => (
                            <span key={log.length - i} className="inline-flex items-center justify-center min-w-[26px] h-7 px-1.5 rounded-md text-sm font-bold text-white" style={{ background: item.color }} title={item.label}>
                                {render(item)}
                            </span>
                        ))}
                    </div>}
                {log.length > 60 && <div className="text-xs text-slate-400 mt-2">仅显示最近 60 条，统计仍基于全部 {log.length} 次。</div>}
            </div>
        );

        // 控制按钮：做一次 / 做10次 / 做100次 / 清空
        const RunControls = ({ onceLabel, onOnce, onMany, onClear, busy, total }) => (
            <div className="flex flex-wrap items-center justify-center gap-2">
                <button onClick={onOnce} disabled={busy} className={`px-5 py-2.5 rounded-xl text-white font-semibold shadow smooth ${busy ? 'bg-slate-300' : 'bg-slate-800 hover:bg-slate-700'}`}>{onceLabel}</button>
                <button onClick={() => onMany(10)} disabled={busy} className="px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 smooth disabled:opacity-50">再做 10 次</button>
                <button onClick={() => onMany(100)} disabled={busy} className="px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 smooth disabled:opacity-50">再做 100 次</button>
                <button onClick={onClear} disabled={busy || !total} className="px-4 py-2.5 rounded-xl bg-white border border-rose-200 text-rose-500 hover:bg-rose-50 smooth disabled:opacity-40">清空 ↺</button>
            </div>
        );

        // 自定义 hook：管理某个实验的计数与记录
        const useTrials = (outcomes) => {
            const [counts, setCounts] = useState({});
            const [log, setLog] = useState([]);
            const total = log.length;
            const entryFor = (key) => {
                const o = outcomes.find(x => x.key === key) || { label: '?', color: '#94a3b8', short: '?' };
                return { key, label: o.label, color: o.color, short: o.short };
            };
            const record = (key) => {
                setCounts(prev => ({ ...prev, [key]: (prev[key] || 0) + 1 }));
                setLog(prev => [...prev, entryFor(key)]);
            };
            // 批量：一次性更新，避免多次渲染
            const recordMany = (keys) => {
                setCounts(prev => {
                    const next = { ...prev };
                    keys.forEach(k => { next[k] = (next[k] || 0) + 1; });
                    return next;
                });
                setLog(prev => [...prev, ...keys.map(entryFor)]);
            };
            const clear = () => { setCounts({}); setLog([]); };
            return { counts, log, total, record, recordMany, clear };
        };

        /* ============ ① 抛硬币 ============ */
        // 模拟真实硬币：正面是图案（国徽/花），反面是面值数字 1
        const COIN = [
            { key: 'H', label: '正面（图案）', short: '徽', color: '#d4a017', theoryNum: 1, theoryDen: 2 },
            { key: 'T', label: '反面（数字1）', short: '1', color: '#b8860b', theoryNum: 1, theoryDen: 2 }
        ];
        // 硬币金属质感（正反面共用）
        const CoinFace = ({ children, ariaHidden }) => (
            <div className="coin-face absolute inset-0 rounded-full flex items-center justify-center shadow-lg" aria-hidden={ariaHidden}
                style={{ background: 'radial-gradient(circle at 34% 28%, #fdf3c4 0%, #f4d160 34%, #d9a520 72%, #a9791a 100%)', border: '5px solid #b8860b', boxShadow: 'inset 0 0 0 4px rgba(255,255,255,.28), inset 0 -6px 12px rgba(120,80,10,.35), 0 6px 14px rgba(0,0,0,.25)' }}>
                {children}
            </div>
        );
        const CoinDemo = () => {
            const { counts, log, total, record, recordMany, clear } = useTrials(COIN);
            const [face, setFace] = useState('H');
            const [flipping, setFlipping] = useState(false);
            const spinRef = useRef(0);

            const flipOnce = () => {
                if (flipping) return;
                setFlipping(true);
                const result = Math.random() < 0.5 ? 'H' : 'T';
                // 多转几圈再停到目标面
                spinRef.current += 4 * 180 + (result === 'H' ? 0 : 180) - (spinRef.current % 360);
                setTimeout(() => {
                    setFace(result);
                    record(result);
                    setFlipping(false);
                }, 720);
            };
            const many = n => { recordMany(Array.from({ length: n }, () => Math.random() < 0.5 ? 'H' : 'T')); };

            const last = log[log.length - 1];
            return (
                <section className="fade-in">
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-5">
                        <p className="text-lg leading-relaxed m-0">抛一枚硬币，只有<b className="text-amber-600">正面（图案）</b>和<b className="text-amber-700">反面（数字1）</b>两种结果，可能性<b>一样大</b>，各占 <b>1/2</b>。</p>
                    </div>
                    <div className="grid md:grid-cols-2 gap-5">
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col items-center justify-center">
                            <div className="h-40 flex items-center justify-center mb-2" style={{ perspective: '600px' }}>
                                <div className="coin3d relative" style={{ width: 128, height: 128, transform: `rotateY(${spinRef.current}deg)` }}>
                                    {/* 正面：图案（花瓣纹样，象征国徽/花面） */}
                                    <CoinFace>
                                        <svg width="96" height="96" viewBox="0 0 96 96" aria-label="硬币正面图案">
                                            <circle cx="48" cy="48" r="40" fill="none" stroke="#8a6414" strokeWidth="1.5" strokeDasharray="2 3" />
                                            {Array.from({ length: 8 }, (_, i) => (
                                                <ellipse key={i} cx="48" cy="26" rx="7" ry="16" fill="#8a6414" opacity="0.85"
                                                    transform={`rotate(${i * 45} 48 48)`} />
                                            ))}
                                            <circle cx="48" cy="48" r="9" fill="#fdf3c4" stroke="#8a6414" strokeWidth="2" />
                                        </svg>
                                    </CoinFace>
                                    {/* 反面：面值数字 1 */}
                                    <div className="coin-back absolute inset-0">
                                        <CoinFace ariaHidden={false}>
                                            <div className="flex flex-col items-center leading-none">
                                                <span className="text-6xl font-black" style={{ color: '#7a5510', textShadow: '0 1px 0 rgba(255,255,255,.4)' }}>1</span>
                                                <span className="text-xs font-bold tracking-widest mt-1" style={{ color: '#8a6414' }}>元 · YUAN</span>
                                            </div>
                                        </CoinFace>
                                    </div>
                                </div>
                            </div>
                            <div className="text-center mb-4 h-6">
                                {last && !flipping && <span className="pop inline-block text-lg font-bold" style={{ color: last.color }}>这次是 {last.label}！</span>}
                                {flipping && <span className="text-slate-400">硬币翻转中…</span>}
                            </div>
                            <RunControls onceLabel="抛一次 🪙" onOnce={flipOnce} onMany={many} onClear={clear} busy={flipping} total={total} />
                        </div>
                        <StatsPanel outcomes={COIN} counts={counts} total={total} />
                    </div>
                    <div className="mt-5"><HistoryStrip log={log} render={it => it.short} /></div>
                </section>
            );
        };

        /* ============ ② 扔骰子 ============ */
        const DICE_COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#8b5cf6'];
        const DICE = Array.from({ length: 6 }, (_, i) => ({
            key: String(i + 1), label: `${i + 1} 点`, short: String(i + 1),
            color: DICE_COLORS[i], theoryNum: 1, theoryDen: 6
        }));
        // 骰子点阵布局（1-6），值为 9 宫格中亮点的位置
        const PIPS = {
            1: [[1, 1]], 2: [[0, 0], [2, 2]], 3: [[0, 0], [1, 1], [2, 2]],
            4: [[0, 0], [0, 2], [2, 0], [2, 2]], 5: [[0, 0], [0, 2], [1, 1], [2, 0], [2, 2]],
            6: [[0, 0], [0, 1], [0, 2], [2, 0], [2, 1], [2, 2]]
        };
        const CUBE = 132;                          // 立方体边长
        // 六个面在立方体上的贴法（面值 → transform）
        const FACE_TRANSFORMS = {
            1: `rotateY(0deg) translateZ(${CUBE / 2}px)`,      // 前
            6: `rotateY(180deg) translateZ(${CUBE / 2}px)`,    // 后
            3: `rotateY(90deg) translateZ(${CUBE / 2}px)`,     // 右
            4: `rotateY(-90deg) translateZ(${CUBE / 2}px)`,    // 左
            5: `rotateX(90deg) translateZ(${CUBE / 2}px)`,     // 上
            2: `rotateX(-90deg) translateZ(${CUBE / 2}px)`     // 下
        };
        // 让某个面值正对屏幕（前方）需要施加的整体旋转
        const RESULT_ORIENT = {
            1: { x: 0, y: 0 }, 6: { x: 0, y: 180 }, 3: { x: 0, y: -90 },
            4: { x: 0, y: 90 }, 5: { x: -90, y: 0 }, 2: { x: 90, y: 0 }
        };
        const CubeFace = ({ n }) => (
            <div className="cube-face" style={{ width: CUBE, height: CUBE, transform: FACE_TRANSFORMS[n] }}>
                {Array.from({ length: 9 }, (_, i) => {
                    const r = Math.floor(i / 3), c = i % 3;
                    const on = PIPS[n].some(([pr, pc]) => pr === r && pc === c);
                    return <div key={i} className="flex items-center justify-center">{on && <span className="pip" />}</div>;
                })}
            </div>
        );
        const DiceCube = ({ rot, tumbling }) => (
            <div className="dice-stage" style={{ width: CUBE, height: CUBE }}>
                <div className={`cube ${tumbling ? 'tumbling' : ''}`} style={{ width: CUBE, height: CUBE, transform: `translateZ(-${CUBE / 2}px) rotateX(${rot.x}deg) rotateY(${rot.y}deg)` }}>
                    {[1, 2, 3, 4, 5, 6].map(n => <CubeFace key={n} n={n} />)}
                </div>
            </div>
        );
        const DiceDemo = () => {
            const { counts, log, total, record, recordMany, clear } = useTrials(DICE);
            const [rot, setRot] = useState({ x: -20, y: 22 });   // 初始略微倾斜，能看出是立方体
            const [rolling, setRolling] = useState(false);
            const [dropKey, setDropKey] = useState(0);           // 触发下坠动画
            const spins = useRef({ x: 0, y: 0 });

            const rollOnce = () => {
                if (rolling) return;
                setRolling(true);
                setDropKey(k => k + 1);
                const result = randInt(6) + 1;
                const orient = RESULT_ORIENT[result];
                // 在结果朝向的基础上多翻几整圈，做出“翻滚”过程
                spins.current.x += 360 * (2 + randInt(2));
                spins.current.y += 360 * (2 + randInt(2));
                setRot({ x: spins.current.x + orient.x, y: spins.current.y + orient.y });
                setTimeout(() => {
                    record(String(result));
                    setRolling(false);
                }, 1150);
            };
            const many = m => { recordMany(Array.from({ length: m }, () => String(randInt(6) + 1))); };

            const last = log[log.length - 1];
            return (
                <section className="fade-in">
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-5">
                        <p className="text-lg leading-relaxed m-0">一颗骰子是<b>正方体</b>，有 <b>6</b> 个面。抛出后它会翻滚，掷出 1~6 点的可能性都<b className="text-emerald-600">一样大</b>，每个都是 <b>1/6</b>。</p>
                    </div>
                    <div className="grid md:grid-cols-2 gap-5">
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col items-center justify-center">
                            <div className="h-44 flex items-center justify-center mb-2">
                                <div key={dropKey} className={rolling ? 'dice-drop' : ''}>
                                    <DiceCube rot={rot} tumbling={rolling} />
                                </div>
                            </div>
                            <div className="text-center mb-4 h-6">
                                {last && !rolling && <span className="pop inline-block text-lg font-bold" style={{ color: last.color }}>掷出了 {last.label}！</span>}
                                {rolling && <span className="text-slate-400">骰子翻滚落地中…</span>}
                            </div>
                            <RunControls onceLabel="掷一次 🎲" onOnce={rollOnce} onMany={many} onClear={clear} busy={rolling} total={total} />
                        </div>
                        <StatsPanel outcomes={DICE} counts={counts} total={total} />
                    </div>
                    <div className="mt-5"><HistoryStrip log={log} render={it => it.short} /></div>
                </section>
            );
        };

        /* ============ 编辑器公用 ============ */
        const PALETTE = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6', '#f59e0b'];
        let uidSeq = 0;
        const uid = () => `item-${++uidSeq}`;
        // 数字步进器（占比 / 数量）
        const NumStepper = ({ value, onChange, min = 1, max = 99, disabled }) => (
            <div className="inline-flex items-center rounded-lg border border-slate-200 overflow-hidden">
                <button onClick={() => onChange(Math.max(min, value - 1))} disabled={disabled || value <= min} className="w-7 h-8 bg-slate-50 text-slate-600 hover:bg-slate-100 disabled:opacity-40">−</button>
                <input type="number" value={value} min={min} max={max} disabled={disabled}
                    onChange={e => { const v = Math.round(+e.target.value); if (!isNaN(v)) onChange(Math.max(min, Math.min(max, v))); }}
                    className="w-11 h-8 text-center outline-none border-x border-slate-200" />
                <button onClick={() => onChange(Math.min(max, value + 1))} disabled={disabled || value >= max} className="w-7 h-8 bg-slate-50 text-slate-600 hover:bg-slate-100 disabled:opacity-40">＋</button>
            </div>
        );
        // 颜色选择小圆点
        const ColorDots = ({ value, onChange, disabled }) => (
            <div className="flex flex-wrap gap-1">
                {PALETTE.map(c => (
                    <button key={c} onClick={() => onChange(c)} disabled={disabled} title={c}
                        className={`w-5 h-5 rounded-full border-2 smooth ${value === c ? 'border-slate-700 scale-110' : 'border-white'}`}
                        style={{ background: c, boxShadow: '0 0 0 1px #e2e8f0' }} />
                ))}
            </div>
        );
        // 折叠式编辑面板外壳
        const EditorShell = ({ open, setOpen, accent, title, children, disabled }) => (
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm mb-5 overflow-hidden">
                <button onClick={() => setOpen(!open)} disabled={disabled}
                    className="w-full flex items-center justify-between px-5 py-3 text-left hover:bg-slate-50 smooth disabled:opacity-50">
                    <span className="font-bold text-slate-700 flex items-center gap-2">
                        <span style={{ color: accent }}>✎</span> {title}
                    </span>
                    <span className="text-slate-400 text-sm">{open ? '收起 ▲' : '展开编辑 ▼'}</span>
                </button>
                {open && <div className="px-5 pb-5 border-t border-slate-100 pt-4 fade-in">{children}</div>}
            </div>
        );

        /* ============ ③ 转盘（可自定义区域·文字·占比·颜色） ============ */
        const WHEEL_PRESETS = [
            {
                name: '4 等分（一样大）',
                make: () => [
                    { id: uid(), label: '红', color: '#ef4444', weight: 1 },
                    { id: uid(), label: '黄', color: '#eab308', weight: 1 },
                    { id: uid(), label: '绿', color: '#22c55e', weight: 1 },
                    { id: uid(), label: '蓝', color: '#3b82f6', weight: 1 }
                ]
            },
            {
                name: '不等分（大小不同）',
                make: () => [
                    { id: uid(), label: '红', color: '#ef4444', weight: 3 },
                    { id: uid(), label: '黄', color: '#eab308', weight: 2 },
                    { id: uid(), label: '绿', color: '#22c55e', weight: 2 },
                    { id: uid(), label: '蓝', color: '#3b82f6', weight: 1 }
                ]
            },
            {
                name: '大奖抽奖盘',
                make: () => [
                    { id: uid(), label: '谢谢参与', color: '#94a3b8', weight: 12 },
                    { id: uid(), label: '小奖', color: '#22c55e', weight: 6 },
                    { id: uid(), label: '中奖', color: '#3b82f6', weight: 3 },
                    { id: uid(), label: '大奖', color: '#f59e0b', weight: 1 }
                ]
            }
        ];
        const polar = (cx, cy, r, deg) => {
            const a = (deg - 90) * Math.PI / 180;
            return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
        };
        const WheelDemo = () => {
            const [sectors, setSectors] = useState(() => WHEEL_PRESETS[0].make());
            const [editing, setEditing] = useState(false);
            const totalWeight = sectors.reduce((s, x) => s + x.weight, 0);

            // 每个扇形的角度区间
            const arcs = useMemo(() => {
                let acc = 0;
                return sectors.map(s => {
                    const start = acc / totalWeight * 360;
                    acc += s.weight;
                    const end = acc / totalWeight * 360;
                    return { ...s, start, end, mid: (start + end) / 2 };
                });
            }, [sectors, totalWeight]);

            const outcomes = sectors.map(s => ({
                key: s.id, label: s.label || '（空）', short: s.label || '·', color: s.color,
                theoryNum: s.weight, theoryDen: totalWeight
            }));
            const { counts, log, total, record, recordMany, clear } = useTrials(outcomes);

            const [angle, setAngle] = useState(0);
            const [spinning, setSpinning] = useState(false);
            const angleRef = useRef(0);

            // 任何编辑都会改变结果集，需重置已有统计
            const applySectors = next => { setSectors(next); clear(); };
            const loadPreset = i => { if (spinning) return; applySectors(WHEEL_PRESETS[i].make()); };
            const updateSector = (id, patch) => applySectors(sectors.map(s => s.id === id ? { ...s, ...patch } : s));
            const addSector = () => { if (sectors.length >= 8) return; applySectors([...sectors, { id: uid(), label: `区域${sectors.length + 1}`, color: PALETTE[sectors.length % PALETTE.length], weight: 1 }]); };
            const removeSector = id => { if (sectors.length <= 2) return; applySectors(sectors.filter(s => s.id !== id)); };

            const spinOnce = () => {
                if (spinning) return;
                setSpinning(true);
                const idx = weightedPick(sectors.map(s => s.weight));
                const target = arcs[idx];
                // 指针固定在顶部，转盘需转到该扇形中点对准顶部
                const landing = 360 - target.mid;
                const next = angleRef.current - (angleRef.current % 360) + 360 * 5 + landing;
                angleRef.current = next;
                setAngle(next);
                setTimeout(() => {
                    record(sectors[idx].id);
                    setSpinning(false);
                }, 2450);
            };
            const many = m => { recordMany(Array.from({ length: m }, () => sectors[weightedPick(sectors.map(s => s.weight))].id)); };

            const size = 260, cx = size / 2, cy = size / 2, r = size / 2 - 6;
            const last = log[log.length - 1];
            return (
                <section className="fade-in">
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-5">
                        <p className="text-lg leading-relaxed m-0">转盘停在哪个区域，取决于<b className="text-fuchsia-600">扇形的大小（占比）</b>。占比越大，指针停在它上面的可能性就越大。你可以<b className="text-fuchsia-600">自己编辑</b>区域、文字和占比。</p>
                        <div className="flex flex-wrap gap-2 mt-3">
                            <span className="text-sm text-slate-400 self-center mr-1">快速套用：</span>
                            {WHEEL_PRESETS.map((p, i) => (
                                <button key={p.name} onClick={() => loadPreset(i)} disabled={spinning}
                                    className="px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-500 text-sm hover:border-fuchsia-300 smooth disabled:opacity-50">{p.name}</button>
                            ))}
                        </div>
                    </div>

                    <EditorShell open={editing} setOpen={setEditing} disabled={spinning} accent="#c026d3" title="编辑转盘区域（文字 · 占比 · 颜色）">
                        <div className="space-y-2">
                            {sectors.map((s, i) => {
                                const p = totalWeight ? s.weight / totalWeight : 0;
                                return (
                                    <div key={s.id} className="flex flex-wrap items-center gap-2 rounded-xl border border-slate-100 bg-slate-50/60 p-2">
                                        <span className="w-6 h-6 rounded-full shrink-0" style={{ background: s.color }} />
                                        <input value={s.label} maxLength={6} onChange={e => updateSector(s.id, { label: e.target.value })}
                                            placeholder={`区域${i + 1}`} className="flex-1 min-w-[90px] px-2 py-1.5 rounded-lg border border-slate-200 outline-none focus:border-fuchsia-300" />
                                        <label className="text-xs text-slate-500 flex items-center gap-1.5">占比<NumStepper value={s.weight} onChange={w => updateSector(s.id, { weight: w })} /></label>
                                        <span className="text-xs text-fuchsia-600 w-14 text-right font-semibold">{pct1(p)}%</span>
                                        <ColorDots value={s.color} onChange={c => updateSector(s.id, { color: c })} />
                                        <button onClick={() => removeSector(s.id)} disabled={sectors.length <= 2} title="删除该区域"
                                            className="w-7 h-7 rounded-lg text-rose-500 hover:bg-rose-50 disabled:opacity-30">✕</button>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex items-center justify-between mt-3">
                            <button onClick={addSector} disabled={sectors.length >= 8} className="px-3 py-1.5 rounded-lg border border-fuchsia-200 text-fuchsia-600 text-sm hover:bg-fuchsia-50 disabled:opacity-40">＋ 添加区域</button>
                            <span className="text-xs text-slate-400">占比合计 {totalWeight} 份 · 最多 8 个区域 · 修改后统计会重置</span>
                        </div>
                    </EditorShell>
                    <div className="grid md:grid-cols-2 gap-5">
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col items-center justify-center">
                            <div className="relative mb-3" style={{ width: size, height: size + 14 }}>
                                {/* 指针 */}
                                <div className="absolute left-1/2 -translate-x-1/2 z-10" style={{ top: -2 }}>
                                    <svg width="30" height="30" viewBox="0 0 30 30"><path d="M15 30 L4 6 A13 13 0 0 1 26 6 Z" fill="#1e293b" /></svg>
                                </div>
                                <svg className="wheel-spin" width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: `rotate(${angle}deg)`, marginTop: 8 }}>
                                    {arcs.map(a => {
                                        const [x1, y1] = polar(cx, cy, r, a.start);
                                        const [x2, y2] = polar(cx, cy, r, a.end);
                                        const large = (a.end - a.start) > 180 ? 1 : 0;
                                        const [lx, ly] = polar(cx, cy, r * 0.62, a.mid);
                                        const single = arcs.length === 1;
                                        const fontSize = a.label.length >= 4 ? 13 : a.label.length === 3 ? 16 : 20;
                                        return (
                                            <g key={a.id}>
                                                {single
                                                    ? <circle cx={cx} cy={cy} r={r} fill={a.color} stroke="#fff" strokeWidth="2.5" />
                                                    : <path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`} fill={a.color} stroke="#fff" strokeWidth="2.5" />}
                                                <text x={single ? cx : lx} y={single ? cy : ly} fill="#fff" fontSize={fontSize} fontWeight="bold" textAnchor="middle" dominantBaseline="middle">{a.label}</text>
                                            </g>
                                        );
                                    })}
                                    <circle cx={cx} cy={cy} r="16" fill="#fff" stroke="#cbd5e1" strokeWidth="2" />
                                </svg>
                            </div>
                            <div className="text-center mb-4 h-6">
                                {last && !spinning && <span className="pop inline-block text-lg font-bold" style={{ color: last.color }}>指向了「{last.label}」！</span>}
                                {spinning && <span className="text-slate-400">转盘旋转中…</span>}
                            </div>
                            <RunControls onceLabel="转一次 🎡" onOnce={spinOnce} onMany={many} onClear={clear} busy={spinning} total={total} />
                        </div>
                        <StatsPanel outcomes={outcomes} counts={counts} total={total} />
                    </div>
                    <div className="mt-5"><HistoryStrip log={log} render={it => it.short} /></div>
                </section>
            );
        };

        /* ============ ④ 抽盲盒（可自定义内容物·数量·概率） ============ */
        const EMOJI_CHOICES = ['⭐', '💖', '🌙', '👑', '💎', '🎀', '🍬', '🧸', '🚀', '🌈', '🍀', '🐱'];
        const DEFAULT_BOX = () => [
            { id: uid(), label: '星星款', emoji: '⭐', color: '#f59e0b', count: 6 },
            { id: uid(), label: '爱心款', emoji: '💖', color: '#ec4899', count: 4 },
            { id: uid(), label: '月亮款', emoji: '🌙', color: '#6366f1', count: 3 },
            { id: uid(), label: '皇冠款', emoji: '👑', color: '#eab308', count: 2 },
            { id: uid(), label: '钻石·隐藏款', emoji: '💎', color: '#06b6d4', count: 1 }
        ];
        // 按每款数量铺开并洗牌，得到一整箱（不放回）
        const buildBag = items => {
            const bag = [];
            items.forEach(it => { for (let i = 0; i < it.count; i++) bag.push(it.id); });
            for (let i = bag.length - 1; i > 0; i--) {
                const j = randInt(i + 1);
                [bag[i], bag[j]] = [bag[j], bag[i]];
            }
            return bag;
        };
        const BlindBoxDemo = () => {
            const [items, setItems] = useState(DEFAULT_BOX);
            const [editing, setEditing] = useState(false);
            const boxTotal = items.reduce((s, x) => s + x.count, 0);
            // bag 必须由当前 items 装成，id 保持一致（下方 useState 用同一份 items 初始化）

            const outcomes = items.map(it => ({
                key: it.id, label: it.label || '（未命名）', short: it.emoji, color: it.color,
                theoryNum: it.count, theoryDen: boxTotal
            }));
            const { counts, log, total, record, recordMany, clear } = useTrials(outcomes);
            const [bag, setBag] = useState(() => buildBag(items));
            const [drawn, setDrawn] = useState(null);
            const [opening, setOpening] = useState(false);
            const remain = bag.length;

            // 编辑内容物后：重置统计并换上按新配置装好的新箱
            const applyItems = next => { setItems(next); clear(); setBag(buildBag(next)); setDrawn(null); };
            const updateItem = (id, patch) => applyItems(items.map(it => it.id === id ? { ...it, ...patch } : it));
            const addItem = () => {
                if (items.length >= 8) return;
                const emoji = EMOJI_CHOICES[items.length % EMOJI_CHOICES.length];
                applyItems([...items, { id: uid(), label: `第${items.length + 1}款`, emoji, color: PALETTE[items.length % PALETTE.length], count: 1 }]);
            };
            const removeItem = id => { if (items.length <= 2) return; applyItems(items.filter(it => it.id !== id)); };

            const drawOne = () => {
                if (opening) return;
                setOpening(true);
                setDrawn(null);
                setTimeout(() => {
                    let b = bag;
                    if (b.length === 0) b = buildBag(items);     // 抽完自动换新箱
                    const key = b[0];
                    setBag(b.slice(1));
                    setDrawn(key);
                    record(key);
                    setOpening(false);
                }, 550);
            };
            // 批量抽：连续从箱里取，空了就换新箱
            const many = m => {
                let b = [...bag];
                const keys = [];
                for (let i = 0; i < m; i++) {
                    if (b.length === 0) b = buildBag(items);
                    keys.push(b.shift());
                }
                setBag(b);
                recordMany(keys);
                setDrawn(keys[keys.length - 1]);
            };
            const resetAll = () => { clear(); setBag(buildBag(items)); setDrawn(null); };
            const newBox = () => { if (!opening) setBag(buildBag(items)); };

            const drawnItem = drawn ? items.find(x => x.id === drawn) : null;
            return (
                <section className="fade-in">
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-5">
                        <p className="text-lg leading-relaxed m-0">一箱盲盒共 <b>{boxTotal}</b> 个，不同款数量不同。<b className="text-cyan-600">数量越少</b>的款（比如隐藏款），抽到的可能性就<b>越小</b>。你可以<b className="text-cyan-600">自己编辑</b>内容物、数量和抽中概率。</p>
                    </div>

                    <EditorShell open={editing} setOpen={setEditing} disabled={opening} accent="#0891b2" title="编辑盲盒内容物（名称 · 图标 · 数量 · 概率）">
                        <div className="space-y-2">
                            {items.map((it, i) => {
                                const p = boxTotal ? it.count / boxTotal : 0;
                                return (
                                    <div key={it.id} className="flex flex-wrap items-center gap-2 rounded-xl border border-slate-100 bg-slate-50/60 p-2">
                                        <select value={it.emoji} onChange={e => updateItem(it.id, { emoji: e.target.value })}
                                            className="text-xl h-9 px-1 rounded-lg border border-slate-200 bg-white outline-none">
                                            {(EMOJI_CHOICES.includes(it.emoji) ? EMOJI_CHOICES : [it.emoji, ...EMOJI_CHOICES]).map(e => <option key={e} value={e}>{e}</option>)}
                                        </select>
                                        <input value={it.label} maxLength={8} onChange={e => updateItem(it.id, { label: e.target.value })}
                                            placeholder={`第${i + 1}款`} className="flex-1 min-w-[90px] px-2 py-1.5 rounded-lg border border-slate-200 outline-none focus:border-cyan-300" />
                                        <label className="text-xs text-slate-500 flex items-center gap-1.5">数量<NumStepper value={it.count} onChange={c => updateItem(it.id, { count: c })} /></label>
                                        <span className="text-xs text-cyan-600 w-20 text-right font-semibold">{probFraction(it.count, boxTotal)} ≈ {pct1(p)}%</span>
                                        <ColorDots value={it.color} onChange={c => updateItem(it.id, { color: c })} />
                                        <button onClick={() => removeItem(it.id)} disabled={items.length <= 2} title="删除该款"
                                            className="w-7 h-7 rounded-lg text-rose-500 hover:bg-rose-50 disabled:opacity-30">✕</button>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex items-center justify-between mt-3">
                            <button onClick={addItem} disabled={items.length >= 8} className="px-3 py-1.5 rounded-lg border border-cyan-200 text-cyan-600 text-sm hover:bg-cyan-50 disabled:opacity-40">＋ 添加一款</button>
                            <span className="text-xs text-slate-400">一箱共 {boxTotal} 个 · 最多 8 款 · 修改后统计会重置</span>
                        </div>
                    </EditorShell>

                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 mb-5">
                        <div className="text-sm text-slate-500 mb-2">这一箱里的款式与数量：</div>
                        <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-2">
                            {items.map(it => (
                                <div key={it.id} className="rounded-xl border border-slate-200 p-2 text-center" style={{ background: it.color + '14' }}>
                                    <div className="text-2xl">{it.emoji}</div>
                                    <div className="text-xs font-semibold text-slate-600 mt-1 truncate">{it.label || '（未命名）'}</div>
                                    <div className="text-xs" style={{ color: it.color }}><b>{it.count}</b> 个 · {probFraction(it.count, boxTotal)}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-5">
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col items-center justify-center">
                            <div className="h-40 flex items-center justify-center mb-2">
                                {opening
                                    ? <div className="text-6xl" style={{ animation: 'shake .5s ease infinite' }}>📦</div>
                                    : drawnItem
                                        ? <div className="pop flex flex-col items-center">
                                            <div className="text-7xl">{drawnItem.emoji}</div>
                                            <div className="mt-1 text-lg font-bold" style={{ color: drawnItem.color }}>{drawnItem.label || '（未命名）'}</div>
                                        </div>
                                        : <div className="text-6xl opacity-60">🎁</div>}
                            </div>
                            <div className="text-center mb-4 h-5 text-sm text-slate-500">
                                本箱还剩 <b className="text-slate-700">{remain}</b> / {boxTotal} 个
                                <button onClick={newBox} disabled={opening} className="ml-2 text-cyan-600 hover:underline disabled:opacity-40">换新的一箱</button>
                            </div>
                            <RunControls onceLabel="抽一个 🎁" onOnce={drawOne} onMany={many} onClear={resetAll} busy={opening} total={total} />
                            <p className="text-xs text-slate-400 mt-3 text-center">不放回抽取：抽走就少一个；抽完一整箱会自动换新箱。</p>
                        </div>
                        <StatsPanel outcomes={outcomes} counts={counts} total={total} />
                    </div>
                    <div className="mt-5"><HistoryStrip log={log} render={it => it.short} /></div>
                </section>
            );
        };

        const TABS = [
            { id: 'coin', title: '① 抛硬币', hint: '图案 / 数字1', color: 'bg-amber-500' },
            { id: 'dice', title: '② 扔骰子', hint: '立体骰子翻滚', color: 'bg-emerald-600' },
            { id: 'wheel', title: '③ 抽奖转盘', hint: '可自定义区域', color: 'bg-fuchsia-600' },
            { id: 'box', title: '④ 抽盲盒', hint: '可自定义内容', color: 'bg-cyan-600' }
        ];

        const App = () => {
            const [tab, setTab] = useState('coin');
            return (
                <main className="max-w-5xl mx-auto px-4 py-8">
                    <header className="relative text-center mb-6 px-12">
                        <a href="/" aria-label="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm hover:bg-slate-50 smooth">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </a>
                        <div className="inline-flex px-3 py-1 rounded-full bg-indigo-100 text-indigo-700 text-sm font-semibold mb-2">五年级 · 统计与概率 · 可能性</div>
                        <h1 className="text-3xl md:text-4xl font-bold text-slate-800 m-0">可能性实验室</h1>
                        <p className="text-slate-500 mt-3 mb-0">动手做试验、<b className="text-indigo-600">记录数据</b>，在游戏里看懂<b>可能性大小</b>与<b>频率</b></p>
                    </header>
                    <nav className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-7" aria-label="实验模块">
                        {TABS.map(t => <button key={t.id} onClick={() => setTab(t.id)} className={`p-3 rounded-xl border-2 text-left smooth ${tab === t.id ? `${t.color} text-white border-transparent shadow-md` : 'bg-white text-slate-600 border-slate-200 hover:border-slate-300'}`}><b className="block">{t.title}</b><span className={`text-xs ${tab === t.id ? 'text-white/80' : 'text-slate-400'}`}>{t.hint}</span></button>)}
                    </nav>
                    {tab === 'coin' && <CoinDemo />}
                    {tab === 'dice' && <DiceDemo />}
                    {tab === 'wheel' && <WheelDemo />}
                    {tab === 'box' && <BlindBoxDemo />}
                    <footer className="text-center text-slate-400 text-sm mt-10">Math101 · 可能性与概率可视化 · 适用人教版五年级上册</footer>
                </main>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <div style="box-sizing:border-box;width:100%;padding:24px 16px;text-align:center;color:#94a3b8;font:13px/1.6 system-ui,-apple-system,sans-serif;">©孙维刚教育研究院 小宇老师 版权所有</div>
</body>
</html>
