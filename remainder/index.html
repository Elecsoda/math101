<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有余数的除法 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .smooth-transition { transition: all 0.35s cubic-bezier(0.4,0,0.2,1); }
        .pop { animation: pop 0.4s ease; }
        @keyframes pop { 0%{transform:scale(0.4);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
        .shake { animation: shake 0.35s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        /* 竖式：等宽数字 + 固定网格列，保证位值对齐 */
        .ld { font-variant-numeric: tabular-nums; font-family: 'Courier New', ui-monospace, monospace; }
        .cell-in { width: 2.2rem; text-align: center; border: none; border-bottom: 2px dashed #cbd5e1; background: transparent; font: inherit; outline: none; }
        .cell-in:focus { border-bottom-color: #6366f1; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ============ 难度配置 ============
        const LEVELS = {
            t1: { label: '两位数 ÷ 一位数', dividend: [10, 99],    divisor: [2, 9] },
            m1: { label: '多位数 ÷ 一位数', dividend: [100, 9999], divisor: [2, 9] },
            m2: { label: '多位数 ÷ 两位数', dividend: [120, 9999], divisor: [11, 99] },
            mm: { label: '多位数 ÷ 多位数', dividend: [1000, 99999], divisor: [100, 999] },
        };
        function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

        // 生成一道有余数的题（余数 > 0，商 ≥ 1）
        function genProblem(levelKey) {
            const L = LEVELS[levelKey];
            for (let t = 0; t < 800; t++) {
                const divisor = randInt(L.divisor[0], L.divisor[1]);
                const dividend = randInt(L.dividend[0], L.dividend[1]);
                const q = Math.floor(dividend / divisor), r = dividend % divisor;
                if (r > 0 && q >= 1 && divisor > 1) return { dividend, divisor, q, r };
            }
            return { dividend: 13, divisor: 4, q: 3, r: 1 };
        }

        // ============ 长除法计算引擎 ============
        // 输出按"被除数数位"对齐的结构，供网格渲染使用。
        // 关键：从最高位除起；每一位算出 商位、积、余；余数与下一位合并继续。
        function longDivPlan(dividend, divisor) {
            const digits = String(dividend).split('').map(Number);
            const n = digits.length;
            const rows = [];            // 每个"有效除法步骤"产生一行积 + 一行余数
            const quotient = new Array(n).fill(null); // 每个数位上的商（null=该位不写商，前导）
            let cur = 0, started = false;
            for (let i = 0; i < n; i++) {
                cur = cur * 10 + digits[i];          // 把第 i 位下拉/合并进来
                const qd = Math.floor(cur / divisor);
                if (qd === 0 && !started) {
                    // 前导：当前位不够除，不写商，继续合并下一位
                    quotient[i] = null;
                    continue;
                }
                started = true;
                const prod = qd * divisor;
                const rem = cur - prod;
                quotient[i] = qd;
                rows.push({
                    atCol: i,                 // 这一步"除到"被除数第 i 位（积、余的最右列）
                    partial: cur,             // 参与本步运算的部分被除数
                    qd, prod, rem,
                    nextDigit: i + 1 < n ? digits[i + 1] : null, // 下一位（要下拉的）
                    nextCol: i + 1,
                });
                cur = rem;
            }
            return { digits, n, rows, quotient, remainder: cur, quotientStr: String(Math.floor(dividend / divisor)) };
        }

        // ============ 分一分·分步剧本（stages）============
        // 把"分小棒"拆成学生能一步步看懂的镜头。每个 stage 描述"此刻"的完整场景，
        // 关键新增：位不够分时给出明显提示，并把"拆捆→散点/成捆落到下一位"变成看得见的一步。
        // stage.type:
        //   'layout'   摆出整个被除数
        //   'tooSmall' 当前最高位不够分：高亮 + 大提示 + 拆开落到下一位（散点/成捆，按来源着色）
        //   'split'    把当前位平均分成 divisor 份（写商）
        //   'leftover' 看剩多少；若还有下一位，拆开落下去
        // stage.rowIdx / half: 对应竖式的第几行、上/下半步（写商 or 减法+下拉），用于两栏同步。
        function buildStages(dividend, divisor) {
            const plan = longDivPlan(dividend, divisor);
            const { digits, n, rows } = plan;

            // lanes[power] = { native, carried, carriedFrom }
            //   native      = 本来就属于这一位的件数
            //   carried     = 从更高位拆下来、落到这一位的件数（画成本位形状，但用来源颜色着色）
            //   carriedFrom = carried 来自哪一位（用于着色 / 文案），无则为 null
            function freshLanes() {
                const L = {};
                for (let p = 0; p < n; p++) L[n - 1 - p] = { native: digits[p], carried: 0, carriedFrom: null };
                return L;
            }
            const clone = (L) => { const o = {}; for (const k in L) o[k] = { ...L[k] }; return o; };
            const totalAt = (L, p) => (L[p] ? L[p].native + L[p].carried : 0);

            let lanes = freshLanes();
            const stages = [{ type: 'layout', lanes: clone(lanes) }];

            let prevAtCol = -1;
            rows.forEach((r, ri) => {
                // —— 被跳过的高位：逐个给"不够分→拆"镜头 ——
                for (let col = prevAtCol + 1; col < r.atCol; col++) {
                    const p = n - 1 - col;
                    const have = totalAt(lanes, p);         // 这一位现在有多少（含上位拆下）
                    // 拆：这一位每件换成 10 件下一位，全部落到下一位（本位清空）
                    const np = p - 1;
                    const before = clone(lanes);            // 拆之前（用于"untie"动画的起点）
                    lanes[np].carried += have * 10;
                    lanes[np].carriedFrom = p;
                    lanes[p].native = 0; lanes[p].carried = 0; lanes[p].carriedFrom = null;
                    stages.push({
                        type: 'tooSmall', col, power: p, rowIdx: ri, half: 0,
                        have, divisor, toPower: np,
                        before, lanes: clone(lanes),
                    });
                }
                // —— 分本位 ——
                const p = n - 1 - r.atCol;
                stages.push({
                    type: 'split', col: r.atCol, power: p, rowIdx: ri, half: 0,
                    partial: r.partial, qd: r.qd, rem: r.rem, native: digits[r.atCol],
                    carried: totalAt(lanes, p) - digits[r.atCol],
                    carriedFrom: lanes[p].carried > 0 ? lanes[p].carriedFrom : null,
                    lanes: clone(lanes),
                });
                // —— 看剩余：若还有下一位，拆开落下去 ——
                const before = clone(lanes);
                // 本位分完：清空本位，余数 r.rem 拆成下一位（若有）
                lanes[p].native = 0; lanes[p].carried = 0; lanes[p].carriedFrom = null;
                let carriedInfo = null;
                if (r.nextDigit !== null) {
                    const np = p - 1;
                    lanes[np].carried += r.rem * 10;
                    lanes[np].carriedFrom = p;
                    carriedInfo = { rem: r.rem, toPower: np, nextDigit: r.nextDigit, combined: r.rem * 10 + r.nextDigit };
                }
                stages.push({
                    type: 'leftover', col: r.atCol, power: p, rowIdx: ri, half: 1,
                    partial: r.partial, qd: r.qd, rem: r.rem,
                    nextDigit: r.nextDigit, carriedInfo,
                    before, lanes: clone(lanes),
                });
                prevAtCol = r.atCol;
            });
            return { plan, stages, n };
        }

        // ============ 竖式网格渲染（核心：位值对齐） ============
        // 用 CSS Grid，列数 = 被除数位数 + 1（最左列放除数与符号）。
        // step: 0 只摆算式；之后每个有效行贡献 2 步。
        const LongDivisionGrid = ({ dividend, divisor, step }) => {
            const plan = longDivPlan(dividend, divisor);
            const { digits, n, rows, quotient, remainder } = plan;
            const COL = 2.4;            // 每个数位列宽 rem
            const LEAD = 3.2;           // 最左列（除数列）宽 rem
            const gridStyle = { display: 'grid', gridTemplateColumns: `${LEAD}rem repeat(${n}, ${COL}rem)`, justifyContent: 'start' };

            // 一个数字格
            const Cell = ({ col, children, cls = '' }) => (
                <div className={"text-2xl text-center leading-9 " + cls} style={{ gridColumnStart: col + 2 }}>{children}</div>
            );

            // —— 商行（最顶）——
            const quotientRow = (
                <div style={gridStyle} className="ld">
                    <div style={{ gridColumnStart: 1 }} />
                    {digits.map((_, i) => {
                        // 第 i 位的商，在"写到该位"那一步出现。该位对应的 row 是 atCol===i 的行；
                        // 写商发生在该行的第 1 个 step。
                        const rowIdx = rows.findIndex(r => r.atCol === i);
                        const visible = rowIdx >= 0 && step >= rowIdx * 2 + 1;
                        return (
                            <div key={i} className={"text-2xl text-center leading-9 font-bold text-blue-600 " + (visible ? 'pop' : '')}
                                 style={{ gridColumnStart: i + 2 }}>
                                {visible ? quotient[i] : ''}
                            </div>
                        );
                    })}
                </div>
            );

            // —— 被除数行（除数 ⌐ 被除数）——
            // 人教版长除号："⌐"形——除数右侧一条竖线，向右上方转折成一条盖在被除数上方的横线，
            // 两条线在左上角相连。这里让竖线占满 lead 列右缘、横线盖住所有被除数列，并在转角相接。
            const dividendRow = (
                <div style={gridStyle} className="ld relative">
                    <div style={{ gridColumnStart: 1 }} className="text-2xl leading-9 text-emerald-600 font-semibold flex items-center justify-end relative pr-2">
                        {divisor}
                        {/* 竖线：紧贴 lead 列右缘，顶端与横线相接 */}
                        <span className="absolute right-0 top-0 bottom-0 border-l-2 border-gray-800" />
                        {/* 转角小圆弧的替代：左端一小段横线，与被除数上方横线连成一条 */}
                    </div>
                    {digits.map((d, i) => (
                        <div key={i}
                             className={"text-2xl text-center leading-9 text-indigo-600 border-t-2 border-gray-800 " + (i === 0 ? 'rounded-tl-sm' : '')}
                             style={{ gridColumnStart: i + 2 }}>{d}</div>
                    ))}
                </div>
            );

            // —— 中间各行：每个有效 row 产出"积行"和"余数(+下拉)行" ——
            const body = [];
            rows.forEach((r, ri) => {
                const prodStep = ri * 2 + 1;   // 写商 + 写积
                const subStep  = ri * 2 + 2;   // 画线 + 写余 + 下拉

                // 积行：右端落在 atCol（人教版不写减号，减数直接对位写在下方）
                if (step >= prodStep) {
                    body.push(
                        <div key={'p' + ri} style={gridStyle} className="ld fade-in">
                            {String(r.prod).split('').map((ch, k) => {
                                const col = r.atCol - (String(r.prod).length - 1 - k); // 右对齐到 atCol
                                return <div key={k} className="text-2xl text-center leading-9 text-rose-500"
                                            style={{ gridColumnStart: col + 2 }}>{ch}</div>;
                            })}
                        </div>
                    );
                }
                // 横线 + 余数行 + 下拉
                if (step >= subStep) {
                    const remDigits = String(r.rem).split('');
                    body.push(
                        <div key={'l' + ri} style={gridStyle} className="ld">
                            {/* 横线：覆盖参与本步的列（从 atCol - (积位数-1) 到 atCol） */}
                            {Array.from({ length: String(r.prod).length }).map((_, k) => {
                                const col = r.atCol - (String(r.prod).length - 1) + k;
                                return <div key={k} className="border-t-2 border-gray-700 h-1" style={{ gridColumnStart: col + 2 }} />;
                            })}
                        </div>,
                        <div key={'r' + ri} style={gridStyle} className="ld fade-in">
                            {remDigits.map((ch, k) => {
                                const col = r.atCol - (remDigits.length - 1 - k);
                                return <div key={k} className="text-2xl text-center leading-9 text-gray-800"
                                            style={{ gridColumnStart: col + 2 }}>{ch}</div>;
                            })}
                            {/* 下拉下一位 */}
                            {r.nextDigit !== null && (
                                <div className="text-2xl text-center leading-9 text-indigo-400" style={{ gridColumnStart: r.nextCol + 2 }}>
                                    <span>{r.nextDigit}</span>
                                    <span className="block text-[10px] text-indigo-300 leading-none -mt-1">↓</span>
                                </div>
                            )}
                        </div>
                    );
                }
            });

            const maxStep = rows.length * 2;
            const done = step >= maxStep;

            return (
                <div className="inline-block bg-white rounded-xl shadow p-5">
                    {quotientRow}
                    {dividendRow}
                    <div className="mt-1 flex flex-col gap-0.5">{body}</div>
                    {done && (
                        <div className="mt-3 text-center text-sm fade-in">
                            最后剩下 <b className="text-rose-500">{remainder}</b>，不够再除一次，就是<b className="text-rose-500">余数</b>
                            <div className="text-xs text-gray-400 mt-0.5">余数 {remainder} &lt; 除数 {divisor} ✔</div>
                        </div>
                    )}
                </div>
            );
        };

        // ============ 小棒分物（打捆·连续场景）——与竖式同步 ============
        // 用"位值点"表示被除数，且不同数位的样子不同：
        //   个位 = 一个散点；十位 = 10 个点打成一竖捆；百位 = 100 个点打成一个方块（10×10）。
        // 整个被除数的所有点从头到尾都在同一个场景里，学生能看清"从哪边（最高位）开始分"。
        // 每一步只高亮当前正在分的那一位：先分它、看剩下什么、把剩下的"拆捆"落到下一位，连续进行。
        const PLACE_NAMES = ['个', '十', '百', '千', '万'];
        const PLACE_COLOR = [
            { dot: 'bg-sky-500',     ring: 'border-sky-400',     soft: 'bg-sky-50',     text: 'text-sky-600'     }, // 个
            { dot: 'bg-emerald-500', ring: 'border-emerald-400', soft: 'bg-emerald-50', text: 'text-emerald-600' }, // 十
            { dot: 'bg-amber-500',   ring: 'border-amber-400',   soft: 'bg-amber-50',   text: 'text-amber-600'   }, // 百
            { dot: 'bg-violet-500',  ring: 'border-violet-400',  soft: 'bg-violet-50',  text: 'text-violet-600'  }, // 千
            { dot: 'bg-rose-500',    ring: 'border-rose-400',    soft: 'bg-rose-50',    text: 'text-rose-600'     }, // 万
        ];

        // 一个"位值件"：按数位画出不同样子的一件。
        //   个位 = 一个散点；十位 = 10 个点打成一竖捆；百位 = 100 个点打成一个方块（10×10）；
        //   千/万位 = 在方块上叠标数值（超过百位后逐点画不现实，改用带数值的大方块，仍是"打捆"含义）。
        // shape 决定画成"整捆/方块"还是"散点"；tint 决定颜色属于哪个数位（用于区分"这点是从哪一位拆下来的"）。
        const PlacePiece = ({ power, dim, breaking, loose, tint }) => {
            const shapePower = loose ? 0 : power;                 // loose=散点形状
            const c = PLACE_COLOR[Math.min(tint != null ? tint : power, 4)]; // tint=颜色所属数位
            const cls = "smooth-transition " + (dim ? 'opacity-30 ' : '') + (breaking ? 'shake ' : '');
            if (shapePower === 0) {
                // 散点：ring 描边让不同来源的散点更易区分
                return <span className={"inline-block w-3 h-3 rounded-full border " + c.dot + ' ' + c.ring + ' ' + cls} />;
            }
            if (shapePower === 1) {
                return (
                    <span className={"inline-flex flex-col items-center gap-[1px] px-[3px] py-[2px] rounded border " + c.ring + ' ' + c.soft + ' ' + cls} title="10">
                        {Array.from({ length: 10 }).map((_, k) => <span key={k} className={"w-2 h-2 rounded-full " + c.dot} />)}
                    </span>
                );
            }
            if (shapePower === 2) {
                return (
                    <span className={"inline-grid grid-cols-10 gap-[1px] p-[2px] rounded border-2 " + c.ring + ' ' + c.soft + ' ' + cls} title="100">
                        {Array.from({ length: 100 }).map((_, k) => <span key={k} className={"w-[3px] h-[3px] rounded-[1px] " + c.dot} />)}
                    </span>
                );
            }
            // 千位及以上：带数值标注的大方块（代表打成更大的一捆）
            return (
                <span className={"inline-flex items-center justify-center rounded border-2 font-bold text-white w-8 h-8 text-[11px] " + c.dot + ' ' + c.ring + ' ' + cls}
                      title={String(Math.pow(10, power))}>
                    {power === 3 ? '千' : (power === 4 ? '万' : '10^' + power)}
                </span>
            );
        };

        // 渲染一组同数位的件；数量过多时用"一件 ×N"的紧凑形式，避免 DOM 爆炸。
        const PIECE_CAP = 24; // 单条泳道最多逐件画多少个
        const PieceGroup = ({ power, count, breaking, loose, tint }) => {
            if (count <= 0) return null;
            if (count <= PIECE_CAP) {
                return <>{Array.from({ length: count }).map((_, k) => <PlacePiece key={k} power={power} breaking={breaking} loose={loose} tint={tint} />)}</>;
            }
            // 过多：画一件示意 + 数量
            return (
                <span className="inline-flex items-center gap-1">
                    <PlacePiece power={power} breaking={breaking} loose={loose} tint={tint} />
                    <span className="text-sm font-bold text-gray-500">× {count}</span>
                </span>
            );
        };

        // 一条"数位泳道"：标题 + 一排位值件；支持高亮 / 变暗
        const PlaceLane = ({ power, children, active, faded, note }) => {
            const c = PLACE_COLOR[Math.min(power, 4)];
            return (
                <div className={"smooth-transition rounded-xl px-3 py-2 border-2 " +
                    (active ? c.ring + ' ' + c.soft + ' shadow-sm' : 'border-transparent ') +
                    (faded ? ' opacity-40' : '')}>
                    <div className="flex items-center gap-2 mb-1">
                        <span className={"text-xs font-bold " + c.text}>{PLACE_NAMES[power] || `10^${power}`}位</span>
                        {active && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-indigo-500 text-white">正在分</span>}
                        {note && <span className="text-[10px] text-gray-400">{note}</span>}
                    </div>
                    <div className="flex flex-wrap items-start gap-1.5 min-h-[1.75rem]">{children}</div>
                </div>
            );
        };

        const nameOf = (p) => PLACE_NAMES[p] || `10^${p}`;
        const unitOf = (p) => (p === 0 ? '' : nameOf(p));   // 个位说"个"，十位说"个十"…

        // 一条数位泳道：画本位原有件(native) + 从上位拆下来的件(carried，用来源颜色着色)
        const LaneRow = ({ power, lane, active, faded, note, breaking }) => {
            const c = PLACE_COLOR[Math.min(power, 4)];
            const total = lane.native + lane.carried;
            return (
                <div className={"smooth-transition rounded-xl px-3 py-2 border-2 " +
                    (active ? c.ring + ' ' + c.soft + ' shadow-sm' : 'border-transparent ') +
                    (faded ? ' opacity-40' : '')}>
                    <div className="flex items-center gap-2 mb-1">
                        <span className={"text-xs font-bold " + c.text}>{nameOf(power)}位</span>
                        {active && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-indigo-500 text-white">正在分</span>}
                        {note && <span className="text-[10px] text-gray-500">{note}</span>}
                    </div>
                    <div className="flex flex-wrap items-center gap-1.5 min-h-[1.75rem]">
                        <PieceGroup power={power} count={lane.native} breaking={breaking} />
                        {lane.carried > 0 && lane.native > 0 && <span className="text-gray-300 text-xs px-0.5">+</span>}
                        {/* 从上位拆下来的件：本位形状，但用来源数位的颜色，让学生一眼看出"这是上面拆下来的" */}
                        <PieceGroup power={power} count={lane.carried} tint={lane.carriedFrom} breaking={breaking} />
                        {total === 0 && <span className="text-[11px] text-gray-300">（空）</span>}
                    </div>
                </div>
            );
        };

        // 分物演示（分步剧本）：整个被除数常驻，逐位高亮；不够分给大提示，拆捆过程看得见。
        const SharingViz = ({ dividend, divisor, step }) => {
            const { plan, stages, n } = buildStages(dividend, divisor);
            const s = stages[Math.min(step, stages.length - 1)];
            const activePower = (s.type === 'layout') ? (n - 1) : s.power;
            // 拆的两步（tooSmall / leftover 且要拆到下一位）：顶部场景先显示"拆之前"（本位小棒还在），
            // 拆的过程在下方提示里演示；到了下一步场景才显示合并后的状态——两步之间是连续变化，
            // 学生看得见"怎么从上一步变成下一步的"。
            const showBefore = (s.type === 'tooSmall') || (s.type === 'leftover' && s.carriedInfo);
            const sceneLanes = showBefore ? s.before : s.lanes;

            // —— 顶部：整体被除数场景（所有数位常驻，只高亮当前位）——
            const scene = (
                <div className="w-full flex flex-col gap-1.5">
                    <div className="flex items-center justify-between px-1">
                        <span className="text-xs text-gray-400">被除数 <b className="text-indigo-600">{dividend}</b> 的所有点</span>
                        <span className="text-[10px] text-gray-400">从最高位（左边）开始分 →</span>
                    </div>
                    <div className="flex flex-col gap-1">
                        {Array.from({ length: n }).map((_, idx) => {
                            const power = n - 1 - idx;
                            const lane = sceneLanes[power];
                            const active = power === activePower && step > 0;
                            const breaking = active && (s.type === 'tooSmall'); // 正在拆这一位
                            const tooSmallActive = active && s.type === 'tooSmall';
                            const note = tooSmallActive
                                ? `不够分（${lane.native + lane.carried} < ${divisor}）→ 要拆开`
                                : (lane.carried > 0
                                    ? `${lane.native} + 上位拆下的 ${lane.carried} = ${lane.native + lane.carried}`
                                    : (lane.native + lane.carried > 0 ? `${lane.native + lane.carried} 个` : (step > 0 ? '已分完 ✓' : null)));
                            return (
                                <LaneRow key={power} power={power} lane={lane}
                                    active={active} breaking={breaking}
                                    faded={step > 0 && !active && (lane.native + lane.carried === 0)}
                                    note={note} />
                            );
                        })}
                    </div>
                </div>
            );

            if (s.type === 'layout') {
                return (
                    <div className="flex flex-col gap-3 items-center w-full">
                        {scene}
                        <div className="text-xs text-gray-400 text-center px-2">
                            数学约定：<b>从最高位开始分</b>——先分大单位（{nameOf(n-1)}位），分不完的<b>拆开</b>换成下一位继续。
                        </div>
                    </div>
                );
            }

            // —— 不够分：大提示 + 拆捆过程 ——
            if (s.type === 'tooSmall') {
                const cFrom = PLACE_COLOR[Math.min(s.power, 4)];
                return (
                    <div className="flex flex-col gap-3 items-center w-full">
                        {scene}
                        <div className="w-full rounded-xl border-2 border-rose-300 bg-rose-50 p-3 flex flex-col items-center gap-2 fade-in">
                            <div className="flex items-center gap-2 text-rose-600 font-bold text-base">
                                <span className="text-xl">⚠️</span>
                                {nameOf(s.power)}位不够分！（{s.have} &lt; 除数 {s.divisor}）
                            </div>
                            <div className="text-sm text-gray-600 text-center">
                                {s.have} 个{unitOf(s.power)}平均分成 {s.divisor} 份，每份连 1 个都分不到。
                                <br/>只能把它<b className="text-rose-600">拆开</b>：每 1 个{nameOf(s.power)}换成 <b>10</b> 个{nameOf(s.toPower)}，
                                全部落到<b className={PLACE_COLOR[Math.min(s.toPower,4)].text}>{nameOf(s.toPower)}位</b>去。
                            </div>
                            {/* 拆捆演示：左边原来的成捆件 → 右边散开的件（用同一来源颜色，学生看清是"它变的"）*/}
                            <div className="flex items-center gap-3 flex-wrap justify-center">
                                <div className="flex flex-col items-center gap-1">
                                    <div className="flex flex-wrap gap-1 justify-center">
                                        <PieceGroup power={s.power} count={s.have} breaking />
                                    </div>
                                    <span className="text-[10px] text-gray-400">{s.have} 个{nameOf(s.power)}（打捆）</span>
                                </div>
                                <span className="text-2xl text-rose-400">→</span>
                                <div className="flex flex-col items-center gap-1">
                                    <div className="flex flex-wrap gap-1 justify-center max-w-[220px]">
                                        <PieceGroup power={s.toPower} count={s.have * 10} tint={s.power} />
                                    </div>
                                    <span className="text-[10px] text-gray-400">拆成 {s.have * 10} 个{nameOf(s.toPower)}</span>
                                </div>
                            </div>
                            <div className="text-xs text-gray-500 text-center">
                                （拆完后 <b className={cFrom.text}>{nameOf(s.power)}位</b>就空了；这 {s.have*10} 个仍用
                                <b className={cFrom.text}>{nameOf(s.power)}位的颜色</b>落到 {nameOf(s.toPower)}位，和原有的合在一起——
                                点<b>下一步</b>就能看到它们并到 {nameOf(s.toPower)}位、开始分。）
                            </div>
                        </div>
                    </div>
                );
            }

            const unit = unitOf(s.power);
            const placeName = nameOf(s.power);
            const cActive = PLACE_COLOR[Math.min(s.power, 4)];

            // —— split：把当前位的所有件"每 divisor 个一组"地圈起来，看能圈出几组、还剩几个 ——
            // 关键：把这一位全部 partial 件都摆出来（含上位拆下的），按 divisor 个一组画满 qd 组，
            // 剩下的 rem 件单独摆在旁边，学生能一眼看到"总数 / 几组 / 剩几个"。
            if (s.type === 'split') {
                const GROUP_CAP = 24;                       // 最多逐组画多少组，超出用紧凑说明
                const drawGroups = s.qd <= GROUP_CAP;
                return (
                    <div className="flex flex-col gap-3 items-center w-full">
                        {scene}
                        <div className="w-full border-t border-dashed border-gray-200" />
                        <div className="w-full flex flex-col gap-2 items-center">
                            <div className="text-sm text-gray-600 text-center">
                                分 <b className={cActive.text}>{placeName}位</b>：把这 <b>{s.partial}</b> 个{unit}
                                {s.carried > 0 && <span className="text-gray-400">（{s.native} 原有 + {s.carried} 上位拆下）</span>}
                                ，每 <b className="text-emerald-600">{divisor}</b> 个圈成一组
                            </div>
                            <div className="flex flex-wrap gap-2 justify-center items-center">
                                {drawGroups
                                    ? Array.from({ length: s.qd }).map((_, gi) => (
                                        <div key={gi} className="border-2 border-emerald-400 bg-emerald-50 rounded-lg p-1.5 flex flex-wrap gap-1 justify-center items-start"
                                             style={{ minWidth: 42, minHeight: 30 }}>
                                            <PieceGroup power={s.power} count={divisor} />
                                        </div>
                                      ))
                                    : <div className="text-sm text-gray-500 px-3 py-2 rounded-lg bg-emerald-50 border-2 border-emerald-300">
                                        每组 {divisor} 个，共圈出 <b className="text-blue-600">{s.qd}</b> 组
                                      </div>}
                                {/* 剩下不够一组的件，单独摆出来 */}
                                {s.rem > 0 && (
                                    <div className="flex flex-col items-center gap-1">
                                        <div className="border-2 border-dashed border-rose-300 bg-rose-50 rounded-lg p-1.5 flex flex-wrap gap-1 justify-center items-center min-h-[30px]" style={{ minWidth: 42 }}>
                                            <PieceGroup power={s.power} count={s.rem} />
                                        </div>
                                        <span className="text-[10px] text-rose-500">剩 {s.rem} 个</span>
                                    </div>
                                )}
                            </div>
                            <div className="text-center text-sm">
                                圈出 <b className="text-blue-600">{s.qd}</b> 组{s.rem > 0 && <>、还剩 <b className="text-rose-500">{s.rem}</b> 个</>}
                                {' → '}组数 <b className="text-blue-600">{s.qd}</b> 写在商的<b className={cActive.text}>{placeName}位</b>
                            </div>
                        </div>
                    </div>
                );
            }

            // —— leftover：看剩多少；若还有下一位则拆开落下去 ——
            const ci = s.carriedInfo;
            return (
                <div className="flex flex-col gap-3 items-center w-full">
                    {scene}
                    <div className="w-full border-t border-dashed border-gray-200" />
                    <div className="w-full flex flex-col items-center gap-1.5 fade-in">
                        <div className="flex items-center gap-2">
                            <span className="text-sm font-semibold text-rose-500">分完，剩</span>
                            <div className="border-2 border-dashed border-rose-300 bg-rose-50 rounded-lg p-1.5 flex flex-wrap gap-1 justify-center items-center min-h-[1.9rem] min-w-[2.5rem]">
                                {s.rem > 0
                                    ? <PieceGroup power={s.power} count={s.rem} breaking={!!ci} />
                                    : <span className="text-rose-300 text-xs px-1">0</span>}
                            </div>
                            <span className="text-sm text-rose-500">{s.rem} 个{unit}</span>
                        </div>
                        {ci
                            ? <div className="text-xs text-gray-500 text-center px-2">
                                这 {s.rem} 个{unit}不够再分 → <b>拆开</b>，每个换成 10 个{nameOf(ci.toPower)}，
                                落到<b className={PLACE_COLOR[Math.min(ci.toPower,4)].text}>{nameOf(ci.toPower)}位</b>和原有的 {ci.nextDigit} 个合起来
                                （共 {ci.combined} 个），下一步接着分。
                              </div>
                            : (s.rem > 0
                                ? <div className="text-xs text-rose-500 text-center px-2">没有更低的数位了，这 {s.rem} 就是<b>余数</b>（{s.rem} &lt; {divisor}）。</div>
                                : <div className="text-xs text-emerald-600 text-center">正好分完，没有余数。</div>)}
                    </div>
                </div>
            );
        };

        // ============ 通用组件 ============
        const PageHeader = ({ title, subtitle }) => (
            <header className="relative max-w-4xl mx-auto text-center mb-6 px-12">
                <a href="/" aria-label="返回主页" title="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-indigo-200 hover:bg-indigo-50 hover:text-indigo-600">
                    <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                </a>
                <h1 className="text-3xl font-bold text-slate-800">{title}</h1>
                <p className="text-slate-500 mt-1">{subtitle}</p>
            </header>
        );

        const LevelPicker = ({ value, onChange }) => (
            <div className="flex flex-wrap justify-center gap-2">
                {Object.entries(LEVELS).map(([k, v]) => (
                    <button key={k} onClick={() => onChange(k)}
                        className={"px-3 py-1.5 rounded-full text-sm font-semibold smooth-transition " +
                            (value === k ? "bg-indigo-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100 border border-gray-200")}>
                        {v.label}
                    </button>
                ))}
            </div>
        );

        const InlineEq = ({ dividend, divisor, q, r, showAns }) => (
            <div className="ld text-2xl text-center text-gray-800">
                <span className="text-indigo-600">{dividend}</span>
                <span className="mx-2 text-gray-400">÷</span>
                <span className="text-emerald-600">{divisor}</span>
                <span className="mx-2 text-gray-400">=</span>
                {showAns
                    ? <><span className="text-blue-600 font-bold">{q}</span><span className="mx-1 text-gray-400">……</span><span className="text-rose-500 font-bold">{r}</span></>
                    : <span className="text-gray-300">? …… ?</span>}
            </div>
        );

        const StepBar = ({ step, maxStep, hint, onReset, onNext, color = 'indigo' }) => {
            const btn = { indigo: 'bg-indigo-500 hover:bg-indigo-600', rose: 'bg-rose-500 hover:bg-rose-600' }[color];
            return (
                <div className="flex flex-col items-center gap-3">
                    <div className="text-gray-600 font-semibold min-h-[1.5rem] text-center px-4 max-w-md">{hint}</div>
                    <div className="flex gap-3">
                        <button onClick={onReset} disabled={step === 0}
                            className="px-5 py-2.5 rounded-lg font-semibold smooth-transition bg-gray-100 hover:bg-gray-200 disabled:opacity-40 text-gray-700">重新开始</button>
                        <button onClick={onNext} disabled={step >= maxStep}
                            className={"px-6 py-2.5 rounded-lg font-semibold smooth-transition text-white disabled:opacity-40 " + btn}>
                            {step >= maxStep ? '已完成' : '下一步'}
                        </button>
                    </div>
                </div>
            );
        };

        // ============ Tab 1：演示 ============
        const DemoTab = () => {
            const [level, setLevel] = useState('t1');
            const [prob, setProb] = useState(() => genProblem('t1'));
            const [step, setStep] = useState(0);
            const { dividend, divisor, q, r } = prob;
            const { stages } = buildStages(dividend, divisor);
            const maxStep = stages.length - 1;
            const cur = stages[Math.min(step, maxStep)];

            // 竖式只在 split/leftover 时推进；tooSmall 不写竖式（该位不写商）。
            // gridStep = 已完成的竖式半步数 = 当前 stage 对应行的 (row*2 + half+1)，tooSmall 取该行前的状态(row*2)。
            const gridStep = step === 0 ? 0
                : (cur.type === 'tooSmall' ? cur.rowIdx * 2 : cur.rowIdx * 2 + (cur.half === 0 ? 1 : 2));

            const newProblem = (lv = level) => { setProb(genProblem(lv)); setStep(0); };
            const onLevel = (lv) => { setLevel(lv); newProblem(lv); };

            const hint = step === 0 ? '从最高位开始分：先分大单位，分不完的拆成小单位'
                : step >= maxStep ? '分完啦！分不动的就是余数'
                : cur.type === 'tooSmall' ? '这一位不够分！先把它拆开，换成 10 个下一位落下去'
                : cur.type === 'split' ? '这一位平均分成几份、每份几个？把份数写到商上'
                : '减一减看剩多少，剩的拆开和下一位合起来接着分';

            return (
                <div className="fade-in flex flex-col items-center gap-5">
                    <LevelPicker value={level} onChange={onLevel} />
                    <div className="flex items-center gap-3">
                        <InlineEq dividend={dividend} divisor={divisor} q={q} r={r} showAns={step >= maxStep} />
                        <button onClick={() => newProblem()} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold text-gray-700 smooth-transition">换一题</button>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-8 items-center lg:items-start justify-center w-full">
                        <div className="bg-white rounded-xl shadow p-5 w-full lg:w-[380px]">
                            <div className="text-center font-semibold text-gray-700 mb-3">① 分一分（直观）</div>
                            <SharingViz dividend={dividend} divisor={divisor} step={step} />
                        </div>
                        <div className="flex flex-col items-center">
                            <div className="text-center font-semibold text-gray-700 mb-3">② 写竖式（算法）</div>
                            <LongDivisionGrid dividend={dividend} divisor={divisor} step={gridStep} />
                        </div>
                    </div>

                    <StepBar step={step} maxStep={maxStep} hint={hint}
                        onReset={() => setStep(0)} onNext={() => setStep(s => Math.min(maxStep, s + 1))} />
                </div>
            );
        };

        // ============ Tab 2：逆过程·验算 ============
        const InverseTab = () => {
            const [level, setLevel] = useState('t1');
            const [prob, setProb] = useState(() => genProblem('t1'));
            const [phase, setPhase] = useState(0);
            const { dividend, divisor, q, r } = prob;
            const product = q * divisor;

            const newProblem = (lv = level) => { setProb(genProblem(lv)); setPhase(0); };
            const onLevel = (lv) => { setLevel(lv); newProblem(lv); };

            return (
                <div className="fade-in flex flex-col items-center gap-6">
                    <LevelPicker value={level} onChange={onLevel} />
                    <div className="flex items-center gap-3">
                        <InlineEq dividend={dividend} divisor={divisor} q={q} r={r} showAns />
                        <button onClick={() => newProblem()} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold text-gray-700 smooth-transition">换一题</button>
                    </div>

                    <div className="bg-white rounded-xl shadow p-6 w-full max-w-xl">
                        <div className="text-center text-gray-600 mb-4">
                            除法做完，怎么知道对不对？<b className="text-indigo-600">把它倒回去</b>（乘法是除法的逆运算）：
                        </div>
                        <div className="flex flex-wrap items-center justify-center gap-2 ld text-2xl">
                            <span className="px-3 py-2 rounded-lg bg-blue-50 text-blue-600 border-2 border-blue-200">商 {q}</span>
                            <span className="text-gray-400">×</span>
                            <span className="px-3 py-2 rounded-lg bg-emerald-50 text-emerald-600 border-2 border-emerald-200">除数 {divisor}</span>
                            <span className={"text-gray-400 smooth-transition " + (phase >= 1 ? '' : 'opacity-20')}>=</span>
                            <span className={"px-3 py-2 rounded-lg bg-purple-50 text-purple-600 border-2 border-purple-200 smooth-transition " + (phase >= 1 ? 'pop' : 'opacity-20')}>{phase >= 1 ? product : '?'}</span>
                        </div>
                        <div className={"flex flex-wrap items-center justify-center gap-2 ld text-2xl mt-3 smooth-transition " + (phase >= 2 ? '' : 'opacity-20')}>
                            <span className="px-3 py-2 rounded-lg bg-purple-50 text-purple-600 border-2 border-purple-200">{product}</span>
                            <span className="text-gray-400">+</span>
                            <span className="px-3 py-2 rounded-lg bg-rose-50 text-rose-500 border-2 border-rose-200">余数 {r}</span>
                            <span className={"text-gray-400 smooth-transition " + (phase >= 3 ? '' : 'opacity-20')}>=</span>
                            <span className={"px-3 py-2 rounded-lg bg-indigo-50 text-indigo-600 border-2 border-indigo-300 smooth-transition " + (phase >= 3 ? 'pop' : 'opacity-20')}>
                                {phase >= 3 ? product + r : '?'}
                            </span>
                        </div>
                        {phase >= 3 && (
                            <div className="mt-5 text-center fade-in">
                                <div className="inline-block px-4 py-2 bg-green-50 text-green-700 rounded-lg font-semibold border border-green-200">
                                    ✓ 正好等于被除数 {dividend}，除法做对了！
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-5 max-w-xl">
                        <h3 className="font-bold text-amber-800 mb-2">💡 验算公式</h3>
                        <p className="text-gray-700 leading-relaxed">
                            没有余数时：<b>商 × 除数 = 被除数</b>。<br/>
                            有余数时：<b>商 × 除数 ＋ 余数 = 被除数</b>。<br/>
                            除法是"把总数分开"，乘法（再加上剩余）是"把它们拼回原样"——这就是乘除互逆。
                        </p>
                    </div>

                    <StepBar step={phase} maxStep={3}
                        hint={['先看这道除法的结果', '商 × 除数 等于多少？', '再加上余数', '看看是不是等于被除数'][phase]}
                        color="rose"
                        onReset={() => setPhase(0)} onNext={() => setPhase(p => Math.min(3, p + 1))} />
                </div>
            );
        };

        // ============ Tab 3：练习 ============
        const ColumnSkeleton = ({ dividend, divisor }) => {
            const digits = String(dividend).split('');
            const n = digits.length;
            const gridStyle = { display: 'grid', gridTemplateColumns: `3.2rem repeat(${n}, 2.4rem)`, justifyContent: 'start' };
            return (
                <div className="ld">
                    <div style={gridStyle}>
                        <div style={{ gridColumnStart: 1 }} className="text-2xl text-right pr-1 leading-9 text-emerald-600 font-semibold flex items-center justify-end">
                            {divisor}<span className="ml-1 self-stretch border-l-2 border-gray-700" />
                        </div>
                        {digits.map((d, i) => (
                            <div key={i} className="text-2xl text-center leading-9 text-indigo-600 border-t-2 border-gray-700" style={{ gridColumnStart: i + 2 }}>{d}</div>
                        ))}
                    </div>
                    <div className="text-xs text-gray-400 text-center mt-2">在纸上按这个竖式算一算，再填下面的商和余数</div>
                </div>
            );
        };

        const PracticeTab = () => {
            const [level, setLevel] = useState('t1');
            const [mode, setMode] = useState('share');
            const [prob, setProb] = useState(() => genProblem('t1'));
            const [qIn, setQIn] = useState('');
            const [rIn, setRIn] = useState('');
            const [result, setResult] = useState(null); // null | 'ok' | 'bad' | 'show'
            const { dividend, divisor, q, r } = prob;

            const reset = (lv = level) => { setProb(genProblem(lv)); setQIn(''); setRIn(''); setResult(null); };
            const onLevel = (lv) => { setLevel(lv); reset(lv); };
            const check = () => {
                const okQ = qIn.trim() !== '' && +qIn === q;
                const okR = rIn.trim() !== '' && +rIn === r;
                setResult(okQ && okR ? 'ok' : 'bad');
            };

            // 分东西填空：只在小数字时画位值块，便于点数
            const showBlocks = dividend <= 60 && divisor <= 9;

            return (
                <div className="fade-in flex flex-col items-center gap-5">
                    <LevelPicker value={level} onChange={onLevel} />
                    <div className="flex gap-2">
                        <button onClick={() => { setMode('share'); setResult(null); }}
                            className={"px-4 py-1.5 rounded-full text-sm font-semibold smooth-transition " + (mode === 'share' ? 'bg-emerald-500 text-white shadow' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100')}>
                            分东西填空
                        </button>
                        <button onClick={() => { setMode('column'); setResult(null); }}
                            className={"px-4 py-1.5 rounded-full text-sm font-semibold smooth-transition " + (mode === 'column' ? 'bg-blue-500 text-white shadow' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100')}>
                            竖式填空
                        </button>
                    </div>

                    <div className={"bg-white rounded-xl shadow p-6 w-full max-w-xl flex flex-col items-center gap-5 " + (result === 'bad' ? 'shake' : '')}>
                        {mode === 'share' ? (
                            <>
                                <div className="text-gray-600 text-center">
                                    把 <b className="text-indigo-600">{dividend}</b> 个，每 <b className="text-emerald-600">{divisor}</b> 个装一盘，能装几盘、剩几个？
                                </div>
                                {showBlocks && (
                                    <div className="flex flex-wrap gap-2 justify-center max-w-sm">
                                        {Array.from({ length: q }).map((_, gi) => (
                                            <div key={gi} className="border-2 border-emerald-400 bg-emerald-50 rounded-lg p-1 flex flex-wrap gap-1 justify-center" style={{ width: 70 }}>
                                                {Array.from({ length: divisor }).map((__, k) => <div key={k} className="w-3 h-3 rounded-full bg-sky-400" />)}
                                            </div>
                                        ))}
                                        <div className="border-2 border-dashed border-rose-300 bg-rose-50 rounded-lg p-1 flex flex-wrap gap-1 justify-center items-center" style={{ minWidth: 40 }}>
                                            {r > 0 ? Array.from({ length: r }).map((_, k) => <div key={k} className="w-3 h-3 rounded-full bg-rose-500" />) : <span className="text-rose-300 text-xs px-1">剩</span>}
                                        </div>
                                    </div>
                                )}
                                <div className="ld text-2xl flex items-center gap-2 flex-wrap justify-center">
                                    <span className="text-indigo-600">{dividend}</span> ÷ <span className="text-emerald-600">{divisor}</span> =
                                    <input className="cell-in text-blue-600 font-bold" value={qIn} onChange={e => setQIn(e.target.value.replace(/\D/g,''))} placeholder="?" />
                                    <span className="text-base">盘 ……</span>
                                    <input className="cell-in text-rose-500 font-bold" value={rIn} onChange={e => setRIn(e.target.value.replace(/\D/g,''))} placeholder="?" />
                                    <span className="text-base">个</span>
                                </div>
                            </>
                        ) : (
                            <>
                                <div className="text-gray-600 text-center">先用竖式从最高位算起，再填出商和余数：</div>
                                <ColumnSkeleton dividend={dividend} divisor={divisor} />
                                <div className="ld text-2xl flex items-center gap-2 flex-wrap justify-center">
                                    <span className="text-indigo-600">{dividend}</span> ÷ <span className="text-emerald-600">{divisor}</span> =
                                    <input className="cell-in text-blue-600 font-bold" style={{ width: '3.4rem' }} value={qIn} onChange={e => setQIn(e.target.value.replace(/\D/g,''))} placeholder="商" />
                                    <span className="text-gray-400">……</span>
                                    <input className="cell-in text-rose-500 font-bold" style={{ width: '3.4rem' }} value={rIn} onChange={e => setRIn(e.target.value.replace(/\D/g,''))} placeholder="余" />
                                </div>
                            </>
                        )}

                        {result === 'ok' && <div className="px-4 py-2 bg-green-50 text-green-700 rounded-lg font-semibold fade-in">🎉 答对了！商 {q}，余数 {r}（余数 {r} &lt; 除数 {divisor}）</div>}
                        {result === 'bad' && <div className="px-4 py-2 bg-rose-50 text-rose-600 rounded-lg fade-in">再想想～ 记住：余数一定要比除数小</div>}
                        {result === 'show' && <div className="text-gray-500 fade-in">正确答案：商 = <b className="text-blue-600">{q}</b>，余数 = <b className="text-rose-500">{r}</b></div>}

                        <div className="flex gap-3 flex-wrap justify-center">
                            <button onClick={check} className="px-6 py-2.5 rounded-lg font-semibold text-white bg-indigo-500 hover:bg-indigo-600 smooth-transition">检查</button>
                            <button onClick={() => setResult(result === 'show' ? null : 'show')} className="px-4 py-2.5 rounded-lg font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 smooth-transition">
                                {result === 'show' ? '隐藏答案' : '看答案'}
                            </button>
                            <button onClick={() => reset()} className="px-5 py-2.5 rounded-lg font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 smooth-transition">下一题</button>
                        </div>
                    </div>

                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 max-w-xl text-gray-700 text-sm leading-relaxed">
                        小提示：余数一定要 <b>比除数小</b>。如果你算出的余数 ≥ 除数，说明商还可以再大一点。
                    </div>
                </div>
            );
        };

        // ============ 主应用 ============
        const App = () => {
            const [tab, setTab] = useState('demo');
            const tabs = [
                { k: 'demo', label: '演示', color: 'bg-indigo-500' },
                { k: 'inverse', label: '逆过程·验算', color: 'bg-rose-500' },
                { k: 'practice', label: '练习', color: 'bg-emerald-500' },
            ];
            return (
                <div className="min-h-screen py-8 px-4">
                    <PageHeader title="有余数的除法" subtitle="从最高位分起，一边分小棒、一边写竖式，理解商、余数和乘除互逆" />
                    <div className="flex justify-center gap-3 mb-8">
                        {tabs.map(t => (
                            <button key={t.k} onClick={() => setTab(t.k)}
                                className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " +
                                    (tab === t.k ? t.color + " text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                                {t.label}
                            </button>
                        ))}
                    </div>
                    <div className="max-w-4xl mx-auto">
                        {tab === 'demo' && <DemoTab />}
                        {tab === 'inverse' && <InverseTab />}
                        {tab === 'practice' && <PracticeTab />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <div class="site-copyright" style="box-sizing: border-box; width: 100%; padding: 24px 16px; text-align: center; color: #94a3b8; font: 13px/1.6 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">©孙维刚教育研究院 小宇老师 版权所有</div>
</body>
</html>
