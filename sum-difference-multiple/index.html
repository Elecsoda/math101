<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和差倍与年龄问题 | Math101</title>
    <link rel="stylesheet" href="../word-problem-tool.css">
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark" id="mark">倍</div>
                <div><h1 id="title"></h1><p class="subtitle" id="subtitle"></p></div>
            </div>
            <div class="top-actions"><button class="button" id="randomBtn">随机一题</button><a class="button" href="../">返回首页</a></div>
        </header>
        <nav class="tabs" id="tabs" aria-label="题型分类"></nav>
        <p class="tab-intro" id="tabIntro"></p>
        <div class="layout">
            <section>
                <div class="card problem" id="problem"></div>
                <div class="steps" id="steps"></div>
                <div class="card content" id="content"></div>
                <div class="nav"><button class="button" id="prevBtn">上一步</button><button class="button primary" id="nextBtn">下一步</button></div>
            </section>
            <aside class="card library"><div class="library-head"><h3>当前题库</h3><span class="badge" id="libraryCount"></span></div><div class="items" id="items"></div></aside>
        </div>
    </main>
    <script>
        window.WORD_PROBLEM_TOOL = {
            title: "复杂和差倍与年龄问题",
            subtitle: "基础和差倍留在读题画图工具；这里专门处理条件转换、时刻变化与多步推理。",
            mark: "倍", accent: "#7c3aed", accentDark: "#5b21b6", accentSoft: "#f3e8ff",
            tabs: [
                {
                    id: "complex", label: "复杂和差倍", intro: "原“终极挑战”题组：先转化条件，再使用和、差、倍关系。",
                    problems: [
                        {
                            label: "终极① · 粉笔总价",
                            story: "学校买了 6 箱白粉笔和 3 箱彩色粉笔，共用去 630 元。每箱彩色粉笔比每箱白粉笔贵 30 元。两种粉笔每箱各多少元？",
                            keywords: ["6 箱白粉笔", "3 箱彩色粉笔", "共用去 630 元", "贵 30 元"],
                            relations: [{label:"替换关系",value:"1 箱彩色 = 1 箱白色 + 30 元"},{label:"总价关系",value:"6 箱白色 + 3 箱彩色 = 630 元"}],
                            readingTip: "把贵的换成便宜的，箱数不变，总价会减少。",
                            diagram: [{label:"白粉笔",parts:6,note:"6 箱"},{label:"彩色粉笔",parts:3,tone:"alt",extra:true,note:"3 箱，每箱多 30 元"}],
                            diagramNote: "去掉 3 个“贵 30 元”，就得到 9 箱白粉笔的总价。",
                            equation: "(630 − 3 × 30) ÷ (6 + 3) = 60",
                            equationTip: "先统一成白粉笔，再求每箱白粉笔的价钱。",
                            steps: ["3 箱彩色粉笔换成白粉笔，总价减少 3 × 30 = 90（元）。","9 箱白粉笔共 630 − 90 = 540（元）。","每箱白粉笔 540 ÷ 9 = 60（元）。","每箱彩色粉笔 60 + 30 = 90（元）。"],
                            answer: "每箱白粉笔 60 元，每箱彩色粉笔 90 元。"
                        },
                        {
                            label: "终极② · 书架转移",
                            story: "甲书架比乙书架多 40 本。如果从甲书架拿 5 本放入乙书架，此时甲书架的书是乙书架的 3 倍。原来两书架各有多少本？",
                            keywords: ["多 40 本", "甲书架拿 5 本放入乙书架", "3 倍"],
                            relations: [{label:"变化后的差",value:"40 − 5 − 5 = 30 本"},{label:"倍数关系",value:"甲（现）= 乙（现）× 3"}],
                            readingTip: "一边少 5、另一边多 5，差会缩小 10。",
                            diagram: [{label:"乙（现）",parts:1,note:"1 份"},{label:"甲（现）",parts:3,tone:"alt",note:"3 份；相差 2 份 = 30 本"}],
                            diagramNote: "变化后的差 30 本正好对应 3 − 1 = 2 份。",
                            equation: "乙（现）= (40 − 5 − 5) ÷ (3 − 1) = 15",
                            steps: ["移动后两书架相差 40 − 5 − 5 = 30（本）。","30 本对应 3 − 1 = 2 份，每份 30 ÷ 2 = 15（本）。","现在乙有 15 本，甲有 15 × 3 = 45（本）。","还原移动：原来甲 45 + 5 = 50 本，乙 15 − 5 = 10 本。"],
                            answer: "原来甲书架 50 本，乙书架 10 本。"
                        },
                        {
                            label: "终极③ · 你给我给",
                            story: "小通给小虎 80 元后两人同样多；如果小虎给小通 70 元，小通的钱就是小虎的 3 倍。两人原来各有多少钱？",
                            keywords: ["给小虎 80 元", "同样多", "给小通 70 元", "3 倍"],
                            relations: [{label:"原来的差",value:"80 + 80 = 160 元"},{label:"第二次变化后的差",value:"160 + 70 + 70 = 300 元"}],
                            readingTip: "转移 80 元后相等，说明原来的差是转移量的 2 倍。",
                            diagram: [{label:"小虎（给后）",parts:1,note:"1 份"},{label:"小通（收后）",parts:3,tone:"alt",note:"3 份；相差 300 元"}],
                            diagramNote: "第二种变化后，两人的差是 300 元，对应 2 份。",
                            equation: "小虎（给后）= 300 ÷ (3 − 1) = 150",
                            steps: ["原来小通比小虎多 80 × 2 = 160（元）。","小虎再给小通 70 元，差扩大 70 × 2，变成 300 元。","此时小虎 300 ÷ 2 = 150 元，小通 150 × 3 = 450 元。","还原第二次转移：小虎原有 150 + 70 = 220 元，小通原有 450 − 70 = 380 元。"],
                            answer: "小通原来 380 元，小虎原来 220 元。"
                        },
                        {
                            label: "终极④ · 三班调人",
                            story: "三年级甲、乙、丙三个班一共 162 人。甲转 2 人到乙后甲乙相同；再从丙转 3 人到乙后乙丙相同。甲班原来有多少人？",
                            keywords: ["一共 162 人", "甲转 2 人到乙", "甲乙相同", "丙转 3 人到乙", "乙丙相同"],
                            relations: [{label:"甲乙原差",value:"2 + 2 = 4 人"},{label:"以乙为基准",value:"甲 = 乙 + 4，丙 = 乙 + 8"}],
                            diagram: [{label:"乙班",parts:3,note:"基准"},{label:"甲班",parts:3,tone:"alt",extra:true,note:"比乙多 4"},{label:"丙班",parts:3,tone:"warm",extra:true,note:"比乙多 8"}],
                            diagramNote: "三班都先画成同样长的基准段，再补出 4 人和 8 人。",
                            equation: "乙 = (162 − 4 − 8) ÷ 3 = 50",
                            steps: ["甲转 2 人给乙后相等，原来甲比乙多 4 人。","继续分析第二次转移，可得原来丙比乙多 8 人。","扣除多出的 4 + 8 = 12 人，剩下是 3 个乙班。","乙班 50 人，甲班 50 + 4 = 54 人。"],
                            answer: "甲班原来有 54 人。"
                        },
                        {
                            label: "终极⑤ · 减法三数",
                            story: "一个减法算式中，被减数、减数与差的和是 120，减数是差的 3 倍。差是多少？",
                            keywords: ["被减数、减数与差的和是 120", "减数是差的 3 倍"],
                            relations: [{label:"减法关系",value:"被减数 = 减数 + 差"},{label:"倍数关系",value:"减数 = 差 × 3"}],
                            diagram: [{label:"差",parts:1,note:"1 份"},{label:"减数",parts:3,tone:"alt",note:"3 份"},{label:"被减数",parts:4,tone:"warm",note:"4 份 = 减数 + 差"}],
                            diagramNote: "三数之和是 1 + 3 + 4 = 8 份。",
                            equation: "差 = 120 ÷ (1 + 3 + 4) = 15",
                            steps: ["被减数等于减数与差的和。","差画 1 份，减数画 3 份，被减数就是 4 份。","三数合计 8 份 = 120。","每份 120 ÷ 8 = 15。"],
                            answer: "差是 15。"
                        },
                        {
                            label: "终极⑥ · 棋子搬家",
                            story: "第一堆有 87 个棋子，第二堆有 69 个。从第一堆拿多少个到第二堆，能使第二堆是第一堆的 3 倍？",
                            keywords: ["第一堆有 87 个", "第二堆有 69 个", "第二堆是第一堆的 3 倍"],
                            relations: [{label:"不变量",value:"总数 87 + 69 = 156 个"},{label:"搬完后的倍数",value:"第二堆 = 第一堆 × 3"}],
                            diagram: [{label:"第一堆（后）",parts:1,note:"1 份"},{label:"第二堆（后）",parts:3,tone:"alt",note:"3 份"}],
                            diagramNote: "搬运只改变两堆各自数量，不改变总数。",
                            equation: "第一堆（后）= (87 + 69) ÷ (1 + 3) = 39",
                            steps: ["两堆总数 87 + 69 = 156（个）。","搬完后总数被分为 1 + 3 = 4 份。","第一堆剩 156 ÷ 4 = 39（个）。","需要搬走 87 − 39 = 48（个）。"],
                            answer: "从第一堆拿 48 个到第二堆。"
                        }
                    ]
                },
                {
                    id: "age", label: "年龄问题", intro: "先把不同时间的年龄换算到同一时刻；年龄差始终不变。",
                    problems: [
                        {
                            label: "年龄① · 母子年龄", story: "6 年前，母亲的年龄是儿子的 5 倍。5 年后母子年龄和是 76 岁。母亲今年多少岁？",
                            keywords: ["6 年前", "5 倍", "5 年后", "年龄和是 76 岁"],
                            relations: [{label:"今年年龄和",value:"76 − 5 × 2 = 66 岁"},{label:"6 年前年龄和",value:"66 − 6 × 2 = 54 岁"}],
                            readingTip: "倍数关系发生在 6 年前，所以把总和也倒回到 6 年前。",
                            diagram: [{label:"儿子（6年前）",parts:1,note:"1 份"},{label:"母亲（6年前）",parts:5,tone:"alt",note:"5 份"}],
                            diagramNote: "6 年前两人年龄和 54 岁，共 6 份。",
                            equation: "母亲今年 = 54 ÷ (1 + 5) × 5 + 6 = 51",
                            steps: ["5 年后的年龄和倒回今年：76 − 10 = 66 岁。","今年再倒回 6 年前：66 − 12 = 54 岁。","6 年前儿子 54 ÷ 6 = 9 岁，母亲 9 × 5 = 45 岁。","母亲今年 45 + 6 = 51 岁。"], answer: "母亲今年 51 岁。"
                        },
                        {
                            label: "年龄② · 错时年龄", story: "王燕 3 年前的年龄等于李龙 3 年后的年龄。王燕 4 年前与李龙 5 年后的年龄和是 41 岁。两人今年各多少岁？",
                            keywords: ["王燕 3 年前", "李龙 3 年后", "王燕 4 年前", "李龙 5 年后", "和是 41 岁"],
                            relations: [{label:"年龄差",value:"王燕比李龙大 3 + 3 = 6 岁"},{label:"今年年龄和",value:"41 + 4 − 5 = 40 岁"}],
                            diagram: [{label:"李龙（今年）",parts:3,note:"较小量"},{label:"王燕（今年）",parts:3,tone:"alt",extra:true,note:"多 6 岁"}],
                            diagramNote: "统一到今年后，问题变成和差问题：和 40，差 6。",
                            equation: "李龙 = (40 − 6) ÷ 2 = 17",
                            steps: ["由错时相等得王燕比李龙大 6 岁。","把第二个条件统一到今年，年龄和为 40 岁。","李龙今年 (40 − 6) ÷ 2 = 17 岁。","王燕今年 17 + 6 = 23 岁。"], answer: "王燕 23 岁，李龙 17 岁。"
                        },
                        {
                            label: "年龄③ · 哥弟年龄", story: "兄弟俩今年年龄和是 30 岁。当哥哥像弟弟现在这样大时，弟弟的年龄恰好是哥哥当时年龄的一半。哥哥今年多少岁？",
                            keywords: ["年龄和是 30 岁", "哥哥像弟弟现在这样大时", "一半"],
                            relations: [{label:"年龄差不变",value:"弟弟现在 = 2 个年龄差"},{label:"今年份数",value:"弟弟 2 份，哥哥 3 份"}],
                            diagram: [{label:"弟弟（今年）",parts:2,note:"2 份"},{label:"哥哥（今年）",parts:3,tone:"alt",note:"3 份"}],
                            diagramNote: "两人今年共 5 份 = 30 岁。",
                            equation: "哥哥今年 = 30 ÷ (2 + 3) × 3 = 18",
                            steps: ["倒回哥哥与弟弟现在同龄的时刻，年龄差仍不变。","由“一半”可知弟弟现在是 2 个年龄差。","哥哥现在比弟弟多 1 个年龄差，所以是 3 份。","5 份等于 30 岁，哥哥 30 ÷ 5 × 3 = 18 岁。"], answer: "哥哥今年 18 岁。"
                        }
                    ]
                }
            ]
        };
    </script>
