<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乘法口诀练习 | Math101</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .smooth-transition { transition: all 0.3s ease; }
        .dot { transition: all 0.3s ease; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 中文口诀（小九九，b<=a）
        const cnNum = ['零','一','二','三','四','五','六','七','八','九'];
        const chantText = (a, b) => {
            // 习惯：小数在前。如 3×4 读作 "三四十二"
            const [x, y] = a <= b ? [a, b] : [b, a];
            const p = x * y;
            const pStr = p < 10 ? cnNum[p] : (p % 10 === 0 ? cnNum[Math.floor(p/10)] + '十' : cnNum[Math.floor(p/10)] + '十' + cnNum[p%10]);
            return `${cnNum[x]}${cnNum[y]}${pStr}`;
        };

        // 点阵图
        const DotArray = ({ rows, cols, litUpTo }) => (
            <div className="inline-grid gap-1.5 p-3 bg-white rounded-lg shadow-inner border border-gray-100"
                 style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                {Array.from({ length: rows * cols }).map((_, i) => {
                    const lit = litUpTo === undefined || i < litUpTo;
                    return <div key={i}
                        className={"dot w-5 h-5 rounded-full " + (lit ? "bg-indigo-500" : "bg-gray-200")} />;
                })}
            </div>
        );

        // 跳数数轴
        const NumberLine = ({ step, count, active }) => {
            const max = step * count;
            const ticks = Array.from({ length: count + 1 }, (_, i) => i * step);
            return (
                <div className="w-full overflow-x-auto py-4">
                    <div className="relative h-16 mx-auto" style={{ minWidth: `${Math.max(320, count * 60)}px` }}>
                        <div className="absolute top-8 left-0 right-0 h-0.5 bg-gray-400" />
                        {ticks.map((t, i) => (
                            <div key={i} className="absolute flex flex-col items-center smooth-transition"
                                 style={{ left: `${(t / max) * 100}%`, transform: 'translateX(-50%)' }}>
                                <div className={"w-3 h-3 rounded-full mb-1 smooth-transition " +
                                    (i <= active ? "bg-emerald-500 scale-110" : "bg-gray-300")} />
                                <div className="w-0.5 h-3 bg-gray-400" />
                                <div className={"text-sm mt-1 font-bold smooth-transition " +
                                    (i === active ? "text-emerald-600 scale-125" : i < active ? "text-emerald-500" : "text-gray-400")}>{t}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ===== 探索模式 =====
        const Explore = () => {
            const [a, setA] = useState(3);
            const [b, setB] = useState(4);
            const [jump, setJump] = useState(b); // 数轴跳到第几格

            useEffect(() => { setJump(b); }, [a, b]);

            return (
                <div className="fade-in flex flex-col items-center">
                    <div className="bg-white rounded-xl shadow p-5 mb-6 flex flex-wrap gap-5 items-center justify-center">
                        <div className="flex items-center gap-2">
                            <span className="font-semibold text-gray-700">每行</span>
                            <select value={a} onChange={e => setA(+e.target.value)}
                                className="text-lg border-2 border-indigo-300 rounded p-1.5">
                                {[1,2,3,4,5,6,7,8,9].map(n => <option key={n} value={n}>{n}</option>)}
                            </select>
                            <span className="font-semibold text-gray-700">个</span>
                        </div>
                        <span className="text-2xl font-bold text-gray-400">×</span>
                        <div className="flex items-center gap-2">
                            <select value={b} onChange={e => setB(+e.target.value)}
                                className="text-lg border-2 border-indigo-300 rounded p-1.5">
                                {[1,2,3,4,5,6,7,8,9].map(n => <option key={n} value={n}>{n}</option>)}
                            </select>
                            <span className="font-semibold text-gray-700">行</span>
                        </div>
                    </div>

                    <div className="bg-gray-50 rounded-xl p-6 border border-gray-200 mb-4 flex flex-col items-center">
                        <DotArray rows={b} cols={a} litUpTo={jump * a} />
                        <div className="text-4xl font-bold text-indigo-600 mt-5">{a} × {b} = {a * b}</div>
                        <div className="text-xl text-emerald-600 font-bold mt-2">口诀：{chantText(a, b)}</div>
                    </div>

                    <div className="w-full max-w-2xl bg-white rounded-xl shadow p-4 mb-3">
                        <div className="text-sm text-gray-500 mb-1">在数轴上每次跳 {a}，跳 {b} 次：</div>
                        <NumberLine step={a} count={b} active={jump} />
                        <div className="flex justify-center gap-3 mt-2">
                            <button onClick={() => setJump(j => Math.max(0, j - 1))} disabled={jump === 0}
                                className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-semibold disabled:opacity-40 smooth-transition">← 退一步</button>
                            <button onClick={() => setJump(j => Math.min(b, j + 1))} disabled={jump === b}
                                className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg font-semibold disabled:opacity-40 smooth-transition">跳一步 →</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ===== 练习模式（遮挡记忆 + 错题）=====
        const Practice = () => {
            const [range, setRange] = useState(5); // 练 1~range 的口诀
            const [q, setQ] = useState(null);
            const [input, setInput] = useState('');
            const [feedback, setFeedback] = useState(null); // 'right' | 'wrong' | null
            const [revealDots, setRevealDots] = useState(false);
            const [stats, setStats] = useState({ right: 0, wrong: 0 });
            const [wrongList, setWrongList] = useState([]); // {a,b}
            const inputRef = useRef(null);

            const newQuestion = (forced) => {
                let a, b;
                if (forced) { a = forced.a; b = forced.b; }
                else {
                    a = 2 + Math.floor(Math.random() * (range - 1));
                    b = 2 + Math.floor(Math.random() * (range - 1));
                    if (range <= 2) { a = 2; b = 2; }
                }
                setQ({ a, b });
                setInput(''); setFeedback(null); setRevealDots(false);
                setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
            };

            useEffect(() => { newQuestion(); }, [range]);

            const check = () => {
                if (!q || input === '') return;
                const correct = q.a * q.b;
                if (+input === correct) {
                    setFeedback('right');
                    setStats(s => ({ ...s, right: s.right + 1 }));
                    setWrongList(list => list.filter(w => !(w.a === q.a && w.b === q.b)));
                    setTimeout(() => newQuestion(), 900);
                } else {
                    setFeedback('wrong');
                    setStats(s => ({ ...s, wrong: s.wrong + 1 }));
                    setWrongList(list => list.some(w => w.a === q.a && w.b === q.b) ? list : [...list, { a: q.a, b: q.b }]);
                    setRevealDots(true);
                }
            };

            if (!q) return null;

            return (
                <div className="fade-in flex flex-col items-center">
                    <div className="bg-white rounded-xl shadow p-4 mb-6 flex flex-wrap gap-4 items-center justify-center">
                        <span className="font-semibold text-gray-700">练习范围</span>
                        {[3,5,7,9].map(r => (
                            <button key={r} onClick={() => setRange(r)}
                                className={"px-4 py-1.5 rounded-full font-semibold smooth-transition " +
                                    (range === r ? "bg-indigo-500 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>
                                ~{r} 的乘法
                            </button>
                        ))}
                    </div>

                    <div className={"bg-gray-50 rounded-xl p-6 border-2 mb-5 flex flex-col items-center smooth-transition " +
                        (feedback === 'right' ? "border-emerald-300 bg-emerald-50" : feedback === 'wrong' ? "border-rose-300" : "border-gray-200")}>
                        {/* 遮挡的点阵：答错或主动揭示才显示 */}
                        <div className="mb-4 min-h-[40px] flex items-center">
                            {revealDots
                                ? <DotArray rows={q.b} cols={q.a} />
                                : <button onClick={() => setRevealDots(true)}
                                    className="px-4 py-2 text-sm bg-white border border-dashed border-gray-300 rounded-lg text-gray-400 hover:text-gray-600 smooth-transition">
                                    想不起来？点这里看点阵图提示</button>}
                        </div>

                        <div className={"text-5xl font-bold text-gray-800 mb-4 " + (feedback === 'wrong' ? "shake" : "")}>
                            {q.a} × {q.b} = <span className="text-indigo-500">?</span>
                        </div>

                        <div className="flex items-center gap-3">
                            <input ref={inputRef} type="number" value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && check()}
                                className="w-28 text-center text-3xl border-2 border-indigo-300 rounded-lg p-2"
                                placeholder="?" />
                            <button onClick={check}
                                className="px-6 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg font-semibold text-lg smooth-transition">确定</button>
                        </div>

                        <div className="h-8 mt-3 text-lg font-bold">
                            {feedback === 'right' && <span className="text-emerald-600">✓ 答对了！口诀：{chantText(q.a, q.b)}</span>}
                            {feedback === 'wrong' && <span className="text-rose-600">再想想～ 看看点阵图，每行 {q.a} 个，共 {q.b} 行</span>}
                        </div>
                        {feedback === 'wrong' && (
                            <button onClick={() => newQuestion()} className="mt-2 text-sm text-indigo-500 hover:underline">跳过这题 →</button>
                        )}
                    </div>

                    <div className="flex gap-6 items-center text-lg mb-4">
                        <span className="text-emerald-600 font-bold">答对 {stats.right}</span>
                        <span className="text-rose-500 font-bold">答错 {stats.wrong}</span>
                    </div>

                    {wrongList.length > 0 && (
                        <div className="w-full max-w-xl bg-rose-50 border border-rose-200 rounded-xl p-4">
                            <div className="font-bold text-rose-700 mb-2">错题本（点一题重练）</div>
                            <div className="flex flex-wrap gap-2">
                                {wrongList.map((w, i) => (
                                    <button key={i} onClick={() => newQuestion(w)}
                                        className="px-3 py-1.5 bg-white border border-rose-300 rounded-lg text-rose-600 font-semibold hover:bg-rose-100 smooth-transition">
                                        {w.a} × {w.b}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('explore');
            return (
                <div className="min-h-screen py-8 px-4">
                    <header className="relative max-w-4xl mx-auto text-center mb-8 px-12">
                        <a href="/" aria-label="返回主页" title="返回主页" className="absolute left-0 top-0 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-600">
                            <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </svg>
                        </a>
                        <h1 className="text-3xl font-bold text-slate-800">乘法口诀练习</h1>
                        <p className="text-slate-500 mt-1">点阵看意义、数轴学跳数、遮挡练记忆、错题反复练</p>
                    </header>

                    <div className="flex justify-center gap-3 mb-8">
                        <button onClick={() => setTab('explore')}
                            className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " + (tab === 'explore' ? "bg-indigo-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                            探索口诀
                        </button>
                        <button onClick={() => setTab('practice')}
                            className={"px-6 py-2.5 rounded-full font-semibold smooth-transition " + (tab === 'practice' ? "bg-indigo-500 text-white shadow" : "bg-white text-gray-600 hover:bg-gray-100")}>
                            练习闯关
                        </button>
                    </div>

                    <div className="max-w-3xl mx-auto">
                        {tab === 'explore' ? <Explore /> : <Practice />}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <div class="site-copyright" style="box-sizing: border-box; width: 100%; padding: 24px 16px; text-align: center; color: #94a3b8; font: 13px/1.6 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">©孙维刚教育研究院 小宇老师 版权所有</div>
</body>
</html>
